<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 實習公司資料總覽</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    header {
      background: #0454a3;
      color: white;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 0;
      padding-top: 4.5rem; /* 預留固定頂端列高度 */
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    /* 三條線選單按鈕樣式 */
    .top-bar-left {
      position: fixed;
      top: 1rem;
      left: 7rem;
      z-index: 1100;
    }

    .top-bar-left #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }

    .top-bar-left #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* 側邊選單樣式 */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }

    #side-menu.open {
      transform: translateX(0);
    }

    #close-btn {
      position: absolute;
      top: 2rem;
      right: 1.6rem;
      font-size: 1.6rem;
      font-weight: bold;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      line-height: 2.4rem;
      height: 2.4rem;
      width: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff;
      padding: 0;
      line-height: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
    }

    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.1rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }

    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    /* 標籤頁 */
    .nav-tabs .nav-link {
      color: #6c757d;
    }

    .nav-tabs .nav-link.active {
      color: #0066cc;
      border-color: #0066cc #0066cc #fff;
    }

    /* 表格 */
    table thead th,
    table td {
      text-align: center;
      vertical-align: middle;
      font-size: 0.95rem;
    }

    .tab-content.border {
      border-color: #0066cc !important;
    }

    .custom-header-blue {
      background-color: #0066cc;
      color: white;
      border-color: #0066cc;
    }

    .status-badge {
      font-weight: bold;
      border-radius: 5px;
      padding: 0.2rem 0.6rem;
    }

    /* 彈窗 */
    .modal-dialog {
      max-width: 800px;
    }

    .company-detail-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #f8f9fa;
    }

    .job-item {
      border-left: 4px solid #0066cc;
      padding-left: 10px;
      margin-bottom: 10px;
      background-color: #e9ecef;
      padding: 10px;
      border-radius: 4px;
    }

    .detail-label {
      font-weight: bold;
      color: #495057;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <header>實習公司資料總覽</header>
  <div class="top-bar-left">
    <div id="menu-btn" title="選單" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="container my-4">

    <ul class="nav nav-tabs" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="pending-tab" data-bs-toggle="tab" data-bs-target="#pending" type="button"
          role="tab" aria-controls="pending" aria-selected="true">目前上傳單位</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="reviewed-tab" data-bs-toggle="tab" data-bs-target="#reviewed" type="button"
          role="tab" aria-controls="reviewed" aria-selected="false">分發指導老師</button>
      </li>
    </ul>

    <div class="tab-content border p-3 bg-white" id="myTabContent">
      <div class="tab-pane fade show active" id="pending" role="tabpanel" aria-labelledby="pending-tab">
        <table class="table table-bordered table-striped table-hover align-middle">
          <thead class="custom-header-blue">
            <tr>
              <th>ID</th>
              <th>公司名稱</th>
              <th>上傳教師</th>
              <th>上傳時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="pendingTableBody">
            <tr>
              <td colspan="5" class="text-center text-muted">載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="tab-pane fade" id="reviewed" role="tabpanel" aria-labelledby="reviewed-tab">
        <p class="text-muted small mb-2">學期：<span id="reviewedSemesterDisplay">（載入中...）</span></p>
        <table class="table table-bordered table-striped table-hover align-middle">
          <thead class="custom-header-blue">
            <tr>
              <th>公司名稱</th>
              <th>職缺</th>
              <th>上傳教師</th>
              <th>審核時間</th>
              <th>本學期開放</th>
              <th>狀態</th>
              <th>指導老師</th>
            </tr>
          </thead>
          <tbody id="reviewedTableBody">
            <tr>
              <td colspan="7" class="text-center text-muted">載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="companyModal" tabindex="-1" aria-labelledby="companyModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="companyModalLabel">公司詳細資料審核</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="modalContent">
            <div class="text-center text-muted">載入公司資料中...</div>
          </div>
        </div>
        <div class="modal-footer" id="modalFooter">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 側邊選單（本頁僅主任可使用） -->
  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/director_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/approve_company">審核實習單位</a>
    <a href="/review_resume?mode=director">審核實習履歷</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/notifications">管理公告</a>
    <a href="/admin_statistics">查詢統計資料</a>
    <a href="/admission/manage_director">媒合結果</a>
    <a href="/login">登出</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let companyModalInstance = null;
    let currentCompanyId = null;

    // 選單開關邏輯
    const menuBtn = document.getElementById("menu-btn");
    const sideMenu = document.getElementById("side-menu");
    const closeBtn = document.getElementById("close-btn");

    menuBtn.addEventListener("click", () => {
      sideMenu.classList.add("open");
      sideMenu.setAttribute("aria-hidden", "false");
    });

    closeBtn.addEventListener("click", () => {
      sideMenu.classList.remove("open");
      sideMenu.setAttribute("aria-hidden", "true");
    });

    // 如果點擊 menu 以外的地方就關閉選單
    document.addEventListener("click", (e) => {
      if (
        !sideMenu.contains(e.target) &&
        !menuBtn.contains(e.target)
      ) {
        sideMenu.classList.remove("open");
        sideMenu.setAttribute("aria-hidden", "true");
      }
    });

    let allTeachers = [];

    function escapeHtml(text) {
      if (text == null || text === undefined) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadAllTeachers() {
      try {
        const res = await fetch('/api/get_all_teachers');
        const data = await res.json();
        if (data.success) allTeachers = data.teachers || [];
      } catch (e) { console.error('載入指導老師列表錯誤:', e); }
    }

    // 載入待審核清單
    document.addEventListener('DOMContentLoaded', function() {
      loadPending();
      loadAllTeachers();
    });

    // 切換到「審核完成的公司」時載入（與科助公司管理頁籤同步：可調整指導老師、本學期開放）
    document.getElementById('reviewed-tab').addEventListener('shown.bs.tab', function() {
      loadReviewed();
    });

    async function loadPending() {
      const tbody = document.getElementById('pendingTableBody');
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">載入中...</td></tr>`;

      try {
        const res = await fetch("/api/get_pending_companies");
        const data = await res.json();

        if (!data.success) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">載入失敗: ${data.message}</td></tr>`;
          return;
        }

        if (data.companies.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">目前沒有待審核公司</td></tr>`;
          return;
        }

        tbody.innerHTML = data.companies.map(r => {
          const name = (r.company_name || '-').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
          const uploader = (r.upload_teacher_name || '-').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
          return `<tr>
            <td>${r.id}</td>
            <td>${name}</td>
            <td>${uploader}</td>
            <td>${r.submitted_at || ''}</td>
            <td>
              <button type="button" class="btn btn-sm btn-primary me-2 pending-approve-btn" data-company-id="${r.id}">審核</button>
              <a href="/api/download_company_file/${r.id}" class="btn btn-sm btn-outline-primary">下載附檔</a>
            </td>
          </tr>`;
        }).join("");

        tbody.querySelectorAll('.pending-approve-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.companyId, 10);
            if (!confirm('確定要將此公司審核通過嗎？')) return;
            this.disabled = true;
            const origText = this.textContent;
            this.textContent = '處理中...';
            fetch('/api/approve_company', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ company_id: id, status: 'approved' })
            }).then(res => res.json()).then(data => {
              if (data.success) {
                alert(data.message || '已審核通過');
                loadPending();
              } else {
                alert(data.message || '審核失敗');
                this.disabled = false;
                this.textContent = origText;
              }
            }).catch(() => {
              alert('審核時發生錯誤，請稍後再試');
              this.disabled = false;
              this.textContent = origText;
            });
          });
        });

      } catch (error) {
        console.error("載入待審核紀錄發生錯誤:", error);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">伺服器錯誤，載入失敗。</td></tr>`;
      }
    }

    async function loadReviewed() {
      const tbody = document.getElementById('reviewedTableBody');
      const semesterDisplay = document.getElementById('reviewedSemesterDisplay');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">載入中...</td></tr>';

      try {
        const res = await fetch("/api/get_reviewed_companies");
        const data = await res.json();

        if (!data.success) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">載入失敗</td></tr>';
          if (semesterDisplay) semesterDisplay.textContent = '載入失敗';
          return;
        }

        const companies = data.companies || [];
        if (semesterDisplay) semesterDisplay.textContent = data.current_semester || '未設定';

        if (companies.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">尚無審核完成的公司</td></tr>';
          return;
        }

        tbody.innerHTML = companies.map(company => {
          const openStatusBadge = company.is_open_current_semester
            ? '<span class="badge bg-success">開放中</span>'
            : '<span class="badge bg-secondary">未開放</span>';
          const checkboxDisabled = company.status !== 'approved' ? 'disabled' : '';
          const checkboxChecked = company.is_open_current_semester ? 'checked' : '';
          const jobTitles = Array.isArray(company.jobs) ? company.jobs.filter(t => t && String(t).trim()) : [];
          const jobDisplay = jobTitles.length
            ? jobTitles.map(t => escapeHtml(t)).join('<br>')
            : '<span class="text-muted">-</span>';
          let selectedTeacherId = '';
          if (company.advisor_teacher_name) {
            const mt = allTeachers.find(t => t.name === company.advisor_teacher_name);
            if (mt) selectedTeacherId = mt.id;
          }
          if (!selectedTeacherId && company.advisor_user_id) selectedTeacherId = company.advisor_user_id;
          let advisorSelect = '<select class="form-select form-select-sm advisor-select" data-company-id="' + company.id + '" data-original-value="' + (selectedTeacherId || '') + '" style="width:120px;font-size:0.875rem;">';
          advisorSelect += '<option value="">-- 請選擇 --</option>';
          allTeachers.forEach(teacher => {
            const sel = selectedTeacherId == teacher.id ? 'selected' : '';
            advisorSelect += '<option value="' + teacher.id + '" ' + sel + '>' + escapeHtml(teacher.name) + '</option>';
          });
          advisorSelect += '</select>';
          const updateBtn = '<button type="button" class="btn btn-sm btn-primary advisor-update-btn ms-1" data-company-id="' + company.id + '">修改</button>';
          const statusBadge = company.status === 'approved' ? '<span class="badge bg-success">核准</span>' : '<span class="badge bg-danger">退回</span>';
          return '<tr>' +
            '<td>' + escapeHtml(company.company_name || '-') + '</td>' +
            '<td>' + jobDisplay + '</td>' +
            '<td>' + escapeHtml(company.upload_teacher_name || '-') + '</td>' +
            '<td>' + (company.reviewed_at || '-') + '</td>' +
            '<td><div class="form-check form-switch d-inline-block"><input class="form-check-input company-open-checkbox" type="checkbox" data-company-id="' + company.id + '" ' + checkboxChecked + ' ' + checkboxDisabled + '></div></td>' +
            '<td>' + openStatusBadge + '</td>' +
            '<td><div class="d-flex align-items-center justify-content-center">' + advisorSelect + updateBtn + '</div></td>' +
            '</tr>';
        }).join('');

        tbody.querySelectorAll('.advisor-update-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const companyId = parseInt(this.dataset.companyId, 10);
            const select = document.querySelector('.advisor-select[data-company-id="' + companyId + '"]');
            if (!select) { alert('找不到對應的下拉選單'); return; }
            const advisorUserId = select.value ? parseInt(select.value, 10) : null;
            const originalValue = select.dataset.originalValue;
            if (select.value === originalValue) { alert('沒有變更，無需更新'); return; }
            this.disabled = true;
            select.disabled = true;
            const origText = this.textContent;
            this.textContent = '更新中...';
            fetch('/api/update_company_advisor', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ company_id: companyId, advisor_user_id: advisorUserId })
            }).then(r => r.json()).then(data => {
              if (data.success) { select.dataset.originalValue = select.value; alert('指導老師已更新'); }
              else { alert(data.message || '更新失敗'); select.value = originalValue; }
            }).catch(() => { select.value = originalValue; alert('更新時發生錯誤'); }).finally(() => {
              this.disabled = false;
              select.disabled = false;
              this.textContent = origText;
            });
          });
        });

        tbody.querySelectorAll('.company-open-checkbox').forEach(checkbox => {
          checkbox.addEventListener('change', function() {
            const companyId = parseInt(this.dataset.companyId, 10);
            const isOpen = this.checked;
            this.disabled = true;
            const origChecked = this.checked;
            fetch('/api/set_company_open_status', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ company_id: companyId, is_open: isOpen })
            }).then(r => r.json()).then(data => {
              if (!data.success) { alert(data.message || '設定失敗'); this.checked = !origChecked; }
              else {
                const row = this.closest('tr');
                const statusCell = row.querySelector('td:nth-last-child(2)');
                if (statusCell) statusCell.innerHTML = isOpen ? '<span class="badge bg-success">開放中</span>' : '<span class="badge bg-secondary">未開放</span>';
              }
            }).catch(() => { this.checked = !origChecked; alert('設定時發生錯誤'); }).finally(() => { this.disabled = false; });
          });
        });
      } catch (error) {
        console.error("載入審核完成紀錄發生錯誤:", error);
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">伺服器錯誤，載入失敗。</td></tr>';
        if (document.getElementById('reviewedSemesterDisplay')) document.getElementById('reviewedSemesterDisplay').textContent = '載入失敗';
      }
    }

    // 彈窗
    async function openCompanyModal(id, isPending) {
      currentCompanyId = id;
      if (!companyModalInstance) {
        companyModalInstance = new bootstrap.Modal(document.getElementById('companyModal'));
      }

      const content = document.getElementById('modalContent');
      const footer = document.getElementById('modalFooter');
      content.innerHTML = '<div class="text-center text-muted">載入公司資料中...</div>';
      footer.innerHTML = '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>';

      companyModalInstance.show();

      try {
        const res = await fetch(`/api/get_company_detail?company_id=${id}`);
        const data = await res.json();

        if (!data.success) {
          content.innerHTML = `<div class="alert alert-danger">載入失敗: ${data.message}</div>`;
          return;
        }

        const company = data.company;
        const jobList = company.internship_jobs.map(job => `
          <div class="job-item">
            <p class="mb-1"><span class="detail-label">職缺名稱:</span> ${job.internship_unit || '-'}</p>
            <p class="mb-1"><span class="detail-label">預計名額:</span> ${job.internship_quota || 'N/A'}</p>
            <p class="mb-1"><span class="detail-label">工作時間:</span> ${job.internship_time || '（詳見附檔）'}</p>
            <p class="mb-1"><span class="detail-label">職缺內容:</span> ${job.internship_content || '（詳見附檔）'}</p>
          </div>
        `).join('');

        let rejectReasonHtml = '';
        if (company.reject_reason) {
          rejectReasonHtml = `<div class="alert alert-warning"><strong>駁回原因:</strong> ${company.reject_reason}</div>`;
        }

        content.innerHTML = `
          <div class="company-detail-box"><p><span class="detail-label">公司名稱:</span>${company.company_name}</p></div>
          <div class="company-detail-box"><p><span class="detail-label">統一編號:</span>${company.company_tax_number || '-'}</p></div>
          <div class="company-detail-box"><p><span class="detail-label">公司地址:</span>${company.company_address || '-'}</p></div>
          <div class="company-detail-box"><p><span class="detail-label">聯絡人:</span>${company.contact_person || '-'}</p></div>
          <div class="company-detail-box"><p><span class="detail-label">聯絡電話:</span>${company.contact_phone || '-'}</p></div>
          <div class="company-detail-box"><p><span class="detail-label">電子郵件:</span>${company.contact_email || '-'}</p></div>
          <h6>實習職缺列表:</h6>
          ${jobList}
          ${rejectReasonHtml}
        `;

        if (isPending) {
          footer.innerHTML = `
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
            <button type="button" class="btn btn-danger" onclick="submitCompanyReview('rejected')">退回</button>
            <button type="button" class="btn btn-success" onclick="submitCompanyReview('approved')">核准</button>
          `;
        }
      } catch (error) {
        console.error(error);
        content.innerHTML = `<div class="alert alert-danger">載入公司資料發生錯誤</div>`;
      }
    }

    async function submitCompanyReview(status) {
      if (!currentCompanyId) return;
      const confirmText = status === 'approved' ? '確定核准此公司嗎？' : '確定退回此公司嗎？';
      if (!confirm(confirmText)) return;

      try {
        const res = await fetch('/api/approve_company', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ company_id: currentCompanyId, status })
        });
        const data = await res.json();
        if (!data.success) {
          alert(data.message || '審核失敗');
          return;
        }
        alert(data.message || '審核完成');
        if (companyModalInstance) {
          companyModalInstance.hide();
        }
        loadPending();
      } catch (error) {
        console.error(error);
        alert('審核時發生錯誤，請稍後再試');
      }
    }
  </script>
</body>

</html>
