<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 實習週記</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding-top: 4.5rem; /* 頂端固定列預留空間（與實習心得一致） */
    }
    header {
      background: #0454a3;
      color: #fff;
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }
    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      color: #fff;
    }
    .top-bar-left {
      position: absolute;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }
    #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* 側邊選單（與實習心得、成果頁一致風格） */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }
    #side-menu.open { transform: translateX(0); }
    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
    }
    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.05rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    #close-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 2rem;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      line-height: 1;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 24px 40px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .page-header-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f172a;
    }
    .page-header-subtitle {
      font-size: 0.95rem;
      color: #64748b;
    }
    .btn-primary-round {
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .weekly-container-card {
      border-radius: 16px;
      border: 1px solid #d4d4d8;
      background: #ffffff;
      padding: 16px 22px 22px;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.08);
    }
    .intern-summary-card {
      margin-bottom: 12px;
    }
    .intern-summary-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .intern-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.1rem;
    }
    .intern-summary-table thead th {
      background: #3b82f6;
      color: #fff;
      padding: 8px 10px;
      text-align: center;
      font-weight: 600;
    }
    .intern-summary-table tbody td {
      padding: 6px 10px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      color: #0f172a;
    }


    /* 週記列表表格風格（參考你提供的截圖） */
    .weekly-table-card {
      padding: 4px 0 0;
    }
    .weekly-table-card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 12px;
    }
    .weekly-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.1rem;
    }
    .weekly-table thead th {
      background: #3b82f6;
      color: #fff;
      padding: 8px 10px;
      text-align: center;
    }
    .weekly-table tbody td {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      color: #0f172a;
    }
    .weekly-table tbody tr:nth-child(odd) {
      background-color: #edf2ff;
    }
    .weekly-table tbody tr:nth-child(even) {
      background-color: #ffffff;
    }
    .weekly-table tbody tr:hover {
      background-color: #e0f2fe;
    }
    .weekly-status-done {
      color: #16a34a;
      font-weight: 600;
    }
    .weekly-status-empty {
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="top-bar-left">
        <button id="menu-btn" aria-label="開啟選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <h1>實習週記</h1>
    </div>
  </header>

  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/student_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/resume_folders">履歷管理</a>
    <a href="/fill_preferences">填寫志願序</a>
    <a href="/look_company">投遞履歷</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/intern_achievement">學生媒合結果</a>
    <a href="/intern_weekly">實習週記</a>
    <a href="/intern_experience">實習心得</a>
    <a href="/notifications">通知</a>
  </nav>

  <main>
    <section class="weekly-container-card" aria-label="實習課程與週記">
      <section class="intern-summary-card" aria-label="實習課程資訊">
        <div class="intern-summary-title">實習課程資訊</div>
        <table class="intern-summary-table">
          <thead>
            <tr>
              <th style="width: 15%;">學期別</th>
              <th style="width: 35%;">課程名稱</th>
              <th style="width: 50%;">實習單位</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td id="weeklySemester">—</td>
              <td id="weeklyCourseName">—</td>
              <td id="weeklyCompanyName">—</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="weekly-table-card" aria-label="實習週記列表">
        <div class="weekly-table-card-title">實習週記列表</div>
        <div class="table-responsive">
          <table class="weekly-table">
            <thead>
              <tr>
                <th style="width: 8%;">序號</th>
                <th style="width: 32%;">標題</th>
                <th style="width: 18%;">應繳日期</th>
                <th style="width: 18%;">實際繳交</th>
                <th style="width: 14%;">批閱狀態</th>
                <th style="width: 10%;">操作</th>
              </tr>
            </thead>
            <tbody id="weeklyTableBody">
              <!-- 週記列表將由 JavaScript 動態載入 -->
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <!-- 週記填寫 / 檢視 Modal -->
  <div class="modal fade" id="weeklyDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">實習週記內容</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">學期別</label>
            <input type="text" class="form-control" id="detailSemester" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">標題</label>
            <input type="text" class="form-control" id="detailTitle" placeholder="請輸入本週週記標題">
          </div>
          <div class="mb-3">
            <label class="form-label">實習單位</label>
            <input type="text" class="form-control" id="detailCompany" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">實習工作記要</label>
            <textarea class="form-control" id="detailWorkNotes" rows="4" placeholder="請描述本週主要工作內容與任務"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">學習心得</label>
            <textarea class="form-control" id="detailReflection" rows="4" placeholder="請分享本週的收穫、感想或需要改進之處"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">上傳檔案</label>
            <input type="text" class="form-control mb-2" id="detailFileName" placeholder="目前上傳檔案名稱" readonly>
            <input type="file" class="form-control" id="detailFileInput">
          </div>
          <div class="mb-3">
            <label class="form-label">填寫日期</label>
            <input type="text" class="form-control" id="detailFilledAt" style="background-color:#e2e2e2;" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">老師評語</label>
            <textarea class="form-control" id="detailTeacherComment" style="background-color:#e2e2e2;" rows="3" readonly></textarea>
          </div>
          <div class="mb-0">
            <label class="form-label">老師批閱時間</label>
            <input type="text" class="form-control" id="detailReviewedAt" style="background-color:#e2e2e2;" readonly>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
          <button type="button" class="btn btn-primary" id="saveWeeklyBtn">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS（供 Modal 使用） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 開關側邊選單（與其他頁面一致）
    (function () {
      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');
      if (menuBtn && sideMenu && closeBtn) {
        menuBtn.addEventListener('click', () => {
          sideMenu.classList.add('open');
          sideMenu.setAttribute('aria-hidden', 'false');
        });
        closeBtn.addEventListener('click', () => {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        });
      }
    })();

    // 之後會改成由後端回傳實際週記資料
    // allWeeks: 根據學期別與學期起訖日，自動產生的「每兩週一筆」週記清單
    let allWeeks = [];
    let currentWeekId = null;
    let currentCompanyId = null;

    const weeklyTableBody = document.getElementById('weeklyTableBody');

    function renderWeeklyTable(weeks) {
      if (!weeklyTableBody) return;
      weeklyTableBody.innerHTML = '';
      if (!weeks || weeks.length === 0) {
        weeklyTableBody.innerHTML = `
          <tr>
            <td colspan="6" class="weekly-status-empty">目前尚未有任何週記紀錄。</td>
          </tr>
        `;
        return;
      }
      weeks.forEach((w, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${w.title || ''}</td>
          <td>${w.due_date || '—'}</td>
          <td>${w.filled_at || '—'}</td>
          <td>
            <span class="${w.reviewed ? 'weekly-status-done' : 'weekly-status-empty'}">
              ${w.reviewed ? '已批閱' : '未批閱'}
            </span>
          </td>
          <td>
            <button type="button"
                    class="btn btn-sm btn-outline-primary"
                    onclick="handleWeeklyAction(${w.id || 'null'})">
              填寫 / 檢視
            </button>
          </td>
        `;
        weeklyTableBody.appendChild(tr);
      });
    }

    function handleWeeklyAction(id) {
      if (!id) {
        alert('尚未取得此週記的代號。');
        return;
      }
      currentWeekId = id;
      const week = allWeeks.find(w => w.id === id);
      const semesterEl = document.getElementById('detailSemester');
      const titleEl = document.getElementById('detailTitle');
      const companyEl = document.getElementById('detailCompany');
      const workEl = document.getElementById('detailWorkNotes');
      const reflectionEl = document.getElementById('detailReflection');
      const fileEl = document.getElementById('detailFileName');
      const fileInput = document.getElementById('detailFileInput');
      const filledDateEl = document.getElementById('detailFilledAt');
      const teacherCommentEl = document.getElementById('detailTeacherComment');
      const reviewedAtEl = document.getElementById('detailReviewedAt');

      if (week) {
        titleEl.value = week.title || '';
        companyEl.value = week.company || (document.getElementById('weeklyCompanyName')?.textContent || '');
        workEl.value = week.work_notes || '';
        reflectionEl.value = week.reflection || '';
        fileEl.value = week.file_name || '';
        filledDateEl.value = week.filled_at || '';
        teacherCommentEl.value = week.teacher_comment || '';
        reviewedAtEl.value = week.reviewed_at || '';
      } else {
        titleEl.value = '';
        companyEl.value = document.getElementById('weeklyCompanyName')?.textContent || '';
        workEl.value = '';
        reflectionEl.value = '';
        fileEl.value = '';
        if (fileInput) fileInput.value = '';
        filledDateEl.value = '';
        teacherCommentEl.value = '';
        reviewedAtEl.value = '';
      }

      semesterEl.value = document.getElementById('weeklySemester')?.textContent || '';

      const modalEl = document.getElementById('weeklyDetailModal');
      const modal = new bootstrap.Modal(modalEl);
      modal.show();
    }

    async function saveWeekly() {
      if (!currentWeekId) {
        alert('請先選擇要填寫的週次。');
        return;
      }
      const week = allWeeks.find(w => w.id === currentWeekId);
      if (!week) {
        alert('找不到對應的週記週次。');
        return;
      }
      const semester = (document.getElementById('weeklySemester')?.textContent || '').trim();
      const title = document.getElementById('detailTitle').value.trim();
      const workNotes = document.getElementById('detailWorkNotes').value.trim();
      const reflection = document.getElementById('detailReflection').value.trim();

      if (!title || !workNotes || !reflection) {
        alert('標題、實習工作記要與學習心得請勿留白。');
        return;
      }

      try {
        const resp = await fetch('/intern_weekly/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            semester,
            week_index: week.week_index,
            title,
            work_notes: workNotes,
            reflection,
            company_id: currentCompanyId,
            due_date: week.due_date || null
          })
        });
        const data = await resp.json();
        if (!data.success) {
          alert(data.message || '儲存週記失敗');
          return;
        }

        // 更新前端資料
        week.title = title;
        week.work_notes = workNotes;
        week.reflection = reflection;
        week.filled_at = data.filled_at || week.filled_at;
        week.reviewed = week.reviewed || false;

        renderWeeklyTable(allWeeks);

        const modalEl = document.getElementById('weeklyDetailModal');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) modalInstance.hide();

        alert('週記已儲存完成。');
      } catch (e) {
        console.warn('儲存週記失敗', e);
        alert('儲存週記失敗，請稍後再試。');
      }
    }

    async function loadInternSummary() {
      const semesterEl = document.getElementById('weeklySemester');
      const courseEl = document.getElementById('weeklyCourseName');
      const companyEl = document.getElementById('weeklyCompanyName');
      if (!semesterEl || !courseEl || !companyEl) return;
      try {
        const res = await fetch('/admission/api/get_my_admission', { credentials: 'include' });
        const data = await res.json();
        if (!data || !data.success || !data.admission) return;
        const a = data.admission;
        const semesterCode = a.semester || a.semester_code || '—';
        semesterEl.textContent = semesterCode;
        const courseName = a.course_name || a.course || a.courseTitle || '實習課程';
        courseEl.textContent = courseName;
        companyEl.textContent = a.company_name || '—';
        currentCompanyId = a.company_id || null;

        // 根據學期別與學期起訖日，自動產生每兩週一筆的週記清單
        allWeeks = await generateWeeksBySemester(semesterCode);

        // 從後端載入已儲存的週記內容，合併到 allWeeks
        try {
          const listRes = await fetch(`/intern_weekly/api/my_list?semester=${encodeURIComponent(semesterCode)}`, {
            credentials: 'include'
          });
          const listData = await listRes.json();
          if (listData && listData.success && Array.isArray(listData.weeklies)) {
            listData.weeklies.forEach(rec => {
              const target = allWeeks.find(w => w.week_index === rec.week_index);
              if (target) {
                target.title = rec.title || '';
                target.work_notes = rec.work_notes || '';
                target.reflection = rec.reflection || '';
                target.due_date = rec.due_date || target.due_date;
                target.filled_at = rec.filled_at || '';
                target.reviewed = rec.status === 'reviewed';
                target.teacher_comment = rec.teacher_comment || '';
                target.reviewed_at = rec.reviewed_at || '';
              }
            });
          }
        } catch (e) {
          console.warn('載入既有週記紀錄失敗', e);
        }

        renderWeeklyTable(allWeeks);
      } catch (e) {
        console.warn('載入實習課程資訊失敗', e);
      }
    }

    async function generateWeeksBySemester(semesterCode) {
      if (!semesterCode || semesterCode === '—') return [];
      try {
        const res = await fetch('/intern_weekly/api/intern_period', { credentials: 'include' });
        const data = await res.json();
        if (!data || !data.success || !data.start_date) return [];

        const start = new Date(data.start_date);
        const end = data.end_date ? new Date(data.end_date) : null;

        if (isNaN(start.getTime())) return [];

        const weeks = [];
        let index = 1;
        let cursor = new Date(start.getTime());

        while (!end || cursor <= end) {
          const periodEnd = new Date(cursor.getTime());
          periodEnd.setDate(periodEnd.getDate() + 13);
          if (end && periodEnd > end) {
            periodEnd.setTime(end.getTime());
          }

          weeks.push({
            id: index,
            week_index: index,
            title: '',
            due_date: formatDate(periodEnd),
            filled_at: '',
            reviewed: false
          });

          index += 1;
          cursor.setDate(cursor.getDate() + 14);
          if (end && cursor > end) break;
        }

        return weeks;
      } catch (e) {
        console.warn('產生實習週記清單時發生錯誤', e);
        return [];
      }
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatMonthDay(d) {
      const m = d.getMonth() + 1;
      const day = d.getDate();
      return `${m}/${day}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadInternSummary();
      const saveBtn = document.getElementById('saveWeeklyBtn');
      if (saveBtn) {
        saveBtn.addEventListener('click', saveWeekly);
      }
    });
  </script>
</body>
</html>
