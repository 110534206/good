<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 實習週記</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding-top: 4.5rem; /* 頂端固定列預留空間（與實習心得一致） */
    }
    header {
      background: #0454a3;
      color: #fff;
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }
    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      color: #fff;
    }
    .top-bar-left {
      position: absolute;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }
    #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* 側邊選單（與實習心得、成果頁一致風格） */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }
    #side-menu.open { transform: translateX(0); }
    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
    }
    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.05rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    #close-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 2rem;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      line-height: 1;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .page-header-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f172a;
    }
    .page-header-subtitle {
      font-size: 0.95rem;
      color: #64748b;
    }
    .btn-primary-round {
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .intern-summary-card {
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      padding: 10px 16px 12px;
      margin-bottom: 16px;
    }
    .intern-summary-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .intern-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .intern-summary-table thead th {
      background: #3b82f6;
      color: #fff;
      padding: 6px 10px;
      text-align: center;
      font-weight: 600;
    }
    .intern-summary-table tbody td {
      padding: 6px 10px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }


    .weekly-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: 20px;
    }
    @media (max-width: 992px) {
      .weekly-layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .card {
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(15,23,42,0.08);
      background: #fff;
    }
    .card-header {
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-header h2 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
      color: #0f172a;
    }
    .card-body {
      padding: 16px 18px 18px;
    }

    .week-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 480px;
      overflow-y: auto;
    }
    .week-item {
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 10px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .week-item:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
      box-shadow: 0 2px 8px rgba(15,23,42,0.08);
    }
    .week-item.active {
      background: #e0f2fe;
      border-color: #0ea5e9;
    }
    .week-title {
      font-weight: 600;
      color: #0f172a;
    }
    .week-meta {
      font-size: 0.8rem;
      color: #64748b;
    }

    .week-content-empty {
      padding: 32px 16px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .week-content {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #1f2933;
      font-size: 0.95rem;
    }
    .week-tags {
      margin-bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.8rem;
    }
    .tag-pill {
      border-radius: 999px;
      padding: 4px 10px;
      background: #eff6ff;
      color: #1d4ed8;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="top-bar-left">
        <button id="menu-btn" aria-label="開啟選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <h1>實習週記</h1>
    </div>
  </header>

  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/student_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/resume_folders">履歷管理</a>
    <a href="/fill_preferences">填寫志願序</a>
    <a href="/look_company">投遞履歷</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/intern_achievement">學生媒合結果</a>
    <a href="/intern_weekly">實習週記</a>
    <a href="/intern_experience">實習心得</a>
    <a href="/notifications">通知</a>
  </nav>

  <main>
    <section class="intern-summary-card" aria-label="實習課程資訊">
      <div class="intern-summary-title">實習課程資訊</div>
      <table class="intern-summary-table">
        <thead>
          <tr>
            <th style="width: 15%;">學期別</th>
            <th style="width: 35%;">課程名稱</th>
            <th style="width: 50%;">實習單位</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td id="weeklySemester">—</td>
            <td id="weeklyCourseName">—</td>
            <td id="weeklyCompanyName">—</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="page-header" aria-label="實習週記標題">
      <div>
        <div class="page-header-title">實習週記</div>
        <div class="page-header-subtitle">記錄每一週的學習重點、遇到的挑戰，以及你的成長。</div>
      </div>
      <button id="newWeeklyBtn" class="btn btn-primary btn-primary-round">
        <span>＋ 新增週記</span>
      </button>
    </section>

    <section class="weekly-layout" aria-label="實習週記內容">
      <div class="card" aria-label="週次列表">
        <div class="card-header">
          <h2>週次列表</h2>
          <small class="text-muted">點選左側週次可在右側檢視內容</small>
        </div>
        <div class="card-body">
          <ul class="week-list" id="weekList">
            <!-- 週記列表將由 JavaScript 動態載入 -->
          </ul>
        </div>
      </div>

      <div class="card" aria-label="週記詳情">
        <div class="card-header">
          <h2 id="weekDetailTitle">請先選擇左側週次</h2>
        </div>
        <div class="card-body">
          <div id="weekDetailMeta" class="week-meta" style="margin-bottom: 8px;"></div>
          <div id="weekDetailTags" class="week-tags"></div>
          <div id="weekDetailContent" class="week-content-empty">
            尚未選擇任何週記，或本週尚未撰寫。請點選左側週次，或按右上角「新增週記」開始撰寫。
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // 開關側邊選單（與其他頁面一致）
    (function () {
      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');
      if (menuBtn && sideMenu && closeBtn) {
        menuBtn.addEventListener('click', () => {
          sideMenu.classList.add('open');
          sideMenu.setAttribute('aria-hidden', 'false');
        });
        closeBtn.addEventListener('click', () => {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        });
      }
    })();

    // TODO: 未來可改成從後端 API 載入真實資料
    const mockWeeks = [
      { id: 1, title: '第 1 週：適應環境', period: '第 1 週', created_at: '2026-03-02', tags: ['新人訓練', '了解公司流程'], content: '這一週主要在熟悉公司環境與團隊成員，參與新人訓練...' },
      { id: 2, title: '第 2 週：接觸專案', period: '第 2 週', created_at: '2026-03-09', tags: ['專案導入'], content: '開始接觸實際專案，了解需求並試著完成指定的任務...' }
    ];

    const weekListEl = document.getElementById('weekList');
    const weekDetailTitleEl = document.getElementById('weekDetailTitle');
    const weekDetailMetaEl = document.getElementById('weekDetailMeta');
    const weekDetailTagsEl = document.getElementById('weekDetailTags');
    const weekDetailContentEl = document.getElementById('weekDetailContent');

    function renderWeekList(weeks) {
      if (!weekListEl) return;
      weekListEl.innerHTML = '';
      if (!weeks || weeks.length === 0) {
        weekListEl.innerHTML = '<li class="week-content-empty">目前尚未有任何週記，點右上角「新增週記」開始撰寫。</li>';
        return;
      }
      weeks.forEach((w, idx) => {
        const li = document.createElement('li');
        li.className = 'week-item' + (idx === 0 ? ' active' : '');
        li.dataset.weekId = w.id;
        li.innerHTML = `
          <div>
            <div class="week-title">${w.title || ('第 ' + (idx + 1) + ' 週')}</div>
            <div class="week-meta">${w.period || ''} · 建立於 ${w.created_at || ''}</div>
          </div>
        `;
        li.addEventListener('click', () => selectWeek(w.id));
        weekListEl.appendChild(li);
      });
      selectWeek(weeks[0].id);
    }

    function selectWeek(weekId) {
      const week = mockWeeks.find(w => w.id === weekId);
      if (!week || !weekDetailTitleEl || !weekDetailContentEl) return;
      document.querySelectorAll('.week-item').forEach(el => {
        el.classList.toggle('active', el.dataset.weekId === String(weekId));
      });
      weekDetailTitleEl.textContent = week.title;
      weekDetailMetaEl.textContent = (week.period || '') + (week.created_at ? ' · 建立於 ' + week.created_at : '');
      weekDetailTagsEl.innerHTML = '';
      (week.tags || []).forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag-pill';
        span.textContent = t;
        weekDetailTagsEl.appendChild(span);
      });
      weekDetailContentEl.className = 'week-content';
      weekDetailContentEl.textContent = week.content || '';
    }

    async function loadInternSummary() {
      const semesterEl = document.getElementById('weeklySemester');
      const courseEl = document.getElementById('weeklyCourseName');
      const companyEl = document.getElementById('weeklyCompanyName');
      if (!semesterEl || !courseEl || !companyEl) return;
      try {
        const res = await fetch('/admission/api/get_my_admission', { credentials: 'include' });
        const data = await res.json();
        if (!data || !data.success || !data.admission) return;
        const a = data.admission;
        semesterEl.textContent = a.semester || a.semester_code || '—';
        const courseName = a.course_name || a.course || a.courseTitle || '實習課程';
        courseEl.textContent = courseName;
        companyEl.textContent = a.company_name || '—';
      } catch (e) {
        console.warn('載入實習課程資訊失敗', e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadInternSummary();
      renderWeekList(mockWeeks);
      const newBtn = document.getElementById('newWeeklyBtn');
      if (newBtn) {
        newBtn.addEventListener('click', () => {
          alert('未來可在此導向「新增週記」編輯頁面或彈窗。');
        });
      }
    });
  </script>
</body>
</html>
