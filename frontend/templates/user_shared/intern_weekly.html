<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 實習週記</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding-top: 4.5rem; /* 頂端固定列預留空間（與實習心得一致） */
    }
    header {
      background: #0454a3;
      color: #fff;
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }
    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      color: #fff;
    }
    .top-bar-left {
      position: absolute;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }
    #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* 側邊選單（與實習心得、成果頁一致風格） */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }
    #side-menu.open { transform: translateX(0); }
    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
    }
    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.05rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    #close-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 2rem;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      line-height: 1;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .page-header-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f172a;
    }
    .page-header-subtitle {
      font-size: 0.95rem;
      color: #64748b;
    }
    .btn-primary-round {
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .intern-summary-card {
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      padding: 10px 16px 12px;
      margin-bottom: 16px;
    }
    .intern-summary-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .intern-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .intern-summary-table thead th {
      background: #3b82f6;
      color: #fff;
      padding: 6px 10px;
      text-align: center;
      font-weight: 600;
    }
    .intern-summary-table tbody td {
      padding: 6px 10px;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }


    /* 週記列表表格風格（參考你提供的截圖） */
    .weekly-table-card {
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      padding: 10px 14px 16px;
    }
    .weekly-table-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .weekly-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .weekly-table thead th {
      background: #1e293b;
      color: #fff;
      padding: 6px 10px;
      text-align: center;
    }
    .weekly-table tbody td {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }
    .weekly-table tbody tr:nth-child(odd) {
      background-color: #edf2ff;
    }
    .weekly-table tbody tr:nth-child(even) {
      background-color: #ffffff;
    }
    .weekly-table tbody tr:hover {
      background-color: #e0f2fe;
    }
    .weekly-status-done {
      color: #16a34a;
      font-weight: 600;
    }
    .weekly-status-empty {
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="top-bar-left">
        <button id="menu-btn" aria-label="開啟選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <h1>實習週記</h1>
    </div>
  </header>

  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/student_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/resume_folders">履歷管理</a>
    <a href="/fill_preferences">填寫志願序</a>
    <a href="/look_company">投遞履歷</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/intern_achievement">學生媒合結果</a>
    <a href="/intern_weekly">實習週記</a>
    <a href="/intern_experience">實習心得</a>
    <a href="/notifications">通知</a>
  </nav>

  <main>
    <section class="intern-summary-card" aria-label="實習課程資訊">
      <div class="intern-summary-title">實習課程資訊</div>
      <table class="intern-summary-table">
        <thead>
          <tr>
            <th style="width: 15%;">學期別</th>
            <th style="width: 35%;">課程名稱</th>
            <th style="width: 50%;">實習單位</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td id="weeklySemester">—</td>
            <td id="weeklyCourseName">—</td>
            <td id="weeklyCompanyName">—</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="page-header" aria-label="實習週記標題">
      <div>
        <div class="page-header-title">實習週記</div>
        <div class="page-header-subtitle">記錄每一週的學習重點、遇到的挑戰，以及你的成長。</div>
      </div>
      <button id="newWeeklyBtn" class="btn btn-primary btn-primary-round">
        <span>＋ 新增週記</span>
      </button>
    </section>

    <section class="weekly-table-card" aria-label="實習週記列表">
      <div class="weekly-table-card-title">實習週記列表</div>
      <div class="table-responsive">
        <table class="weekly-table">
          <thead>
            <tr>
              <th style="width: 8%;">序號</th>
              <th style="width: 32%;">標題</th>
              <th style="width: 20%;">應填日期</th>
              <th style="width: 20%;">填寫日期</th>
              <th style="width: 20%;">操作</th>
            </tr>
          </thead>
          <tbody id="weeklyTableBody">
            <!-- 週記列表將由 JavaScript 動態載入 -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // 開關側邊選單（與其他頁面一致）
    (function () {
      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');
      if (menuBtn && sideMenu && closeBtn) {
        menuBtn.addEventListener('click', () => {
          sideMenu.classList.add('open');
          sideMenu.setAttribute('aria-hidden', 'false');
        });
        closeBtn.addEventListener('click', () => {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        });
      }
    })();

    // TODO: 未來可改成從後端 API 載入真實資料
    const mockWeeks = [
      {
        id: 1,
        title: '2/17~2/27實習週記',
        due_date: '2025-02-17',
        filled_at: '2025-02-28 19:20:10',
        reviewed: true
      },
      {
        id: 2,
        title: '3/3~3/14實習週記',
        due_date: '2025-03-03',
        filled_at: '2025-03-14 21:24:14',
        reviewed: true
      },
      {
        id: 3,
        title: '3/17~3/28實習週記',
        due_date: '2025-03-17',
        filled_at: '2025-03-28 23:22:47',
        reviewed: true
      },
      {
        id: 4,
        title: '3/31~4/11實習週記',
        due_date: '2025-03-31',
        filled_at: '2025-04-11 23:32:50',
        reviewed: true
      },
      {
        id: 5,
        title: '4/14~4/25實習週記',
        due_date: '2025-04-14',
        filled_at: '2025-04-26 00:00:19',
        reviewed: true
      }
    ];

    const weeklyTableBody = document.getElementById('weeklyTableBody');

    function renderWeeklyTable(weeks) {
      if (!weeklyTableBody) return;
      weeklyTableBody.innerHTML = '';
      if (!weeks || weeks.length === 0) {
        weeklyTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="weekly-status-empty">目前尚未有任何週記，點右上角「新增週記」開始撰寫。</td>
          </tr>
        `;
        return;
      }
      weeks.forEach((w, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${w.title || ''}</td>
          <td>${w.due_date || ''}</td>
          <td>${w.filled_at || ''}</td>
          <td>
            <span class="${w.reviewed ? 'weekly-status-done' : 'weekly-status-empty'}">
              ${w.reviewed ? '已批閱' : '未批閱'}
            </span>
          </td>
        `;
        weeklyTableBody.appendChild(tr);
      });
    }

    async function loadInternSummary() {
      const semesterEl = document.getElementById('weeklySemester');
      const courseEl = document.getElementById('weeklyCourseName');
      const companyEl = document.getElementById('weeklyCompanyName');
      if (!semesterEl || !courseEl || !companyEl) return;
      try {
        const res = await fetch('/admission/api/get_my_admission', { credentials: 'include' });
        const data = await res.json();
        if (!data || !data.success || !data.admission) return;
        const a = data.admission;
        semesterEl.textContent = a.semester || a.semester_code || '—';
        const courseName = a.course_name || a.course || a.courseTitle || '實習課程';
        courseEl.textContent = courseName;
        companyEl.textContent = a.company_name || '—';
      } catch (e) {
        console.warn('載入實習課程資訊失敗', e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadInternSummary();
      renderWeeklyTable(mockWeeks);
      const newBtn = document.getElementById('newWeeklyBtn');
      if (newBtn) {
        newBtn.addEventListener('click', () => {
          alert('未來可在此導向「新增週記」編輯頁面或彈窗。');
        });
      }
    });
  </script>
</body>
</html>
