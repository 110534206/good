<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 學生管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 0;
      overflow: hidden; /* 嵌入 iframe 時不顯示滾輪 */
    }

    /* 與 student_home 同寬：width 100%、max-width 1200px、左右 padding 0.5rem（嵌入時無頂端列） */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 0.5rem;
    }

    /* 篩選區卡片 */
    .filter-section {
      background: #fff;
      padding: 1.5rem 1.75rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid #e5e7eb;
    }

    .filter-section .form-label {
      font-weight: 600;
      color: #475569;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }

    .filter-section .form-select {
      border-radius: 8px;
      border-color: #cbd5e1;
      font-size: 0.95rem;
    }

    .filter-section .form-select:focus {
      border-color: #0454a3;
      box-shadow: 0 0 0 3px rgba(4, 84, 163, 0.15);
    }

    .filter-section .btn {
      border-radius: 8px;
      font-weight: 600;
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
    }

    .filter-section #loadBtn {
      background: #0454a3;
      border-color: #0454a3;
    }

    .filter-section #loadBtn:hover {
      background: #034078;
      border-color: #034078;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(4, 84, 163, 0.25);
    }

    .filter-section #exportBtn {
      background: #0d9488;
      border-color: #0d9488;
      color: #fff;
    }

    .filter-section #exportBtn:hover {
      background: #0f766e;
      border-color: #0f766e;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(13, 148, 136, 0.25);
    }

    /* 表格區卡片 */
    .table-container {
      background: #fff;
      padding: 1.5rem 1.75rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }

    .table-container .table-responsive {
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .table-container .table {
      margin-bottom: 0;
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
    }

    .table-container .table thead th {
      background: #f8fafc;
      color: #475569;
      font-weight: 600;
      border-color: #e2e8f0;
      padding: 0.85rem 1rem;
      font-size: 1.05rem;
      text-align: center;
      vertical-align: middle;
    }

    /* 表格固定佈局，避免欄位被內容撐開 */
    .table-container .table {
      table-layout: fixed;
      width: 100%;
    }

    /* 欄寬：學號｜班級｜姓名｜Email｜履歷上傳｜志願填寫｜操作 */
    .table-container .table thead th:nth-child(1) { width: 10%; }
    .table-container .table thead th:nth-child(2) { width: 12%; }
    .table-container .table thead th:nth-child(3) { width: 8%; }
    .table-container .table thead th:nth-child(4) { width: 30%; }
    .table-container .table thead th:nth-child(5) { width: 11%; }
    .table-container .table thead th:nth-child(6) { width: 11%; }
    .table-container .table thead th:nth-child(7) { width: 10%; }

    .table-container .table tbody td {
      border-color: #e2e8f0;
      padding: 0.85rem 1rem;
      font-size: 1.05rem;
      text-align: center;
      vertical-align: middle;
    }

    /* Email 欄：過長時省略顯示，不跑到隔壁欄 */
    .table-container .table tbody td:nth-child(4) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .table-container .table tbody td:nth-child(4):hover {
      white-space: normal;
      overflow: visible;
      word-break: break-all;
    }

    /* 履歷上傳、志願填寫欄：內容不凸出、與表頭對齊 */
    .table-container .table tbody td:nth-child(5),
    .table-container .table tbody td:nth-child(6) {
      overflow: hidden;
      max-width: 0;
    }

    .table-container .table tbody td:nth-child(5) .badge,
    .table-container .table tbody td:nth-child(6) .badge {
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
      font-size: 0.95rem;
      padding: 0.35em 0.65em;
    }

    .table-container .table tbody td .btn {
      font-size: 1rem;
    }

    .table-container .table tbody tr:hover td {
      background-color: #f8fafc;
    }

    .table-container .table-striped > tbody > tr:nth-of-type(odd) > * {
      --bs-table-accent-bg: #fafbfc;
    }

    /* 圖表區卡片 */
    .chart-container {
      background: #fff;
      padding: 1.5rem 1.75rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid #e5e7eb;
    }

    .chart-container h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.5rem;
    }

    .chart-container p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 0;
    }

    .chart-container canvas {
      max-height: 300px;
    }

    /* 上中下區塊與中間圖表同寬 */
    .semester-filter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .semester-banner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0, 102, 204, 0.1);
      border: 1px solid #dbe4f4;
      border-radius: 8px;
      font-size: 1rem;
      color: #1f2937;
    }
    .semester-banner i {
      color: #0066cc;
    }

    .content-width-match {
      width: 100%;
    }

    /* 統計圖表區（三欄等寬） */
    #statsChartsContainer {
      display: flex !important;
      flex-wrap: nowrap;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    #statsChartsContainer > .stats-chart-container {
      flex: 1;
      min-width: 0;
    }

    .stats-chart-container {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    .stats-chart-container h5 {
      font-size: 1rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }

    /* 固定高度容器，搭配 Chart.js maintainAspectRatio: false 避免圖表凸出 */
    .stats-chart-canvas-wrap {
      height: 250px;
      min-height: 250px;
      position: relative;
      width: 100%;
    }

    .stats-chart-canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 768px) {
      #statsChartsContainer {
        flex-wrap: wrap;
      }
      #statsChartsContainer > .stats-chart-container {
        flex: 0 0 100%;
      }
    }

  </style>
</head>

<body class="p-0">
  <div class="container">
    <!-- 學期橫幅：與科助工作台一致，顯示目前系統學期 -->
    <div class="semester-filter-row">
      <div id="semesterBanner" class="semester-banner" role="status" aria-live="polite" style="display: none;">
        <i class="fa-solid fa-calendar-alt"></i>
        <span id="semesterText">載入學期中…</span>
      </div>
    </div>
    <div class="filter-section content-width-match">
      <div class="row align-items-end g-3">
        <div class="col-md-4">
          <label for="classSelect" class="form-label">選擇班級</label>
          <select id="classSelect" class="form-select">
            <option value="all" selected>所有班級</option>
          </select>
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary w-100" id="loadBtn">學生資料</button>
        </div>
        <div class="col-md-4">
          <button class="btn btn-success w-100" id="exportBtn">匯出 Excel</button>
        </div>
      </div>
    </div>

    <!-- 統計圖表區域（三張卡片等寬，canvas 固定高度 250px） -->
    <div id="statsChartsContainer" style="display: none;">
      <div class="stats-chart-container">
        <h5 class="text-center">🏢 各公司被選志願次數</h5>
        <div class="stats-chart-canvas-wrap">
          <canvas id="companyChart"></canvas>
        </div>
      </div>
      <div class="stats-chart-container">
        <h5 class="text-center">📄 履歷繳交率</h5>
        <div class="stats-chart-canvas-wrap">
          <canvas id="resumeChart"></canvas>
        </div>
      </div>
      <div class="stats-chart-container">
        <h5 class="text-center">🎯 志願序填寫率</h5>
        <div class="stats-chart-canvas-wrap">
          <canvas id="preferenceChart"></canvas>
        </div>
      </div>
    </div>

    <div id="classChartContainer" class="chart-container" style="display: none;">
      <h2>班級實習進度分析</h2>
      <p>請選擇一個班級以查看詳細實習統計圖表。</p>
    </div>

    <div class="table-container content-width-match">
      <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover align-middle">
          <thead>
            <tr>
              <th>學號</th>
              <th>班級</th>
              <th>姓名</th>
              <th>Email</th>
              <th>履歷上傳</th>
              <th>志願填寫</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            <tr>
              <td colspan="7" class="text-center text-muted">請選擇班級</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 學生詳情 Modal -->
  <div class="modal fade" id="studentDetailModal" tabindex="-1" aria-labelledby="studentDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content" style="font-size: 1.1rem;">
        <div class="modal-header">
          <h4 class="modal-title flex-grow-1" id="studentDetailModalLabel" style="font-size: 1.5rem; font-weight: bold;">學生詳情</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" style="font-size: 1.1rem;">
          <div class="mb-4">
            <h5 class="text-primary mb-3" style="font-size: 1.3rem; font-weight: bold;">學生基本資訊</h5>
            <p class="mb-2" style="font-size: 1.1rem;"><strong>學號：</strong><span id="modalStudentNumber"></span></p>
            <p class="mb-2" style="font-size: 1.1rem;"><strong>姓名：</strong><span id="modalStudentName"></span></p>
            <p class="mb-2" style="font-size: 1.1rem;"><strong>Email：</strong><span id="modalStudentEmail"></span></p>
            <p class="mb-0" style="font-size: 1.1rem;"><strong>班級：</strong><span id="modalStudentClass"></span></p>
          </div>
          <hr style="margin: 1.5rem 0;">
          <!-- 履歷資訊（在上） -->
          <div class="mb-4">
            <h5 class="text-primary mb-3" style="font-size: 1.3rem; font-weight: bold;">📄 履歷資訊</h5>
            <div id="modalResumeDetails" class="resume-details" style="max-height: 500px; overflow-y: auto; padding: 0.5rem; font-size: 1.05rem;">
              <p class="text-muted mb-0">載入中...</p>
            </div>
          </div>
          <hr style="margin: 1.5rem 0;">
          <!-- 志願序資訊（在下） -->
          <div class="mb-4">
            <h5 class="text-primary mb-3" style="font-size: 1.3rem; font-weight: bold;">🎯 志願序資訊</h5>
            <div id="modalPreferenceDetails" class="preference-details" style="max-height: 500px; overflow-y: auto; padding: 0.5rem; font-size: 1.05rem;">
              <p class="text-muted mb-0">載入中...</p>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-lg" data-bs-dismiss="modal" style="font-size: 1.1rem;">關閉</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let myClassChart = null; // 用於儲存單一班級 Chart 實例
    let companyChart, resumeChart, preferenceChart; // 用於儲存統計圖表實例
    let allClassesData = []; // 儲存所有班級資料
    let currentStudentsData = []; // 儲存當前顯示的學生資料
    let studentDetailModal = null; // Modal 實例


    // 學年由系統設定，已改為學期橫幅 + 固定使用目前學期，不再提供選擇學年

    // 從班級名稱中提取「忠」、「孝」等字
    function extractClassShortName(className) {
      const classNames = ['忠', '孝', '仁', '愛', '信', '義', '和', '平', '甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
      for (const name of classNames) {
        if (className.includes(name)) {
          return name;
        }
      }
      // 如果沒找到，嘗試移除數字和常見前綴
      let shortName = className.replace(/^[^忠孝仁愛信義和平甲乙丙丁戊己庚辛壬癸]+/, '');
      if (!shortName) {
        shortName = className.slice(-1);
      }
      return shortName;
    }

    // 載入所有班級資料
    async function loadAllClasses() {
      try {
        const res = await fetch("/ta/statistics/api/get_classes");
        const data = await res.json();
        
        if (data.success) {
          const rawClasses = data.classes || [];
          // 要排除的班級名稱（排除一、二、三年級，保留四年級）
          const excludedClasses = ['資一孝', '資二孝', '資三孝', '資一忠', '資二忠', '資三忠'];
          const allowedSemesterCodes = ['1132', '1142'];
          
          console.log('[DEBUG] 載入班級列表，排除:', excludedClasses);

          const normalizeClasses = classes => classes.map(c => {
            let semesterCode = '';
            if (c.semester_code) {
              semesterCode = String(c.semester_code);
            } else if (c.admission_year) {
              const yearStr = String(c.admission_year);
              semesterCode = yearStr.length >= 4 ? yearStr : `${yearStr}2`;
            }
            return {
              ...c,
              semester_code: semesterCode
            };
          });

          let normalized = normalizeClasses(rawClasses).filter(c => {
            const fullClassName = `${(c.department || '').replace('管科', '')}${c.name || ''}`;
            if (excludedClasses.some(excluded => fullClassName.includes(excluded))) {
              return false;
            }
            const semesterCode = c.semester_code || '';
            return semesterCode && allowedSemesterCodes.includes(semesterCode);
          });

          // 若依指定學年過濾後沒有資料，退回使用全部班級（仍排除指定班級）
          if (normalized.length === 0) {
            normalized = normalizeClasses(
              rawClasses.filter(c => {
                const fullClassName = `${(c.department || '').replace('管科', '')}${c.name || ''}`;
                return !excludedClasses.some(excluded => fullClassName.includes(excluded));
              })
            );
          }

          allClassesData = normalized;
        }
      } catch (error) {
        console.error("載入班級列表失敗:", error);
      }
    }

    // 學期代碼對應「班級列表」用：投遞/志願在 1131 完成，班級資料以實習學期 1132 表示，故 1131 時要顯示 1132 的班級
    function getEffectiveSemesterForClassList() {
      if (!currentSemesterCode || currentSemesterCode.length < 4) return currentSemesterCode;
      const last = currentSemesterCode.slice(-1);
      if (last === '1') return currentSemesterCode.slice(0, 3) + '2'; // 上學期 1131 → 用 1132 的班級
      return currentSemesterCode;
    }

    // 載入所有班級選項（不限學年，只顯示忠、孝兩班）
    function loadAllClassesOptions() {
      const classSelect = document.getElementById("classSelect");
      classSelect.innerHTML = '<option value="all" selected>所有班級</option>';
      classSelect.disabled = false;
      
      // 只顯示「忠」、「孝」兩班
      const allowedClasses = ['忠', '孝'];
      
      // 提取班級名稱（忠、孝等）
      const classMap = new Map(); // 用來去重（同一個班級名稱可能有多個班級ID）
      // 1131 時班級 API 只回傳 1132/1142，故用「對應實習學期」篩選班級
      const effectiveSemester = getEffectiveSemesterForClassList();
      const dataToUse = effectiveSemester
        ? allClassesData.filter(c => (c.semester_code || '') === effectiveSemester)
        : allClassesData;
      dataToUse.forEach(c => {
        const fullName = `${(c.department || '').replace('管科', '')}${c.name || ''}`;
        let classShortName = null;
        if (fullName.includes('忠')) {
          classShortName = '忠';
        } else if (fullName.includes('孝')) {
          classShortName = '孝';
        } else {
          // 退而求其次使用原邏輯辨識
          const extracted = extractClassShortName(fullName);
          if (allowedClasses.includes(extracted)) {
            classShortName = extracted;
          }
        }

        if (classShortName && allowedClasses.includes(classShortName)) {
          if (!classMap.has(classShortName)) {
            classMap.set(classShortName, []);
          }
          classMap.get(classShortName).push(c);
        }
      });
      
      // 依 allowedClasses 順序（忠、孝）加入
      allowedClasses.forEach(className => {
        const classes = classMap.get(className);
        if (classes && classes.length > 0) {
          // 選擇第一個匹配的班級
          const classData = classes[0];
          const option = document.createElement("option");
          option.value = classData.id;
          option.textContent = className; // 只顯示「忠」或「孝」
          classSelect.appendChild(option);
        }
      });
    }

    // 載入單一班級的統計圖表
    async function loadClassStats(classId, className, semesterCode = "all") {
      // 檢查 Chart.js 是否已載入
      if (typeof Chart === 'undefined') {
        console.error("Chart.js 未正確載入");
        return;
      }

      const chartContainer = document.getElementById("classChartContainer");

      // 處理「所有班級」的特殊情況
      if (classId === 'all') {
        chartContainer.style.display = 'none';
        if (myClassChart) { 
          myClassChart.destroy(); 
          myClassChart = null; 
        }
        return;
      }

      // 判斷是否為「1142孝班」，如果是則強制資料為 0
      const is1142Xiao = semesterCode === '1142' && className.includes('孝');

      // 顯示圖表容器
      chartContainer.style.display = 'block';

      // 清空並準備新的 Chart 元素
      chartContainer.innerHTML = '<h2>' + className + ' 實習統計分析</h2><canvas id="classStatsChart"></canvas>';

      try {
        let stats;
        
        // 如果是「1142孝班」，強制資料為 0
        if (is1142Xiao) {
          console.log('[DEBUG] 1142孝班：強制班級統計圖表資料為 0');
          stats = {
            total_students: 0,
            students_with_resume: 0,
            students_with_preference: 0,
            class_name: '所有孝班'
          };
        } else {
          // 呼叫新的 API 路由
          const res = await fetch(`/ta/statistics/api/get_class_stats/${classId}?semester_code=${semesterCode}`);
          const data = await res.json();
          
          if (!data.success) {
            if (myClassChart) { myClassChart.destroy(); myClassChart = null; }
            chartContainer.innerHTML = `<div class="text-danger">載入統計圖表失敗：${data.message}</div>`;
            return;
          }
          
          stats = data.stats;
        }

        console.log('[DEBUG] 班級統計資料:', stats);
        
        // 確保資料是數字
        const totalStudents = parseInt(stats.total_students) || 0;
        const studentsWithResume = parseInt(stats.students_with_resume) || 0;
        const studentsWithPreference = parseInt(stats.students_with_preference) || 0;
        
        console.log('[DEBUG] 圖表資料:', {
          totalStudents,
          studentsWithResume,
          studentsWithPreference
        });
        
        const ctx = document.getElementById('classStatsChart').getContext('2d');

        // 銷毀舊的 Chart 實例（如果存在）
        if (myClassChart) {
          myClassChart.destroy();
        }

        // 使用 Chart.js 繪製長條圖
        myClassChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['總學生數', '已上傳履歷', '已填寫志願'],
            datasets: [{

    // 目前系統學期（由學期橫幅 API 設定）
    let currentSemesterCode = '';
    let currentSemesterLabel = '';

    // 載入學期橫幅（與科助工作台相同樣式：以下名單為 1132 學期（113學年第2學期））
    async function loadCurrentSemesterBanner() {
      const banner = document.getElementById('semesterBanner');
      const textEl = document.getElementById('semesterText');
      if (!banner || !textEl) return;
      try {
        const res = await fetch('/admission/api/ta_dashboard_stats');
        const data = await res.json();
        if (data.success && data.semester_code) {
          currentSemesterCode = data.semester_code;
          currentSemesterLabel = data.semester_label || data.semester_code;
          textEl.innerHTML = '以下名單為 <strong>' + (currentSemesterCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')) + '</strong> 學期' + (currentSemesterLabel !== currentSemesterCode ? '（' + (currentSemesterLabel.replace(/</g, '&lt;').replace(/>/g, '&gt;')) + '）' : '');
          banner.style.display = 'inline-flex';
        } else {
          textEl.textContent = '目前系統學期（學期代碼：—）';
          banner.style.display = 'inline-flex';
        }
      } catch (e) {
        textEl.textContent = '無法載入學期';
        banner.style.display = 'inline-flex';
      }
    }

    // 載入學生資料
    async function loadStudents() {
      const classId = document.getElementById("classSelect").value;
      const className = document.getElementById("classSelect").options[document.getElementById("classSelect").selectedIndex].text;
      const tbody = document.getElementById("studentsTableBody");
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">載入中...</td></tr>`;

      if (!currentSemesterCode) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">請稍候，學期載入中…</td></tr>`;
        return;
      }

      // 「所有班級」時仍呼叫 API（class_id=all），後端會回傳全部學生
      const semesterCode = currentSemesterCode;

      try {
        console.log(`[DEBUG] 載入學生資料: class_id=${classId}, semester_code=${semesterCode}`);
        const url = `/ta/statistics/api/get_students_by_class?class_id=${classId}&semester_code=${semesterCode}`;
        console.log(`[DEBUG] API URL: ${url}`);
        
        const res = await fetch(url);
        console.log(`[DEBUG] API 回應狀態: ${res.status} ${res.statusText}`);
        
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        
        const data = await res.json();
        
        console.log('[DEBUG] API 返回資料:', JSON.stringify(data, null, 2));
        console.log('[DEBUG] 學生數量:', data.students ? data.students.length : 0);
        
        if (data.students && data.students.length > 0) {
          console.log('[DEBUG] 第一位學生完整資料:', JSON.stringify(data.students[0], null, 2));
        }

        if (!data.success) {
          let errorMsg = data.message || '載入失敗';
          if (errorMsg === '未授權' || res.status === 403) {
            errorMsg = '權限不足：此功能僅限科助和管理員使用。請確認您已以正確角色登入。';
          }
          console.error('[ERROR] API 返回錯誤:', errorMsg);
          tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">${errorMsg}</td></tr>`;
          return;
        }

        // 判斷是否為「1142孝班」，如果是則強制顯示為沒有資料
        const is1142Xiao = semesterCode === '1142' && className === '孝';
        
        // 如果是「1142孝班」，強制將資料設為空
        if (is1142Xiao) {
          data.students = [];
          console.log('[DEBUG] 1142孝班：強制顯示為沒有資料');
        }
        
        // 顯示學生列表表格（無論是否有資料，都要顯示版面）
        const tableContainer = document.querySelector('.table-container');
        if (tableContainer) tableContainer.style.display = 'block';
        
        if (!data.students || data.students.length === 0) {
          console.warn('[WARN] 沒有學生資料');
          // 顯示表格版面，但內容顯示「該班級沒有學生資料」
          tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">該班級沒有學生資料</td></tr>`;
          
          // 如果沒有學生資料，仍然顯示班級統計圖表（但資料為 0）
          const chartContainer = document.getElementById("classChartContainer");
          if (chartContainer) chartContainer.style.display = 'block';
          
          // 組合顯示名稱：學年+班級
          const displayName = `${semesterCode}${className}`;
          
          // 載入班級統計圖表（即使沒有學生，也會顯示 0）
          loadClassStats(classId, displayName, semesterCode);
          
          // 隱藏三個統計圖表（各公司被選志願次數、履歷繳交率、志願序填寫率）
          const statsContainer = document.getElementById("statsChartsContainer");
          if (statsContainer) statsContainer.style.display = 'none';
          if (companyChart) { companyChart.destroy(); companyChart = null; }
          if (resumeChart) { resumeChart.destroy(); resumeChart = null; }
          if (preferenceChart) { preferenceChart.destroy(); preferenceChart = null; }
          return; // 不繼續執行後續的三個統計圖表載入
        } else {
          console.log('[DEBUG] 開始渲染學生列表，共', data.students.length, '位學生');
          
          // 過濾掉「資三孝」的學生
          const filteredStudents = data.students.filter(s => {
            const studentClass = s.class_name ? `${s.department ? s.department.replace('管科', '') : ''}${s.class_name}` : '';
            // 隱藏「資三孝」的學生
            return !studentClass.includes('三孝');
          });
          
          console.log('[DEBUG] 過濾後學生數量:', filteredStudents.length, '(原始:', data.students.length, ')');
          
          // 如果過濾後沒有學生，顯示「該班級沒有學生資料」
          if (filteredStudents.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">該班級沒有學生資料</td></tr>`;
            currentStudentsData = []; // 清空學生資料
          } else {
            // 儲存學生資料供 Modal 使用
            currentStudentsData = filteredStudents;
            
            tbody.innerHTML = filteredStudents.map((s, index) => {
            // 調試輸出
            if (index === 0) {
              console.log('[DEBUG] 第一位學生資料範例:', {
                id: s.id,
                username: s.username,
                name: s.name,
                resume_count: s.resume_count,
                preference_count: s.preference_count,
                resumes: s.resumes ? s.resumes.length : 0,
                preferences: s.preferences ? s.preferences.length : 0
              });
            }
            
            const resumeStatus = (s.resume_count && s.resume_count > 0) ? 
              `<span class="badge bg-success">已上傳 (${s.resume_count})</span>` : 
              '<span class="badge bg-danger">未上傳</span>';
            const preferenceStatus = (s.preference_count && s.preference_count > 0) ? 
              `<span class="badge bg-success">已填寫 (${s.preference_count})</span>` : 
              '<span class="badge bg-danger">未填寫</span>';
            
            // 班級顯示：資管科X孝/忠（與 profile / user_management 一致：用「目前學年」與「學生入學屆數」動態算年級）
            const dept = (s.department || '').trim();
            const cname = (s.class_name || '').trim();
            let classDisplay = '—';
            if (dept || cname) {
              const ayRaw = s.admission_year != null && s.admission_year !== '' ? s.admission_year : null;
              const ay = ayRaw != null ? parseInt(String(ayRaw), 10) : NaN;
              const sy = currentSemesterCode && currentSemesterCode.length >= 3 ? parseInt(currentSemesterCode.substring(0, 3), 10) : NaN;
              const gradeNum = (!isNaN(sy) && !isNaN(ay)) ? (sy - ay + 1) : NaN;
              const gradeLabels = ['一', '二', '三', '四', '五', '六'];
              const gradeChar = (gradeNum >= 1 && gradeNum <= 6) ? gradeLabels[gradeNum - 1] : (gradeNum > 0 ? String(gradeNum) : '');
              classDisplay = dept + (gradeChar || '') + (cname || '');
            }
            
            return `
              <tr class="student-row" data-student-id="${s.id}">
                <td>${s.username}</td>
                <td>${classDisplay}</td>
                <td>${s.name || '—'}</td>
                <td>${s.email || 'N/A'}</td>
                <td>${resumeStatus}</td>
                <td>${preferenceStatus}</td>
                <td>
                  <button class="btn btn-sm btn-info view-details" data-index="${index}">查看詳情</button>
                </td>
              </tr>
            `;
            }).join("");
          }
          
          // 綁定查看詳情按鈕 - 開啟 Modal
          document.querySelectorAll('.view-details').forEach(btn => {
            btn.addEventListener('click', function() {
              const index = parseInt(this.getAttribute('data-index'));
              if (currentStudentsData && currentStudentsData[index]) {
                showStudentDetailModal(currentStudentsData[index]);
              }
            });
          });
        }

        // 顯示班級統計圖表
        const chartContainer = document.getElementById("classChartContainer");
        if (chartContainer) chartContainer.style.display = "block";
        
        // 組合顯示名稱：學年+班級
        const displayName = `${semesterCode}${className}`;
        
        // 載入班級統計圖表
        loadClassStats(classId, displayName, semesterCode);
        
        // 顯示三個統計圖表容器
        const statsContainer = document.getElementById("statsChartsContainer");
        if (statsContainer) statsContainer.style.display = "flex";
        
        // 載入統計圖表（三個圖表）
        loadStatsCharts(classId, semesterCode);

        // 內容更新後通知父層高度，讓 iframe 擴張
        setTimeout(notifyParentHeight, 200);
        setTimeout(notifyParentHeight, 1000);
      } catch (error) {
        console.error("載入學生資料失敗:", error);
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">伺服器錯誤，載入失敗。</td></tr>`;
      }
      setTimeout(notifyParentHeight, 300);
    }

    // 載入統計圖表（三個圖表：各公司被選志願次數、履歷繳交率、志願序填寫率）
    async function loadStatsCharts(classId = "all", semesterCode = "all") {
      console.log('[DEBUG] loadStatsCharts 被調用:', { classId, semesterCode });
      
      // 檢查 Chart.js 是否已載入
      if (typeof Chart === 'undefined') {
        console.error("Chart.js 未正確載入，請檢查網路連線或瀏覽器設定");
        const statsContainer = document.getElementById("statsChartsContainer");
        if (statsContainer) {
          statsContainer.innerHTML = '<div class="alert alert-warning">圖表庫載入失敗，請重新整理頁面或檢查瀏覽器設定</div>';
          statsContainer.style.display = "block";
        }
        return;
      }

      const statsContainer = document.getElementById("statsChartsContainer");
      
      // 顯示統計圖表容器
      if (statsContainer) {
        statsContainer.style.display = "flex";
        console.log('[DEBUG] 顯示統計圖表容器');
      } else {
        console.error('[ERROR] 找不到 statsChartsContainer');
        return;
      }
      
      // 確保圖表元素存在
      const companyChartEl = document.getElementById("companyChart");
      const resumeChartEl = document.getElementById("resumeChart");
      const preferenceChartEl = document.getElementById("preferenceChart");
      
      if (!companyChartEl || !resumeChartEl || !preferenceChartEl) {
        console.error('[ERROR] 找不到圖表元素:', {
          companyChart: !!companyChartEl,
          resumeChart: !!resumeChartEl,
          preferenceChart: !!preferenceChartEl
        });
        return;
      }
      
      const params = new URLSearchParams();
      if (classId && classId !== "all") params.append("class_id", classId);
      if (semesterCode && semesterCode !== "all") params.append("semester_code", semesterCode);
      const url = params.toString() ? `/ta/statistics/api/manage_companies_stats?${params.toString()}` : "/ta/statistics/api/manage_companies_stats";

      console.log('[DEBUG] 載入統計圖表，URL:', url);

      try {
        const res = await fetch(url);
        const data = await res.json();

        console.log('[DEBUG] 統計圖表資料:', data);

        if (!data.success) {
          console.error("載入統計資料失敗：" + data.message);
          return;
        }

        // 各公司被選志願次數
        const companies = data.top_companies && data.top_companies.length > 0 
          ? data.top_companies.map(c => c.company_name) 
          : [];
        const counts = data.top_companies && data.top_companies.length > 0 
          ? data.top_companies.map(c => c.preference_count) 
          : [];
        
        console.log('[DEBUG] 公司資料:', { companies, counts });

        // 確保圖表元素存在（已在函數開頭檢查過）
        if (companyChart) companyChart.destroy();
        
        // 如果沒有公司資料，顯示空圖表
        if (companies.length === 0) {
          console.warn('[WARN] 沒有公司資料，顯示空圖表');
          companyChart = new Chart(companyChartEl, {
            type: "bar",
            data: {
              labels: ["無資料"],
              datasets: [{ label: "志願次數", data: [0], backgroundColor: "#cccccc" }]
            },
            options: { 
              responsive: true,
              maintainAspectRatio: false,
              scales: { y: { beginAtZero: true } },
              plugins: {
                legend: { display: false }
              }
            }
          });
        } else {
          console.log('[DEBUG] 創建公司圖表，資料:', { companies, counts });
          companyChart = new Chart(companyChartEl, {
            type: "bar",
            data: {
              labels: companies,
              datasets: [{ label: "志願次數", data: counts, backgroundColor: "#4e79a7" }]
            },
            options: { 
              responsive: true,
              maintainAspectRatio: false,
              scales: { y: { beginAtZero: true } },
              plugins: {
                legend: { display: false }
              }
            }
          });
          console.log('[DEBUG] 公司圖表已創建');
        }

        // 履歷繳交率
        const resumeUploaded = data.resume_stats?.uploaded || 0;
        const resumeNotUploaded = data.resume_stats?.not_uploaded || 0;
        const resumeData = [resumeUploaded, resumeNotUploaded];
        const resumeTotal = resumeData.reduce((a, b) => a + b, 0);

        console.log('[DEBUG] 履歷資料:', { resumeUploaded, resumeNotUploaded, resumeTotal });

        // 確保圖表元素存在（已在函數開頭檢查過）
        if (resumeChart) resumeChart.destroy();
        
        resumeChart = new Chart(resumeChartEl, {
          type: "doughnut",
          data: {
            labels: ["已上傳", "未上傳"],
            datasets: [{ 
              data: resumeData, 
              backgroundColor: ["#59a14f", "#e15759"] 
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { 
                position: 'bottom',
                display: true
              },
              tooltip: {
                enabled: resumeTotal > 0,
                callbacks: {
                  label: function (context) {
                    const value = context.raw || 0;
                    const percent = resumeTotal > 0 ? ((value / resumeTotal) * 100).toFixed(1) + '%' : '0%';
                    return `${context.label}: ${value} (${percent})`;
                  }
                }
              }
            },
            animation: {
              animateRotate: resumeTotal > 0
            }
          },
          plugins: [{
            id: 'emptyDataPlugin',
            afterDraw: (chart) => {
              if (resumeTotal === 0) {
                const ctx = chart.ctx;
                const width = chart.width;
                const height = chart.height;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#666';
                ctx.fillText('目前無資料', width / 2, height / 2);
                ctx.restore();
              }
            }
          }]
        });
        console.log('[DEBUG] 履歷圖表已創建');

        // 志願序填寫率
        const prefFilled = data.preference_stats?.filled || 0;
        const prefNotFilled = data.preference_stats?.not_filled || 0;
        const prefData = [prefFilled, prefNotFilled];
        const prefTotal = prefData.reduce((a, b) => a + b, 0);

        console.log('[DEBUG] 志願序資料:', { prefFilled, prefNotFilled, prefTotal });

        // 確保圖表元素存在（已在函數開頭檢查過）
        if (preferenceChart) preferenceChart.destroy();
        
        preferenceChart = new Chart(preferenceChartEl, {
          type: "doughnut",
          data: {
            labels: ["已填寫", "未填寫"],
            datasets: [{ 
              data: prefData, 
              backgroundColor: ["#edc948", "#bab0ab"] 
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { 
                position: 'bottom',
                display: true
              },
              tooltip: {
                enabled: prefTotal > 0,
                callbacks: {
                  label: function (context) {
                    const value = context.raw || 0;
                    const percent = prefTotal > 0 ? ((value / prefTotal) * 100).toFixed(1) + '%' : '0%';
                    return `${context.label}: ${value} (${percent})`;
                  }
                }
              }
            },
            animation: {
              animateRotate: prefTotal > 0
            }
          },
          plugins: [{
            id: 'emptyDataPlugin',
            afterDraw: (chart) => {
              if (prefTotal === 0) {
                const ctx = chart.ctx;
                const width = chart.width;
                const height = chart.height;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#666';
                ctx.fillText('目前無資料', width / 2, height / 2);
                ctx.restore();
              }
            }
          }]
        });
        console.log('[DEBUG] 志願序圖表已創建');
        console.log('[DEBUG] 所有圖表已成功載入');
      } catch (error) {
        console.error("載入統計圖表失敗:", error);
        if (statsContainer) statsContainer.style.display = "none";
      }
    }

    // 事件監聽
    document.getElementById("loadBtn").addEventListener("click", loadStudents);
    
    // 當班級選擇改變時自動載入資料
    document.getElementById("classSelect").addEventListener("change", function() {
      const classId = this.value;
      // 先隱藏圖表容器，等待資料載入後再決定是否顯示

        const chartContainer = document.getElementById("classChartContainer");

        if (resumeChart) { resumeChart.destroy(); resumeChart = null; }

    // 顯示學生詳情 Modal
    function showStudentDetailModal(student) {
      // 初始化 Modal（如果尚未初始化）
      if (!studentDetailModal) {
        const modalElement = document.getElementById('studentDetailModal');
        studentDetailModal = new bootstrap.Modal(modalElement);
      }
      
      // 設定學生基本資訊
      document.getElementById('modalStudentNumber').textContent = student.username || 'N/A';
      document.getElementById('modalStudentName').textContent = student.name || 'N/A';
      document.getElementById('modalStudentEmail').textContent = student.email || 'N/A';
      
      // 顯示學生的實際班級
      const studentClass = student.class_name ? 
        `${student.department ? student.department.replace('管科', '') : ''}${student.class_name}` : 
        '未分班';
      document.getElementById('modalStudentClass').textContent = studentClass;
      
      // 履歷詳細資訊
      const resumeDetails = student.resumes && student.resumes.length > 0 ? 
        student.resumes.map(r => `
          <div class="mb-3 p-4 border rounded bg-light" style="font-size: 1.05rem;">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <strong class="text-primary" style="font-size: 1.2rem;">履歷</strong>
              <span class="badge ${r.status === 'approved' ? 'bg-success' : r.status === 'rejected' ? 'bg-danger' : 'bg-warning'}" style="font-size: 1rem; padding: 0.5rem 0.75rem;">
                ${r.status === 'approved' ? '已審核' : r.status === 'rejected' ? '已退件' : '待審核'}
              </span>
            </div>
            <div style="font-size: 1.05rem;">
              <div class="mb-2">⏰ <strong>上傳時間:</strong> ${r.created_at || 'N/A'}</div>
              ${r.reviewed_at ? `<div class="mb-2">✅ <strong>審核時間:</strong> ${r.reviewed_at}</div>` : ''}
              ${r.reject_reason ? `<div class="mb-2 text-danger">⚠️ <strong>退件原因:</strong> ${r.reject_reason}</div>` : ''}
            </div>
            <div class="mt-3">
              <a href="/api/download_resume/${r.id}" class="btn btn-primary btn-sm" download>
                <i class="fas fa-download"></i> 下載履歷
              </a>
            </div>
          </div>
        `).join('') : 
        '<div class="text-center p-5"><p class="text-muted mb-0" style="font-size: 1.1rem;">無履歷資料</p></div>';
      document.getElementById('modalResumeDetails').innerHTML = resumeDetails;
      
      // 志願序詳細資訊（按志願順序排序）
      const sortedPreferences = student.preferences && student.preferences.length > 0 ? 
        [...student.preferences].sort((a, b) => (a.preference_order || 0) - (b.preference_order || 0)) : [];
      const preferenceDetails = sortedPreferences.length > 0 ? 
        sortedPreferences.map(p => `
          <div class="mb-3 p-4 border rounded bg-light" style="font-size: 1.05rem;">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <strong class="text-primary" style="font-size: 1.2rem;">志願 #${p.preference_order}</strong>
            </div>
            <div style="font-size: 1.05rem;">
              <div class="mb-2"><strong>公司:</strong> ${p.company_name || 'N/A'}</div>
              <div class="mb-2"><strong>職位:</strong> ${p.job_title || p.job_title_full || 'N/A'}</div>
              <div class="mb-2 text-muted">⏰ <strong>提交時間:</strong> ${p.submitted_at || 'N/A'}</div>
            </div>
          </div>
        `).join('') : 
        '<div class="text-center p-5"><p class="text-muted mb-0" style="font-size: 1.1rem;">無志願序資料</p></div>';
      document.getElementById('modalPreferenceDetails').innerHTML = preferenceDetails;
      
      // 顯示 Modal
      studentDetailModal.show();
    }

    // 通知父層（iframe 嵌入時）內容高度，讓 iframe 擴張以完整呈現、無需滾輪
    function notifyParentHeight() {
      try {
        const h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'iframe-resize', height: h }, '*');
        }
      } catch (e) {}
    }
    function setupHeightNotify() {
      notifyParentHeight();
      setTimeout(notifyParentHeight, 400);
      setTimeout(notifyParentHeight, 1200);
      try {
        const ro = new ResizeObserver(() => notifyParentHeight());
        ro.observe(document.body);
      } catch (e) {}
    }

    // 初始載入：先載入學期橫幅（取得目前系統學期），再載入班級選項
    async function initialize() {
      await loadCurrentSemesterBanner();
      await loadAllClasses();
      loadAllClassesOptions();
      setupHeightNotify();
    }
    
    initialize();
  </script>
</body>
