<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>智慧實習平台 | 通知中心</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0454a3;
      color: white;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.5rem;
    }

    /* 三條線選單按鈕樣式 */
    .top-bar-left {
      position: fixed;
      top: 1.3rem;
      left: 10rem;
      z-index: 1100;
    }

    .top-bar-left #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }

    .top-bar-left #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --muted: #6b7280;
      --primary: #0454a3;
      --glass: rgba(255, 255, 255, 0.85);
      --accent: #0b5ed7;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #f0f4f8, #e8f0f8 120px);
      margin: 0;
      padding: 0;
      padding-top: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 2rem auto;
      margin-top: 2rem;
      border-radius: 12px;
    }


    /* 【修改】app-shell 為單欄，並調整最大寬度 */
    .app-shell {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      /* 單欄 */
      gap: 1rem;
    }

    /* header */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .topbar .title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f1724;
    }

    .topbar .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* left column - main list */
    .left-panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), #ffffff 40%);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(13, 52, 122, 0.08);
      min-height: 70vh;
      overflow: auto;
      position: relative;
    }

    .unread-badge {
      position: absolute;
      top: 12px;
      right: 16px;
      background: #ff4d4f;
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 77, 79, 0.25);
      z-index: 10;
    }

    .unread-badge span {
      font-weight: 700;
    }

    .unread-badge.inline {
      position: static;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* 搜尋/篩選列 */
    .search-filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef6ff;
      flex-wrap: wrap;
    }

    #searchInput {
      padding: 6px 12px;
      height: 38px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      flex-grow: 1;
      max-width: 360px;
    }

    /* filter row */
    .chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 6px 18px rgba(13, 110, 253, 0.12)
    }

    .chip.outline {
      background: transparent;
      border: 1px solid #e6eefb;
      color: var(--muted)
    }

    /* group header */
    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 6px;
      padding: 8px 10px;
      border-radius: 10px;
      background: linear-gradient(90deg, rgba(248, 250, 252, 0.8), rgba(240, 247, 255, 0.8));
      border: 1px solid #e0e8f5;
      font-weight: 600;
    }

    .group-title {
      font-size: 0.95rem;
      color: #0b2540;
    }

    .sort-btn-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sort-btn {
      padding: 4px 6px;
      line-height: 1;
      border-radius: 4px;
      background: transparent;
      border: none;
      color: var(--muted);
      transition: color 0.1s ease;
    }

    .sort-btn:hover {
      color: var(--accent);
    }

    .sort-btn.active {
      color: var(--primary);
      font-weight: 700;
    }

    /* notification card */
    .notif-card {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #ffffff;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e8f0f8;
      margin-bottom: 10px;
      transition: transform .12s ease, box-shadow .12s ease;
      cursor: pointer;
    }

    .notif-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(13, 52, 122, 0.06);
    }

    .notif-left {
      min-width: 48px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(180deg, #eff6ff, #fff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--accent);
      border: 1px solid #e6eefb;
    }

    .notif-body {
      flex: 1;
    }

    .notif-meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .notif-title {
      font-weight: 700;
      margin-bottom: 6px;
      color: #0f1724;
    }

    .badge-tag {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 999px;
      margin-right: 6px;
    }

    /* unread style - 未讀為白色 */
    .notif-unread {
      border-left: 4px solid var(--primary);
      background: #ffffff;
    }

    /* read style - 已讀為灰色 */
    .notif-read {
      background: #f5f5f5;
      border-left: 4px solid transparent;
    }

    /* pinned */
    .pin-icon {
      color: #b5c7ff;
    }

    .pinned {
      border-left-color: #ffbf00 !important;
    }

    /* 科助「時程」類別中的公告顏色區分 */
    .notif-card.announcement-not-started {
      border-left-color: #0d6efd !important;  /* 藍色：未開始 */
      background: linear-gradient(90deg, rgba(13, 110, 253, 0.05), #ffffff);
    }

    .notif-card.announcement-ended {
      border-left-color: #6c757d !important;  /* 灰色：已結束 */
      background: linear-gradient(90deg, rgba(108, 117, 125, 0.05), #f5f5f5);
      opacity: 0.85;
    }

    /* detail small buttons */
    .meta-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* 【移除】右側面板和 Drawer 樣式 */
    .right-panel,
    .drawer {
      display: none !important;
    }

    /* small helpers */
    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 0.85rem;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* unread counter badge - 樣式已由 .unread-badge 統一處理 */

    /* tiny input style */
    input[type="date"] {
      height: 38px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #e6eefb;
      background: white;
    }

    /* 側邊選單樣式 */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }

    #side-menu.open {
      transform: translateX(0);
    }

    #side-menu .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 0;
    }

    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff;
      padding: 0;
      line-height: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
    }

    #close-btn {
      position: absolute;
      top: 2rem;
      right: 1.6rem;
      font-size: 1.8rem;
      font-weight: bold;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      line-height: 2.4rem;
      height: 2.5rem;
      width: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0;
      margin: 0;
    }

    #menu-content {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.1rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }

    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    /* 科助專用按鈕區域 */
    #ta-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef6ff;
    }
    
    #ta-actions .btn {
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* 美化發布類型選擇 Modal */
    #publishTypeModal .modal-dialog {
      max-width: 500px;
    }

    #publishTypeModal .modal-content {
      border-radius: 16px;
      border: none;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      background: white;
    }

    #publishTypeModal .modal-header {
      background: linear-gradient(135deg, #0454a3 0%,  #0454a3 100%);
      color: white;
      border-bottom: none;
      padding: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #publishTypeModal .modal-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    }

    #publishTypeModal .modal-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
      text-align: center;
      flex: 1;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
    }

    #publishTypeModal .modal-header .btn-close {
      position: relative;
      z-index: 1;
      margin-left: auto;
    }

    #publishTypeModal .btn-close {
      filter: brightness(0) invert(1);
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

    #publishTypeModal .btn-close:hover {
      opacity: 1;
    }

    #publishTypeModal .modal-body {
      padding: 2rem 1.5rem;
      background: white;
    }

    /* 美化選項按鈕 */
    #publishTypeModal .option-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      border: 2px solid #e8f0f8;
      background: white;
      color: #0f1724;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-align: center;
      width: 100%;
    }

    #publishTypeModal .option-btn .icon {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    #publishTypeModal .option-btn:hover .icon {
      transform: scale(1.1);
    }

    #publishTypeModal .option-btn.announcement {
      border-color: #0d6efd;
      background: white;
      color: #0d6efd;
    }

    #publishTypeModal .option-btn.announcement:hover {
      border-color: #0d6efd;
      background: #0d6efd;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(13, 110, 253, 0.3);
    }

    #publishTypeModal .option-btn.deadline {
      border-color: #198754;
      background: white;
      color: #198754;
    }

    #publishTypeModal .option-btn.deadline:hover {
      border-color: #198754;
      background: #198754;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(25, 135, 84, 0.3);
    }

    #publishTypeModal .option-btn:active {
      transform: translateY(0);
    }

    /* ========== 通知詳情彈窗美化 ========== */
    #notifModal .modal-content {
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(13, 52, 122, 0.15);
      overflow: hidden;
    }
    #notifModal .modal-header {
      background: linear-gradient(135deg, #0454a3 0%, #0b6bb3 100%);
      color: #fff;
      padding: 1rem 1.25rem;
      border-bottom: none;
    }
    #notifModal .modal-header .modal-title {
      font-weight: 600;
      font-size: 1.1rem;
    }
    #notifModal .modal-header .btn-close {
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    #notifModal .modal-body {
      padding: 1.25rem 1.5rem;
      background: #fafbfd;
      min-height: 80px;
    }
    #notifModal .notif-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #e8eef5;
    }
    #notifModal .notif-meta i { font-size: 1rem; }
    #notifModal .notif-content {
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      border: 1px solid #e8eef5;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
      color: #1e293b;
    }
    #notifModal .notif-attachments {
      margin-top: 1rem;
    }
    #notifModal .notif-attachments-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    #notifModal .notif-attachments-imgs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    #notifModal .notif-attach-img-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
      padding: 0.5rem;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #notifModal .notif-attach-img-wrap img {
      max-width: 200px;
      max-height: 160px;
      object-fit: contain;
      border-radius: 6px;
      display: block;
    }
    #notifModal .notif-download-img {
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
    }
    #notifModal .notif-attachments-files {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    #notifModal .notif-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.9rem;
      font-size: 0.875rem;
      color: #0454a3;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    #notifModal .notif-download-btn:hover {
      background: #0454a3;
      color: #fff;
      border-color: #0454a3;
    }
    #notifModal .modal-footer {
      padding: 0.9rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e8eef5;
      gap: 0.5rem;
    }

    /* ========== 新增公告表單彈窗美化 ========== */
    #annModal .modal-content {
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(13, 52, 122, 0.12);
      overflow: hidden;
    }
    #annModal .modal-header {
      background: linear-gradient(135deg, #0454a3 0%, #0b6bb3 100%);
      color: #fff;
      padding: 1rem 1.25rem;
      border-bottom: none;
    }
    #annModal .modal-header .modal-title {
      font-weight: 600;
      font-size: 1.15rem;
    }
    #annModal .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 0.9; }
    #annModal .modal-body {
      padding: 1.25rem 1.5rem;
      background: #f8fafc;
      max-height: 75vh;
      overflow-y: auto;
    }
    #annModal .form-label {
      font-weight: 500;
      color: #334155;
      margin-bottom: 0.35rem;
    }
    #annModal .form-control, #annModal .form-select {
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }
    #annModal .form-control:focus, #annModal .form-select:focus {
      border-color: #0454a3;
      box-shadow: 0 0 0 3px rgba(4, 84, 163, 0.15);
    }
    #annModal .ann-form-section {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid #e2e8f0;
    }
    #annModal .ann-form-section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0454a3;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #annModal .ann-upload-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 0.75rem;
      background: #f8fafc;
      transition: border-color 0.2s, background 0.2s;
    }
    #annModal .ann-upload-zone:hover {
      border-color: #0454a3;
      background: #eff6ff;
    }
    #annModal .ann-upload-zone input[type="file"] {
      font-size: 0.875rem;
    }
    #annModal .ann-time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    #annModal .modal-footer {
      padding: 0.9rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      gap: 0.5rem;
    }
    #annModal .btn-primary {
      background: linear-gradient(135deg, #0454a3 0%, #0b6bb3 100%);
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <header>通知中心</header>
  <div class="top-bar-left">
    <button id="menu-btn" title="選單" role="button" tabindex="0" aria-label="開啟側邊選單">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  <div class="container">

    <div class="app-shell">

      <div class="left-panel">

        <div class="unread-badge" id="unreadBadgeTopRight">
          未讀 <span id="unreadCounterTopRight">0</span>
        </div>

        <!-- 科助專用按鈕區域（在搜尋框上方靠右對齊） -->
        <div id="ta-actions" style="display: none; justify-content: flex-end; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
          <button id="btn-publish" class="btn btn-primary">➕ 發布公告</button>
        </div>

        <div class="search-filter-row">
          <input id="searchInput" placeholder="搜尋（標題/內容）" type="text">

          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
              aria-expanded="false" id="filterDropdownBtn">
              <span id="currentFilterLabel">全部</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item active" href="#" data-filter="all">全部</a></li>
              <li><a class="dropdown-item" href="#" data-filter="unread">未讀</a></li>
              <li><a class="dropdown-item" href="#" data-filter="read">已讀</a></li>
              <li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item text-danger" href="#" id="clearPinned">清除所有置頂</a></li>
            </ul>
          </div>

          <!-- 科助專用：狀態下拉選單 -->
          <div class="dropdown" id="statusDropdown" style="display: none;">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
              aria-expanded="false" id="statusDropdownBtn">
              <span id="currentStatusLabel">進行中</span>
            </button>
            <ul class="dropdown-menu">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ---------- 初始狀態 ----------
    let allNotifications = [];   // 系統自動通知（來自 notifications 表）
    let announcementList = [];   // 科助新增的公告（來自 announcement 表，僅在「公告」頁籤顯示）
    let visibleNotifications = [];
    let pinnedSet = new Set(JSON.parse(localStorage.getItem('notif_pinned') || '[]'));
    let currentCategoryFilter = 'all';
    let currentReadFilter = 'all';
    let currentStatusFilter = 'ongoing'; // 預設為「進行中」
    let currentSortOrder = 'desc';

    // 元件
    const listContainer = document.getElementById('listContainer');
    const searchInput = document.getElementById('searchInput');
    const unreadCounterTopRight = document.getElementById('unreadCounterTopRight');
    const unreadCounterSearchRow = document.getElementById('unreadCounterSearchRow');
    const currentFilterLabel = document.getElementById('currentFilterLabel');

    // modal components
    const notifModal = new bootstrap.Modal(document.getElementById('notifModal'), {});
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalLink = document.getElementById('modalLink');
    const modalDelete = document.getElementById('modalDelete'); // 新增刪除按鈕元件

    // helper: format date & relative group
    function formatDateTime(d) {
      const dt = new Date(d);
      return dt.toLocaleString('zh-TW', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    // helper: 將類別轉換為中文顯示
    function getCategoryLabel(category, title = '') {
      // 如果標題包含「公告」，優先顯示為「公告」（兼容舊數據）
      if (title && title.includes('公告') && !title.includes('面試通知') && !title.includes('錄取通知')) {
        return '公告';
      }
      
      const categoryMap = {
        'announcement': '公告',
        'resume': '履歷',
        'ranking': '志願序',
        'company': '實習公司',
        'experience': '實習心得',
        'intern_experience': '實習心得',  // 兼容不同的類別名稱
        'matching': '媒合',
        'approval': '時程',
        'general': '一般',
        'preferences': '志願序'  // 兼容舊的 preferences 類別
      };
      return categoryMap[category] || category || '一般';
    }

    function groupLabelForDate(d) {
      const dt = new Date(d);
      const today = new Date();
      // 確保只比較日期部分
      const diff = (today.setHours(0, 0, 0, 0) - new Date(dt).setHours(0, 0, 0, 0)) / (24 * 3600 * 1000);
      if (diff === 0) return '今天';
      if (diff === 1) return '昨天';
      if (diff <= 6) return '本週';
      return '更早之前';
    }

    // 載入科助新增的公告（announcement 表），僅在「公告」頁籤使用
    async function loadAnnouncements() {
      try {
        const res = await fetch('/announcement/api/list');
        const data = await res.json();
        if (!data.success || !Array.isArray(data.data)) {
          announcementList = [];
          return;
        }
        announcementList = (data.data || []).map(a => ({
          id: 'ann_' + a.id,
          title: a.title || '(無標題)',
          message: (a.content || '').slice(0, 200),
          category: 'announcement',
          link_url: '/view_announcement/' + a.id,
          url: '/view_announcement/' + a.id,
          start_time: a.start_time || null,
          end_time: a.end_time || null,
          created_at: a.created_at || new Date().toISOString(),
          is_read: true,
          pinned: false,
          tags: []
        }));
        announcementList.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      } catch (err) {
        console.error('載入公告列表失敗:', err);
        announcementList = [];
      }
    }

    // fetch notifications（系統自動通知，來自 notifications 表）
    async function loadNotifications() {
      try {
        const res = await fetch('/api/my_notifications');
        const data = await res.json();
        if (!data.success) {
          listContainer.innerHTML = `<div class="alert alert-danger">${data.message || '讀取失敗'}</div>`;
          return;
        }

        allNotifications = data.notifications.map(n => {
          const title = n.title || '(無標題)';
          const category = n.category || 'general';
          // 優先使用後端返回的 category，只有在 category 為 'general' 或空時才根據標題判斷
          let finalCategory = category;
          
          // 如果 category 為 'general' 或空，才根據標題自動判斷（兼容舊數據）
          if (!category || category === 'general') {
            // 如果標題包含「媒合」，將類別設為 "matching"
            if (title.includes('媒合')) {
              finalCategory = 'matching';
            }
            // 如果標題包含「志願序」，將類別設為 "ranking"
            else if (title.includes('志願序')) {
              finalCategory = 'ranking';
            }
            // 如果標題包含「履歷」，將類別設為 "resume"
            else if (title.includes('履歷') || title.includes('resume')) {
              finalCategory = 'resume';
            }
            // 如果標題包含「公告」，將類別設為 "announcement"
            else if (title.includes('公告') && !title.includes('面試通知') && !title.includes('錄取通知')) {
              finalCategory = 'announcement';
            }
            // 如果標題包含「實習心得」，將類別設為 "experience"
            else if (title.includes('實習心得') || title.includes('心得退件') || title.includes('心得審核')) {
              finalCategory = 'experience';
            }
          }
          
          // 如果後端返回的 category 是 'approval' 但標題包含「媒合」，則改為 'matching'
          if (category === 'approval' && title.includes('媒合')) {
            finalCategory = 'matching';
          }
          
          return {
            id: n.id,
            title: title,
            message: n.message || '',
            category: finalCategory,
            tags: n.tags || (n.tag ? [n.tag] : []),
            is_read: !!n.is_read,
            created_at: n.created_at || n.createdAt || new Date().toISOString(),
            url: n.url || n.link || null,
            link_url: n.link_url || n.url || n.link || null,  // 保存 link_url 用於提取公告 ID
            start_time: n.start_time || null,  // 保存公告的開始時間
            end_time: n.end_time || null,  // 保存公告的結束時間
            meta: n.meta || {}
          };
        });

        allNotifications.forEach(n => { n.pinned = pinnedSet.has(String(n.id)); });

        // sort: pinned first, then unread, then newest
        allNotifications.sort((a, b) => {
          if ((a.pinned ? 1 : 0) !== (b.pinned ? 1 : 0)) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
          if ((a.is_read ? 1 : 0) !== (b.is_read ? 1 : 0)) return (a.is_read ? 1 : 0) - (b.is_read ? 1 : 0);
          return new Date(b.created_at) - new Date(a.created_at);
        });

        render();
      } catch (err) {
        console.error(err);
        listContainer.innerHTML = `<div class="alert alert-danger">無法載入通知</div>`;
      }
    }

    // render list with grouping
    function render() {
      const keyword = (searchInput.value || '').trim().toLowerCase();
      const now = new Date();
      const isTA = document.getElementById('ta-actions')?.style.display === 'flex';

      // 1. 篩選：「公告」頁籤只顯示 announcement 表（科助新增）；其餘頁籤顯示 notifications 表
      if (currentCategoryFilter === 'announcement') {
        visibleNotifications = announcementList.filter(n => {
          let isStarted = true;
          if (n.start_time) {
            try { isStarted = new Date(n.start_time) <= now; } catch (e) { isStarted = true; }
          }
          let isEnded = false;
          if (n.end_time) {
            try { isEnded = new Date(n.end_time) < now; } catch (e) { isEnded = false; }
          }
          if (isTA) {
            if (currentStatusFilter === 'ongoing') { if (!isStarted || isEnded) return false; }
            else if (currentStatusFilter === 'not-started') { if (isStarted) return false; }
            else if (currentStatusFilter === 'ended') { if (!isEnded) return false; }
          } else {
            if (!isStarted || isEnded) return false;
          }
          if (keyword) {
            const hay = (n.title + ' ' + (n.message || '')).toLowerCase();
            if (!hay.includes(keyword)) return false;
          }
          return true;
        });
      } else {
        visibleNotifications = allNotifications.filter(n => {
        // 判斷公告是否已開始
        let isStarted = true;  // 預設為已開始
        if (n.start_time) {
          try {
            const startTime = new Date(n.start_time);
            isStarted = startTime <= now;
          } catch (e) {
            // 如果時間解析失敗，預設為已開始
            isStarted = true;
          }
        }
        
        // 判斷公告是否已結束
        let isEnded = false;
        if (n.end_time) {
          try {
            const endTime = new Date(n.end_time);
            isEnded = endTime < now;
          } catch (e) {
            // 如果時間解析失敗，預設為未結束
            isEnded = false;
          }
        }
        
        // 判斷是否為公告
        const isAnnouncement = n.category === 'announcement' || 
          (n.title.includes('公告') && !n.title.includes('面試通知') && !n.title.includes('錄取通知'));
        
        // 類別篩選：如果選擇「公告」或「實習心得」，也要包含標題包含相關關鍵字的通知（兼容舊數據）
        if (currentCategoryFilter !== 'all') {
          if (currentCategoryFilter === 'matching') {
            // 媒合類別：只顯示媒合相關的通知
            const isMatching = n.category === 'matching' || 
              n.title.includes('媒合') || n.message.includes('媒合');
            if (!isMatching) return false;
          } else if (currentCategoryFilter === 'experience') {
            // 實習心得類別：只顯示實習心得相關的通知
            const isExperience = n.category === 'experience' || n.category === 'intern_experience' ||
              n.title.includes('實習心得') || n.title.includes('心得退件') || n.title.includes('心得審核');
            if (!isExperience) return false;
          } else if (currentCategoryFilter === 'announcement') {
            // 公告類別：只顯示公告
            if (!isAnnouncement) return false;
            // 科助：根據狀態篩選
            if (isTA) {
              if (currentStatusFilter === 'ongoing') {
                // 進行中：已開始且未結束
                if (!isStarted || isEnded) return false;
              } else if (currentStatusFilter === 'not-started') {
                // 未開始：尚未開始
                if (isStarted) return false;
              } else if (currentStatusFilter === 'ended') {
                // 已結束：已結束
                if (!isEnded) return false;
              }
            } else {
              // 其他角色：只顯示已開始且未結束的公告
              if (!isStarted || isEnded) return false;
            }
          } else if (currentCategoryFilter === 'approval') {
            // 時程類別（僅科助可見）
            if (!isAnnouncement) return false;
            if (isTA) {
              // 科助：根據狀態篩選顯示對應的公告
              if (currentStatusFilter === 'not-started') {
                // 選擇「未開始」：只顯示未開始的公告
                if (isStarted) return false;
              } else if (currentStatusFilter === 'ended') {
                // 選擇「已結束」：只顯示已結束的公告
                if (!isEnded) return false;
              } else {
                // 預設：顯示未開始的公告 + 已結束的公告（排除進行中的）
                if (isStarted && !isEnded) return false;
              }
            } else {
              // 其他角色不應該看到「時程」類別，但為了安全起見還是過濾
              return false;
            }
          } else {
            // 其他類別：嚴格匹配（狀態篩選不適用於非公告類別）
            if (n.category !== currentCategoryFilter) return false;
          }
        } else {
          // 「全部通知」：根據狀態篩選顯示
          if (isTA && isAnnouncement) {
            // 科助在「全部通知」中，根據狀態篩選顯示公告
            if (currentStatusFilter === 'ongoing') {
              // 進行中：已開始且未結束
              if (!isStarted || isEnded) return false;
            } else if (currentStatusFilter === 'not-started') {
              // 未開始：尚未開始
              if (isStarted) return false;
            } else if (currentStatusFilter === 'ended') {
              // 已結束：已結束
              if (!isEnded) return false;
            }
          } else if (isAnnouncement && (!isStarted || isEnded)) {
            // 其他角色：「全部通知」只顯示已開始且未結束的公告
            return false;
          }
        }
        
        // 其他角色：排除已結束的公告（非科助）
        if (!isTA && isAnnouncement && isEnded) {
          return false;
        }
        
        if (currentReadFilter === 'unread' && n.is_read) return false;
        if (currentReadFilter === 'read' && !n.is_read) return false;
        if (currentReadFilter === 'pinned' && !n.pinned) return false;
        if (keyword) {
          const hay = (n.title + ' ' + n.message).toLowerCase();
          if (!hay.includes(keyword)) return false;
        }
        return true;
      });
      }

      // 2. 分組
      const groups = {};
      visibleNotifications.forEach(n => {
        const g = groupLabelForDate(n.created_at);
        if (!groups[g]) groups[g] = [];
        groups[g].push(n);
      });

      // 3. 渲染
      listContainer.innerHTML = '';
      if (visibleNotifications.length === 0) {
        listContainer.innerHTML = `<div class="alert alert-warning text-center">找不到符合條件的通知。</div>`;
        updateUnreadBadge();
        return;
      }

      // 確保分組順序：今天、昨天、本週、更早
      const order = ['今天', '昨天', '本週', '更早之前'];
      order.forEach(label => {
        if (!groups[label]) return;
        const section = document.createElement('div');

        // 應用當前排序到該組通知
        const currentGroup = groups[label];
        currentGroup.sort((a, b) => {
          const dateA = new Date(a.created_at);
          const dateB = new Date(b.created_at);
          return currentSortOrder === 'desc' ? dateB - dateA : dateA - dateB;
        });

        // Group Header
        const header = document.createElement('div');
        header.className = 'group-header';

        const sortControls = document.createElement('div');
        sortControls.className = 'sort-btn-group';
        sortControls.innerHTML = `
            <div class="small muted">按時間排序</div>
            <button class="sort-btn ${currentSortOrder === 'desc' ? 'active' : ''}" data-sort-order="desc" title="降冪排序（新到舊）">
                <i class="bi-arrow-down-short"></i>
            </button>
            <button class="sort-btn ${currentSortOrder === 'asc' ? 'active' : ''}" data-sort-order="asc" title="升冪排序（舊到新）">
                <i class="bi-arrow-up-short"></i>
            </button>
        `;

        // 排序按鈕事件
        sortControls.querySelector('[data-sort-order="desc"]').onclick = () => { currentSortOrder = 'desc'; render(); };
        sortControls.querySelector('[data-sort-order="asc"]').onclick = () => { currentSortOrder = 'asc'; render(); };

        const titleSpan = document.createElement('div');
        titleSpan.className = 'group-title';
        titleSpan.innerHTML = `${label} <span class="muted small">（${currentGroup.length}）</span>`;

        header.appendChild(titleSpan);
        header.appendChild(sortControls);
        section.appendChild(header);

        const groupBody = document.createElement('div');
        groupBody.style.marginTop = '8px';

        // render notifications in this group
        currentGroup.forEach(n => {
          const card = document.createElement('div');
          
          // 判斷公告狀態（僅對科助在「時程」類別中）
          let announcementStatus = '';
          const isTACheck = document.getElementById('ta-actions')?.style.display === 'flex';
          const isApprovalCategoryCheck = currentCategoryFilter === 'approval';
          const isAnnouncementCheck = n.category === 'announcement' || 
            (n.title.includes('公告') && !n.title.includes('面試通知') && !n.title.includes('錄取通知'));
          
          if (isTACheck && isApprovalCategoryCheck && isAnnouncementCheck) {
            const now = new Date();
            let isStarted = true;
            let isEnded = false;
            
            if (n.start_time) {
              try {
                const startTime = new Date(n.start_time);
                isStarted = startTime <= now;
              } catch (e) {
                isStarted = true;
              }
            }
            
            if (n.end_time) {
              try {
                const endTime = new Date(n.end_time);
                isEnded = endTime < now;
              } catch (e) {
                isEnded = false;
              }
            }
            
            if (!isStarted) {
              announcementStatus = ' announcement-not-started';
            } else if (isEnded) {
              announcementStatus = ' announcement-ended';
            }
          }
          
          card.className = 'notif-card ' + (n.is_read ? 'notif-read' : 'notif-unread') + (n.pinned ? ' pinned' : '') + announcementStatus;
          card.dataset.id = n.id;

          const left = document.createElement('div'); left.className = 'notif-left';
          const avatar = document.createElement('div'); avatar.className = 'avatar';
          // 根據標題內容決定顯示的字：錄取通知顯示「錄」，履歷相關顯示「履」，面試通知顯示「面」，媒合相關顯示「媒」
          let avatarText = '';
          const title = n.title || '';
          const category = n.category || '';
          if (title.includes('錄取')) {
            avatarText = '錄';
          } else if (title.includes('履歷')) {
            avatarText = '履';
          } else if (title.includes('面試')) {
            avatarText = '面';
          } else if (title.includes('媒合') || category === 'matching') {
            avatarText = '媒';
          } else {
            // 其他情況取第一個非符號的字
            const firstChar = title.replace(/^[【\[\]()（）\s]+/, '').slice(0, 1);
            avatarText = firstChar || title.slice(0, 1) || '';
          }
          avatar.innerText = avatarText;
          left.appendChild(avatar);

          const body = document.createElement('div'); body.className = 'notif-body';
          const t = document.createElement('div'); t.className = 'notif-title';
          // tag badges
          let tagHtml = '';
          if (n.tags && n.tags.length) {
            n.tags.forEach(tag => {
              tagHtml += `<span class="badge bg-light text-muted badge-tag">#${tag}</span>`;
            });
          }
          t.innerHTML = `${tagHtml} ${n.title}`;
          const meta = document.createElement('div'); meta.className = 'notif-meta d-flex justify-content-between align-items-center';
          meta.innerHTML = `<div class="small muted">${getCategoryLabel(n.category, n.title)}</div><div class="small muted">${formatDateTime(n.created_at)}</div>`;

          body.appendChild(t);
          body.appendChild(meta);

          // actions area
          const actions = document.createElement('div');
          actions.className = 'meta-actions ms-2';

          // 【移除】標為已讀按鈕

          const btnPin = document.createElement('button');
          btnPin.className = 'btn btn-sm btn-outline-secondary';
          btnPin.innerHTML = '<i class="bi-pin-angle"></i>';
          btnPin.title = '置頂';
          btnPin.onclick = (e) => { e.stopPropagation(); togglePin(n.id); };

          // 如果是科助，添加編輯按鈕
          const isTA = document.getElementById('ta-actions')?.style.display === 'flex';
          const isAnnouncement = n.category === 'announcement' || 
            (n.title.includes('公告') && !n.title.includes('面試通知') && !n.title.includes('錄取通知'));
          
          // 檢查是否為履歷或志願序截止時間公告
          const isResumeDeadline = n.title && (n.title.includes('[作業]') || n.title.includes('作業')) && 
            (n.title.includes('上傳履歷截止時間') || n.title.includes('履歷截止時間'));
          const isPrefDeadline = n.title && (n.title.includes('[作業]') || n.title.includes('作業')) && 
            (n.title.includes('填寫志願序截止時間') || n.title.includes('志願序截止時間'));
          
          if (isTA && isAnnouncement) {
            const btnEdit = document.createElement('button');
            btnEdit.className = 'btn btn-sm btn-outline-primary me-1';
            btnEdit.innerHTML = '<i class="bi-pencil"></i>';
            btnEdit.title = '編輯公告';
            btnEdit.onclick = async (e) => { 
              e.stopPropagation(); 
              // 如果是截止時間公告，使用專門的編輯函數
              if (isResumeDeadline) {
                await editDeadlineFromNotification(n, 'resume');
              } else if (isPrefDeadline) {
                await editDeadlineFromNotification(n, 'pref');
              } else {
                // 其他公告使用一般編輯函數
                await editAnnouncementFromNotification(n);
              }
            };
            actions.appendChild(btnEdit);
          }

          const btnMore = document.createElement('button');
          btnMore.className = 'btn btn-sm btn-outline-secondary';
          btnMore.innerHTML = '<i class="bi-three-dots"></i>';
          btnMore.title = '詳細/操作';
          btnMore.onclick = (e) => { e.stopPropagation(); showModal(n); }; // 【修改】開啟 Modal

          actions.appendChild(btnPin);
          actions.appendChild(btnMore);

          // combine
          card.appendChild(left);
          card.appendChild(body);
          card.appendChild(actions);

          // whole card click opens modal (detailed)
          card.addEventListener('click', () => { showModal(n); });

          groupBody.appendChild(card);
        });

        section.appendChild(groupBody);
        listContainer.appendChild(section);
      });

      updateUnreadBadge();
    }

    // ---------- 操作函式 ----------
    async function markRead(id) {
      const item = allNotifications.find(x => String(x.id) === String(id));
      if (!item || item.is_read) return;
      item.is_read = true;
      render();
      try { await fetch(`/api/mark_read/${id}`, { method: 'POST' }); } catch (err) { console.warn('markRead api failed', err); }
    }

    function togglePin(id) {
      const item = allNotifications.find(x => String(x.id) === String(id));
      if (!item) return;
      item.pinned = !item.pinned;
      if (item.pinned) pinnedSet.add(String(id)); else pinnedSet.delete(String(id));
      localStorage.setItem('notif_pinned', JSON.stringify(Array.from(pinnedSet)));

      allNotifications.sort((a, b) => {
        if ((a.pinned ? 1 : 0) !== (b.pinned ? 1 : 0)) return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
        if ((a.is_read ? 1 : 0) !== (b.is_read ? 1 : 0)) return (a.is_read ? 1 : 0) - (b.is_read ? 1 : 0);
        return new Date(b.created_at) - new Date(a.created_at);
      });
      render();
    }

    async function deleteNotif(id) {
      if (!confirm('確定要刪除這則通知？')) return;
      // 公告頁籤的項目來自 announcement 表，刪除時呼叫公告 API
      if (String(id).startsWith('ann_')) {
        const annId = id.replace(/^ann_/, '');
        try {
          const res = await fetch(`/announcement/api/delete/${annId}`, { method: 'DELETE' });
          const data = await res.json();
          if (data.success) {
            await loadAnnouncements();
            render();
            notifModal.hide();
          } else {
            alert('刪除失敗：' + (data.message || '未知錯誤'));
          }
        } catch (err) {
          console.warn('delete announcement failed', err);
          alert('刪除失敗');
        }
        return;
      }
      allNotifications = allNotifications.filter(x => String(x.id) !== String(id));
      render();
      try { await fetch(`/api/notification/delete/${id}`, { method: 'DELETE' }); } catch (err) { console.warn('delete api failed', err); }
      notifModal.hide(); // 刪除後關閉 Modal
    }

    // 【修改】show bootstrap modal
    async function showModal(n) {
      // 【需求】點開 Modal 時自動標為已讀（僅系統通知；公告表無讀取狀態）
      if (!String(n.id).startsWith('ann_') && !n.is_read) markRead(n.id);

      modalTitle.innerText = n.title;
      
      // 處理消息內容，修復不完整的時間格式
      let messageText = n.message || '';
      let annAttachments = [];  // 公告附件（來自 announcement_attachments），供下方顯示
      // 若此則通知對應一則公告（公告頁籤的 ann_ 或 全部通知裡 link_url=/view_announcement/XX），向 API 取得完整內容與附件
      let annId = null;
      if (String(n.id).startsWith('ann_')) annId = n.id.replace(/^ann_/, '');
      else if (n.url || n.link_url) {
        const m = (n.url || n.link_url).match(/\/view_announcement\/(\d+)/);
        if (m) annId = m[1];
      }
      if (annId) {
        try {
          const res = await fetch(`/announcement/api/get/${annId}`);
          const result = await res.json();
          if (result.success && result.data) {
            if (result.data.content != null) messageText = result.data.content;
            if (result.data.attachments && Array.isArray(result.data.attachments)) annAttachments = result.data.attachments;
          }
        } catch (e) { /* 保留 n.message */ }
      }
      
      // 如果是履歷或志願序相關的公告，嘗試從公告詳情獲取完整的截止時間
      const isResumeOrPrefAnnouncement = (n.title && (
        n.title.includes('上傳履歷截止時間') || 
        n.title.includes('履歷截止時間') ||
        n.title.includes('填寫志願序截止時間') ||
        n.title.includes('志願序截止時間')
      )) || (messageText && (
        messageText.includes('上傳履歷') || 
        messageText.includes('填寫志願序')
      ));
      
      if (isResumeOrPrefAnnouncement) {
        // 檢查消息中是否有不完整的時間格式（如 P26-01-27 08:43 或 26-01-27 08:43）
        const incompleteTimePattern = /[Pp]?\d{2}-\d{2}-\d{2}\s+\d{2}:\d{2}/;
        if (incompleteTimePattern.test(messageText)) {
          // 嘗試從 link_url 提取公告 ID 並獲取完整的截止時間
          let annId = null;
          if (n.url || n.link_url) {
            const linkUrl = n.url || n.link_url;
            const match = linkUrl.match(/\/view_announcement\/(\d+)/);
            if (match) {
              annId = parseInt(match[1]);
            }
          }
          
          if (annId) {
            try {
              const res = await fetch(`/announcement/api/get/${annId}`);
              const result = await res.json();
              
              if (result.success && result.data && result.data.end_time) {
                // 格式化完整的截止時間
                const endTime = new Date(result.data.end_time);
                const formattedTime = endTime.toLocaleString('zh-TW', {
                  year: 'numeric',
                  month: '2-digit',
                  day: '2-digit',
                  hour: '2-digit',
                  minute: '2-digit',
                  hour12: false
                }).replace(/\//g, '-');
                
                // 替換消息中的不完整時間格式
                messageText = messageText.replace(
                  /(上傳履歷的|填寫志願序的)\s*[Pp]?\d{2}-\d{2}-\d{2}\s+\d{2}:\d{2}/,
                  `$1截止時間為:${formattedTime}`
                );
                
                // 如果替換後仍然沒有「截止時間為:」，則添加
                if (!messageText.includes('截止時間為:')) {
                  messageText = messageText.replace(
                    /(上傳履歷的|填寫志願序的)([^,，。\n]*)/,
                    `$1截止時間為:${formattedTime}$2`
                  );
                }
              }
            } catch (error) {
              console.error('獲取公告詳情失敗:', error);
              // 即使獲取失敗，也嘗試修復明顯的格式問題
              messageText = messageText.replace(
                /(上傳履歷的|填寫志願序的)\s*[Pp]?(\d{2}-\d{2}-\d{2}\s+\d{2}:\d{2})/,
                '$1截止時間為:20$2'
              );
            }
          } else {
            // 如果無法獲取公告ID，嘗試修復明顯的格式問題
            messageText = messageText.replace(
              /(上傳履歷的|填寫志願序的)\s*[Pp]?(\d{2}-\d{2}-\d{2}\s+\d{2}:\d{2})/,
              '$1截止時間為:20$2'
            );
          }
        }
      }
      
      // 顯示通知內容（美化解構）；若有附件則以圖片區＋下載按鈕呈現，且不顯示「前往內容」
      messageText = messageText.replace(/\n/g, '<br>');
      const hasAttachments = annAttachments.length > 0;
      const imgAtt = hasAttachments ? annAttachments.filter(a => (a.file_type || '').toLowerCase() === 'image' || /\.(png|jpg|jpeg|gif|webp)$/i.test(a.file_path || a.file_name || '')) : [];
      const fileAtt = hasAttachments ? annAttachments.filter(a => !imgAtt.includes(a)) : [];
      let attachmentsBlock = '';
      if (hasAttachments) {
        attachmentsBlock = '<div class="notif-attachments"><div class="notif-attachments-title"><i class="bi bi-paperclip"></i>附件</div>';
        if (imgAtt.length) {
          attachmentsBlock += '<div class="notif-attachments-imgs">';
          imgAtt.forEach(a => {
            const path = (a.file_path || a.url || '').replace(/"/g, '&quot;');
            const name = (a.file_name || a.filename || '圖片').replace(/</g, '&lt;').replace(/"/g, '&quot;');
            attachmentsBlock += `<div class="notif-attach-img-wrap"><img src="${path}" alt="${name}" title="${name}"><a href="${path}" download="${name}" target="_blank" rel="noopener" class="notif-download-btn notif-download-img"><i class="bi bi-download"></i>${name}</a></div>`;
          });
          attachmentsBlock += '</div>';
        }
        if (fileAtt.length) {
          attachmentsBlock += '<div class="notif-attachments-files">';
          fileAtt.forEach(a => {
            const path = (a.file_path || a.url || '').replace(/"/g, '&quot;');
            const name = (a.file_name || a.filename || '下載檔案').replace(/</g, '&lt;').replace(/"/g, '&quot;');
            attachmentsBlock += `<a href="${path}" download="${name}" target="_blank" rel="noopener" class="notif-download-btn"><i class="bi bi-download"></i>${name}</a>`;
          });
          attachmentsBlock += '</div>';
        }
        attachmentsBlock += '</div>';
      }
      const metaLabel = getCategoryLabel(n.category, n.title);
      modalBody.innerHTML = `
        <div class="notif-meta">
          <i class="bi bi-clock"></i><span>${formatDateTime(n.created_at)}</span>
          <i class="bi bi-tag"></i><span>${metaLabel}</span>
        </div>
        <div class="notif-content">${messageText || '<span class="text-muted">無文字內容</span>'}</div>
        ${attachmentsBlock}
      `;

      // 有圖片/檔案時不顯示「前往內容」，改由附件下載按鈕操作
      if (!hasAttachments && n.url) {
        modalLink.href = n.url;
        modalLink.style.display = 'inline-flex';
        modalLink.onclick = () => { notifModal.hide(); };
      } else {
        modalLink.style.display = 'none';
      }

      // 處理「刪除」按鈕
      modalDelete.onclick = () => { deleteNotif(n.id); };

      notifModal.show();
    }

    // 計算「可見」未讀數：排除已結束、未開始的公告（與主頁鈴鐺、後端 unread_count 一致）
    function getVisibleUnreadCount() {
      const now = new Date();
      return allNotifications.filter(n => {
        if (n.is_read) return false;
        const hasAnnouncementTime = n.start_time != null || n.end_time != null;
        if (!hasAnnouncementTime) return true; // 非公告一律計入
        let isStarted = true;
        if (n.start_time) {
          try { isStarted = new Date(n.start_time) <= now; } catch (e) { isStarted = true; }
        }
        let isEnded = false;
        if (n.end_time) {
          try { isEnded = new Date(n.end_time) < now; } catch (e) { isEnded = false; }
        }
        return isStarted && !isEnded;
      }).length;
    }

    // unread badge update（顯示與主頁鈴鐺相同的可見未讀數）
    function updateUnreadBadge() {
      const count = getVisibleUnreadCount();
      // 更新右上角徽章（其他角色）
      if (unreadCounterTopRight) {
        unreadCounterTopRight.innerText = count;
      }
      // 更新搜尋欄旁的徽章（科助）
      if (unreadCounterSearchRow) {
        unreadCounterSearchRow.innerText = count;
      }
      // 更新類別旁的徽章（如果存在）
      const unreadCounterTA = document.getElementById('unreadCounterTA');
      if (unreadCounterTA) {
        unreadCounterTA.innerText = count;
      }
      document.title = count ? `(${count}) 通知中心` : '通知中心';
    }


    // ---------- 事件處理與初始化 ----------

    // search input
    searchInput.addEventListener('input', () => render());

    // 下拉選單篩選邏輯
    document.querySelectorAll('#filterDropdownBtn').forEach(btn => {
      const menu = btn.nextElementSibling;
      if (menu) {
        menu.querySelectorAll('a').forEach(item => {

              e.currentTarget.classList.add('active');

              // 更新按鈕標籤

              render();
            }
          });
        });
      }
    });

    // 狀態下拉選單篩選邏輯（在頁面載入時綁定）
    function bindStatusDropdownEvents() {
      const statusDropdownBtn = document.getElementById('statusDropdownBtn');
      if (statusDropdownBtn) {
        const statusMenu = statusDropdownBtn.nextElementSibling;
        if (statusMenu) {
          // 移除舊的事件監聽器（如果有的話）
          statusMenu.querySelectorAll('a').forEach(item => {
            const newItem = item.cloneNode(true);
            item.parentNode.replaceChild(newItem, item);
          });
          
          // 重新綁定事件
          statusMenu.querySelectorAll('a').forEach(item => {
            item.addEventListener('click', (e) => {
              e.preventDefault();
              e.stopPropagation();
              const status = e.currentTarget.dataset.status;
              if (status) {
                currentStatusFilter = status;
                statusMenu.querySelectorAll('a').forEach(i => i.classList.remove('active'));
                e.currentTarget.classList.add('active');

                // 更新按鈕標籤
                const currentStatusLabel = document.getElementById('currentStatusLabel');
                if (currentStatusLabel) {
                  currentStatusLabel.innerText = e.currentTarget.innerText.trim();
                }

                // 根據選擇的狀態自動切換到對應的類別頁面
                if (status === 'ongoing') {
                  // 選擇「進行中」→ 跳轉到「全部通知」類別
                  currentCategoryFilter = 'all';
                  document.querySelectorAll('#categoryFilter .chip').forEach(b => b.classList.remove('active'));
                  const allChip = document.querySelector('#categoryFilter .chip[data-category="all"]');
                  if (allChip) {
                    allChip.classList.add('active');
                  }
                } else if (status === 'not-started' || status === 'ended') {
                  // 選擇「未開始」或「已結束」→ 跳轉到「時程」類別

    async function editDeadlineFromNotification(notification, type) {

          if (match) {
            annId = parseInt(match[1]);
          }
        } else if (String(notification.id).startsWith('ann_')) {

        }
        
        if (!annId) {
          alert('無法獲取公告ID');
          return;
        }
        
        // 獲取公告詳情
        const res = await fetch(`/announcement/api/get/${annId}`);
        const result = await res.json();
        
        if (!result.success || !result.data) {
          alert('無法載入公告詳情：' + (result.message || '未知錯誤'));
          return;
        }
        
        const ann = result.data;
        
        // 根據類型選擇對應的 Modal
        if (type === 'resume') {
          // 確保 Modal 已初始化
          if (!resumeDeadlineModal) {
            resumeDeadlineModal = new bootstrap.Modal(document.getElementById('resumeDeadlineModal'));

          document.getElementById('resume-title').value = ann.title || '[作業]上傳履歷截止時間';
          document.getElementById('resume-content').value = ann.content || '';
          
          // 格式化時間為 datetime-local 格式
          if (ann.start_time) {
            let startTimeStr = ann.start_time;
            if (startTimeStr.includes(' ')) {
              startTimeStr = startTimeStr.replace(' ', 'T').substring(0, 16);
            } else if (startTimeStr.includes('T')) {
              startTimeStr = startTimeStr.substring(0, 16);
            }
            document.getElementById('resume-start').value = startTimeStr;
          } else {
            document.getElementById('resume-start').value = '';
          }
          
          if (ann.end_time) {
            let endTimeStr = ann.end_time;
            if (endTimeStr.includes(' ')) {
              endTimeStr = endTimeStr.replace(' ', 'T').substring(0, 16);
            } else if (endTimeStr.includes('T')) {
              endTimeStr = endTimeStr.substring(0, 16);
            }
            document.getElementById('resume-end').value = endTimeStr;
          } else {
            document.getElementById('resume-end').value = '';

          // 載入發送對象

            } else if (startTimeStr.includes('T')) {

            }
            document.getElementById('pref-start').value = startTimeStr;
          } else {

          if (ann.end_time) {

            if (endTimeStr.includes(' ')) {
              endTimeStr = endTimeStr.replace(' ', 'T').substring(0, 16);
            } else if (endTimeStr.includes('T')) {

            }

          } else {

          // 載入發送對象
          const prefTargetRoles = document.getElementById('pref-target-roles');
          if (prefTargetRoles) {
            prefTargetRoles.value = '';
            if (ann.target_roles && Array.isArray(ann.target_roles) && ann.target_roles.length > 0) {
              const firstRole = ann.target_roles[0];

              if (option) {

              }

      window.renderAnnUploadedList = function renderAnnUploadedList() {
        const imageList = document.getElementById('ann-image-list');
        const fileList = document.getElementById('ann-file-list');
        const images = annUploadedList.filter(x => x.is_image);
        const files = annUploadedList.filter(x => !x.is_image);
        imageList.innerHTML = images.map((x, i) => {
          const idx = annUploadedList.indexOf(x);
          return `<span class="d-inline-block position-relative"><img src="${x.url}" alt="" style="max-width:120px;max-height:80px;object-fit:contain;border:1px solid #ddd;border-radius:6px;"><button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0" style="transform:translate(50%,-50%);" data-remove-idx="${idx}" aria-label="移除">×</button></span>`;
        }).join('');
        fileList.innerHTML = files.map((x, i) => {
          const idx = annUploadedList.indexOf(x);
          return `<span class="me-2"><a href="${x.url}" target="_blank">${x.filename}</a> <button type="button" class="btn btn-link btn-sm text-danger p-0" data-remove-idx="${idx}">移除</button></span>`;
        }).join('');
        imageList.querySelectorAll('[data-remove-idx]').forEach(btn => {
          btn.addEventListener('click', () => { annUploadedList.splice(parseInt(btn.getAttribute('data-remove-idx')), 1); renderAnnUploadedList(); });
        });
        fileList.querySelectorAll('[data-remove-idx]').forEach(btn => {

            if (!wasInApprovalCategory) {

              currentCategoryFilter = 'all';
              currentReadFilter = 'all';
              document.querySelectorAll('#categoryFilter .chip').forEach(b => b.classList.remove('active'));
              document.querySelector('#categoryFilter .chip[data-category="all"]')?.classList.add('active');
              document.querySelectorAll('.dropdown-menu a').forEach(i => i.classList.remove('active'));
              document.querySelector('.dropdown-menu a[data-filter="all"]')?.classList.add('active');
              currentFilterLabel.innerText = '全部';
            }
            
            // 重置編輯 ID
            editId = null;
            
            // 重新載入通知與公告列表（公告頁籤顯示 announcement 表）
            await Promise.all([loadNotifications(), loadAnnouncements()]);
            alert('儲存成功！' + (isEditing ? '公告已更新。' : '新通知已出現在列表中。'));
          } else {
            alert('儲存失敗：' + (result.message || '未知錯誤'));
          }
        } catch (error) {
          console.error('儲存公告失敗:', error);
          alert('儲存失敗，請稍後再試');
        }
      };
    }

    // ---------- 動態生成選單 ----------image.png
    function renderMenu() {
      const menuContent = document.getElementById('menu-content');

              taActions.style.display = 'flex';

            if (approvalFilter) {
              approvalFilter.style.display = 'block';

            if (statusDropdown) {
              statusDropdown.style.display = 'block';
              // 重新綁定狀態下拉選單事件（確保事件正確綁定）
              setTimeout(() => {
                bindStatusDropdownEvents();

            // 科助：隱藏右上角徽章，顯示搜尋欄旁的徽章，隱藏類別旁的徽章
            if (unreadBadgeTopRight) {
              unreadBadgeTopRight.style.display = 'none';
            }
            if (unreadBadgeSearchRow) {
              unreadBadgeSearchRow.style.display = 'flex';

            }

              taActions.style.display = 'none';

              unreadBadgeTopRight.style.display = 'block';
            }

              unreadBadgeSearchRow.style.display = 'none';

              currentCategoryFilter = 'all';
              document.querySelectorAll('#categoryFilter .chip').forEach(b => b.classList.remove('active'));
              document.querySelector('#categoryFilter .chip[data-category="all"]')?.classList.add('active');
              render();

            // 廠商選單
            menuItems = [
              { href: '/vendor_home', text: '首頁' },
              { href: '/profile', text: '個人資料' },
              { href: '/vendor_review_resume', text: '學生履歷審核' },
              { href: '/manage_positions', text: '職位需求管理' },
              { href: '/manage_positions/new', text: '新增職缺' },

              { href: '/publish_announcements', text: '發布公告' },

          } else if (displayRole === '班導師') {
            // 班導師選單（班導有自己的主頁 /class_teacher_home）
            // 使用 display_role 判斷當前是否以班導身份登入

          }

          menuContent.innerHTML = menuItems.map(item => 
            `<a href="${item.href}">${item.text}</a>`

        })
        .catch(err => {
          console.error('獲取用戶資料失敗:', err);

    // init
    (async function init() {
      await Promise.all([loadNotifications(), loadAnnouncements()]);
      // 【移除】refreshTagList();

      // 動態生成選單
      renderMenu();

      // 側邊選單控制
      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');

      if (menuBtn) {
        menuBtn.addEventListener('click', () => {
          if (sideMenu) {
            sideMenu.classList.add('open');
            sideMenu.setAttribute('aria-hidden', 'false');
          }
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          if (sideMenu) {
            sideMenu.classList.remove('open');
            sideMenu.setAttribute('aria-hidden', 'true');
          }
        });
      }

      // 點擊選單外部關閉選單
      document.addEventListener('click', (e) => {
        if (sideMenu && menuBtn) {
          if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target) && sideMenu.classList.contains('open')) {
            sideMenu.classList.remove('open');
            sideMenu.setAttribute('aria-hidden', 'true');
          }
        }
      });
    })();

  </script>
