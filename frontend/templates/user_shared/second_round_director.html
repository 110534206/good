<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧實習平台 | 二輪分發</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --sr-primary: #0055a8;
      --sr-primary-light: #006acb;
      --sr-bg: #f7f9fc;
      --sr-card: #ffffff;
      --sr-border: #e2e8f0;
      --sr-text: #1f2933;
      --sr-muted: #64748b;
      --sr-success: #16a34a;
      --sr-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --sr-radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background: var(--sr-bg);
      color: var(--sr-text);
      min-height: 100vh;
      margin: 0;
    }
    header {
      background: #0454a3;
      border-bottom: none;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }
    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }
    #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      flex: 1;
    }
    .topbar h1 .header-title {
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1300;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }
    #side-menu.open { transform: translateX(0); }
    #close-btn {
      position: absolute;
      top: 3.2rem;
      right: 1.6rem;
      font-size: 1.6rem;
      font-weight: bold;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      height: 1.6rem;
      width: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transform: translateY(-50%);
    }
    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff;
      padding: 0;
      line-height: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
    }
    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.1rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.18);
      color: #fff;
    }
    .sr-main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .sr-panel {
      background: var(--sr-card);
      border-radius: var(--sr-radius);
      box-shadow: var(--sr-shadow);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .sr-panel-header {
      background: linear-gradient(135deg, var(--sr-primary) 0%, var(--sr-primary-light) 100%);
      color: #fff;
      padding: 0.875rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sr-panel-header i { opacity: 0.95; }
    .sr-panel-body {
      padding: 1.25rem;
      max-height: 380px;
      overflow-y: auto;
    }
    .sr-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--sr-border);
      transition: background 0.15s;
    }
    .sr-list-item:last-child { border-bottom: none; }
    .sr-list-item:hover { background: #f8fafc; }
    .sr-list-item .badge-count {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--sr-muted);
    }
    .sr-empty { color: var(--sr-muted); padding: 1rem; text-align: center; font-size: 0.95rem; }
    .sr-assign-card {
      background: var(--sr-card);
      border-radius: var(--sr-radius);
      box-shadow: var(--sr-shadow);
      padding: 1.5rem;
      border: 1px solid var(--sr-border);
    }
    .sr-assign-card .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--sr-text);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sr-assign-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1rem;
    }
    .sr-assign-row .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .sr-assign-row label { font-size: 0.85rem; color: var(--sr-muted); font-weight: 500; }
    .sr-assign-row .form-select { min-width: 200px; border-radius: 8px; border-color: var(--sr-border); }
    .btn-assign {
      background: linear-gradient(135deg, var(--sr-primary) 0%, var(--sr-primary-light) 100%);
      border: none;
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.2s, transform 0.05s;
    }
    .btn-assign:hover { color: #fff; opacity: 0.95; }
    .btn-assign:active { transform: scale(0.98); }
    .btn-assign:disabled { opacity: 0.7; cursor: not-allowed; }
    #loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--sr-muted);
    }
    #loading .spinner-border { color: var(--sr-primary); }
    #notOpenMsg {
      border-radius: var(--sr-radius);
      border-left: 4px solid #0d6efd;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>
        <button id="menu-btn" title="選單" role="button" tabindex="0" aria-label="開啟側邊選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="header-title">二輪分發（指派未錄取學生）</div>
        <div style="width: 30px;"></div>
      </h1>
    </div>
  </header>

  <div class="sr-main">
    <div id="alertPlace" class="mb-3"></div>
    <div id="notOpenMsg" class="alert alert-info d-none">二輪媒合尚未開啟，請由科助先開啟二輪媒合並由廠商填寫意願後再進行分發。</div>
    <div id="contentArea" class="d-none">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="sr-panel">
            <div class="sr-panel-header"><i class="fas fa-user-graduate"></i> 未錄取學生</div>
            <div class="sr-panel-body">
              <div id="studentList"></div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="sr-panel">
            <div class="sr-panel-header"><i class="fas fa-building"></i> 參與二輪廠商（名額／已指派）</div>
            <div class="sr-panel-body">
              <div id="companyList"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="sr-assign-card mt-2">
        <div class="section-title"><i class="fas fa-link"></i> 指派學生至廠商</div>
        <div class="sr-assign-row">
          <div class="field">
            <label for="selStudent">學生</label>
            <select id="selStudent" class="form-select form-select-sm"></select>
          </div>
          <div class="field">
            <label for="selCompany">廠商</label>
            <select id="selCompany" class="form-select form-select-sm"></select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-assign" id="btnAssign"><i class="fas fa-plus"></i> 指派</button>
          </div>
        </div>
      </div>
    </div>
    <div id="loading" class="d-block">
      <div class="spinner-border" role="status"></div>
      <p class="mt-2 mb-0">載入中…</p>
    </div>
  </div>

  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/director_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/approve_company">審核實習單位</a>
    <a href="/review_resume?mode=director">審核實習履歷</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/notifications">管理公告</a>
    <a href="/admin_statistics">查詢統計資料</a>
    <a href="/admission/manage_director">媒合結果</a>
    <a href="/admission/unadmitted_list">查看未錄取學生名單</a>
    <a href="/admission/second_round/director">二輪分發</a>
    <a href="/login">登出</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function() {
      var menuBtn = document.getElementById('menu-btn');
      var sideMenu = document.getElementById('side-menu');
      var closeBtn = document.getElementById('close-btn');
      if (menuBtn && sideMenu) {
        menuBtn.addEventListener('click', function() {
          sideMenu.classList.add('open');
          sideMenu.setAttribute('aria-hidden', 'false');
        });
      }
      if (closeBtn && sideMenu) {
        closeBtn.addEventListener('click', function() {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        });
      }
      document.addEventListener('click', function(e) {
        if (sideMenu && !sideMenu.contains(e.target) && menuBtn && !menuBtn.contains(e.target)) {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        }
      });

      const alertPlace = document.getElementById('alertPlace');
      const notOpenMsg = document.getElementById('notOpenMsg');
      const contentArea = document.getElementById('contentArea');
      const studentList = document.getElementById('studentList');
      const companyList = document.getElementById('companyList');
      const selStudent = document.getElementById('selStudent');
      const selCompany = document.getElementById('selCompany');
      const btnAssign = document.getElementById('btnAssign');
      const loading = document.getElementById('loading');

      function showAlert(msg, type) {
        alertPlace.innerHTML = '<div class="alert alert-' + type + ' alert-dismissible fade show">' + msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
      }

      async function load() {
        try {
          const statusRes = await fetch('/admission/api/second_round/status', { credentials: 'include' });
          const statusData = await statusRes.json();
          if (!statusData.success) {
            loading.classList.add('d-none');
            notOpenMsg.classList.remove('d-none');
            return;
          }
          if (!statusData.show_on_director_home) {
            loading.classList.add('d-none');
            notOpenMsg.classList.remove('d-none');
            return;
          }
          const [unadmittedRes, companiesRes] = await Promise.all([
            fetch('/admission/api/second_round/director/unadmitted', { credentials: 'include' }),
            fetch('/admission/api/second_round/director/companies', { credentials: 'include' })
          ]);
          const unadmittedData = await unadmittedRes.json();
          const companiesData = await companiesRes.json();
          loading.classList.add('d-none');
          notOpenMsg.classList.add('d-none');
          contentArea.classList.remove('d-none');
          var assignDisabled = !statusData.is_enabled;
          if (btnAssign) btnAssign.disabled = assignDisabled;
          if (selStudent) selStudent.disabled = assignDisabled;
          if (selCompany) selCompany.disabled = assignDisabled;
          if (statusData.is_enabled && alertPlace) alertPlace.innerHTML = '';
          else if (!statusData.is_enabled && alertPlace) {
            alertPlace.innerHTML = '<div class="alert alert-info alert-dismissible fade show">二輪尚未開啟，目前僅可查看名單（與科助未錄取名單一致）；科助開啟二輪後即可指派。<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
          }

          const students = (unadmittedData.success && unadmittedData.students) ? unadmittedData.students : [];
          const companies = (companiesData.success && companiesData.companies) ? companiesData.companies : [];

          studentList.innerHTML = students.length ? students.map(function(s) {
            return '<div class="sr-list-item">' + (s.name || '') + '（' + (s.username || '') + '）</div>';
          }).join('') : '<div class="sr-empty">目前無未錄取學生</div>';

          companyList.innerHTML = companies.length ? companies.map(function(c) {
            const left = (c.quota || 0) - (c.assigned_count || 0);
            return '<div class="sr-list-item"><span>' + (c.company_name || '') + '</span><span class="badge-count">' + (c.assigned_count || 0) + ' / ' + (c.quota || 0) + (left > 0 ? '（剩 ' + left + '）' : '') + '</span></div>';
          }).join('') : '<div class="sr-empty">尚無廠商參與二輪或名額為 0</div>';

          selStudent.innerHTML = '<option value="">請選擇學生</option>' + students.map(function(s) {
            return '<option value="' + s.id + '">' + (s.name || '') + '（' + (s.username || '') + '）</option>';
          }).join('');
          selCompany.innerHTML = '<option value="">請選擇廠商</option>' + companies.filter(function(c) {
            return ((c.quota || 0) - (c.assigned_count || 0)) > 0;
          }).map(function(c) {
            return '<option value="' + c.company_id + '">' + (c.company_name || '') + '（剩 ' + ((c.quota || 0) - (c.assigned_count || 0)) + '）</option>';
          }).join('');
        } catch (e) {
          loading.classList.add('d-none');
          showAlert('載入失敗：' + (e.message || '連線錯誤'), 'danger');
        }
      }

      btnAssign.addEventListener('click', async function() {
        const studentId = selStudent.value;
        const companyId = selCompany.value;
        if (!studentId || !companyId) {
          showAlert('請選擇學生與廠商', 'warning');
          return;
        }
        btnAssign.disabled = true;
        try {
          const res = await fetch('/admission/api/second_round/director/assign', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ student_id: studentId, company_id: companyId })
          });
          const data = await res.json();
          if (data.success) {
            showAlert('已指派', 'success');
            load();
          } else {
            showAlert(data.message || '指派失敗', 'danger');
          }
        } catch (e) {
          showAlert('連線失敗', 'danger');
        }
        btnAssign.disabled = false;
      });

      load();
    })();
  </script>
</body>
</html>
