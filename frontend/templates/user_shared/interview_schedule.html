<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>智慧實習平台 | 行事曆</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f9fafb;
      margin: 0;
      overflow-x: hidden;
    }

    h2 {
      font-weight: 600;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0055a8 0%, #006acb 50%, #004f94 100%);
      border-bottom: none;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }

    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-left #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }

    .topbar-left #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      text-align: center;
      color: #fff;
      flex: 1;
    }

    /* 側邊選單樣式 */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgba(0, 0, 0, 0.6);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1300;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: #fff;
      user-select: none;
      border-top-right-radius: 24px;
      border-bottom-right-radius: 24px;
    }

    #side-menu.open {
      transform: translateX(0);
    }

    #side-menu h2 {
      margin: 0;
      font-weight: 700;
      font-size: 1.5rem;
      text-align: left;
      flex: 1;
      color: white;
    }

    #side-menu .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1.5rem;
    }

    #close-btn {
      font-size: 1.5rem;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      line-height: 1;
      width: auto;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    #menu-content {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.1rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }

    #side-menu a:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }


    .main-content {
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 60px;
      margin-top: 2rem;
    }

    /* 表格樣式 - 與圖片格式相同 */
    .table {
      border-collapse: separate;
      border-spacing: 0;
    }

    .table thead th {
      text-align: center;
      background-color: #fafafb;
      font-weight: 600;
      border: 1px solid #dee2e6;
      padding: 0.75rem;
      vertical-align: middle;
    }

    .table tbody td {
      text-align: center;
      vertical-align: middle;
      border: 1px solid #dee2e6;
      padding: 0.75rem;
      background-color: #ffffff;
    }

    .table tbody tr {
      background-color: #ffffff;
    }

    .table tbody tr:hover {
      background-color: rgba(184, 177, 177, 0.03);
    }

    .table tbody tr:hover td {
      background-color: rgba(0, 0, 0, 0.03);
    }

    /* 狀態標籤樣式 */
    .status-badge {
      font-size: 0.9em;
      padding: 0.3em 0.8em;
      border-radius: 0.25rem;
      display: inline-block;
      font-weight: 600;
      border: none;
    }

    /* 已核准狀態使用與 btn-success 完全相同的顏色和樣式 */
    .status-badge.btn-success {
      background-color: #198754;
      border-color: #198754;
      color: #ffffff;
    }
    
    .status-badge.btn-success:hover {
      background-color: #157347;
      border-color: #146c43;
      color: #ffffff;
    }
    
    .status-badge.btn-success:disabled {
      background-color: #198754;
      border-color: #198754;
      color: #ffffff;
      opacity: 1;
    }

    /* 按鈕樣式 */
    .btn-sm {
      padding: 0.25rem 0.75rem;
      font-size: 0.875rem;
    }

    /* 行事曆樣式 - 與廠商相同 */
    #calendarContainer {
      padding: 20px;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      width: 100%;
    }

    #calendar > div {
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }

    /* 面試排程詳情模態框樣式 */
    #interviewDetailModal .modal-dialog {
      max-width: 800px;
    }

    .interview-detail-row {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .interview-detail-row:last-child {
      border-bottom: none;
    }

    .interview-detail-label {
      font-weight: 600;
      color: #495057;
      margin-bottom: 6px;
      font-size: 1rem;
      width: 120px;
      display: inline-block;
    }

    .interview-detail-value {
      color: #212529;
      font-size: 1.1rem;
      display: inline-block;
      white-space: pre-wrap;
    }

    .interview-detail-notes {
      background: #ffffff;
      padding: 12px;
      border: 1px solid #dee2e6;
      white-space: pre-wrap;
      line-height: 1.6;
      margin-top: 8px;
      font-size: 0.95rem;
    }

  </style>
</head>

<body class="p-0">
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <button id="menu-btn" title="選單" role="button" tabindex="0" aria-label="開啟側邊選單">
          <span></span><span></span><span></span>
        </button>
      </div>
      <h1>行事曆</h1>
      <div style="width: 30px;"></div>
    </div>
  </header>

  <!-- 側邊選單 -->
  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <div class="menu-header">
      <h2>功能選單</h2>
      <button id="close-btn" aria-label="關閉功能選單">×</button>
    </div>
    <div id="menu-content">
      <div id="menu-links">
        <!-- 選單連結將根據用戶角色動態載入 -->
      </div>
    </div>
  </nav>

  <div class="container-fluid p-0">
    <div class="main-content">
      <div class="p-4">
        <!-- 行事曆內容區域 -->
        <div class="mb-4">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <div id="calendarContainer">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                  <button id="prevMonthBtn" class="btn btn-outline-secondary" style="padding: 8px 16px;">‹ 上個月</button>
                  <h4 id="currentMonthYear" style="margin: 0; font-weight: 600;"></h4>
                  <button id="nextMonthBtn" class="btn btn-outline-secondary" style="padding: 8px 16px;">下個月 ›</button>
                </div>
                <div id="calendar"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 面試排程詳情模態框 -->
        <div class="modal fade" id="interviewDetailModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">面試排程詳情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <div id="interviewDetailContent">
                  <!-- 詳情內容將動態載入 -->
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 根據用戶角色載入側邊選單
    async function loadMenuByRole() {
      try {
        const res = await fetch('/api/profile');
        const data = await res.json();
        const role = data.user?.role || '';
        const menuContent = document.getElementById('menu-content');
        
        let menuItems = '';
        
        if (role === 'director') {
          // 主任的選單
          menuItems = `
            <a href="/director_home">首頁</a>
            <a href="/profile">個人資料</a>
            <a href="/approve_company">審核實習單位</a>
            <a href="/review_resume?mode=director">審核實習履歷</a>
            <a href="/interview_schedule">行事曆</a>
            <a href="/notifications">管理公告</a>
            <a href="/admin_statistics">統計資料</a>
            <a href="/login">登出</a>
          `;
        } else if (role === 'teacher') {
          // 指導老師的選單
          menuItems = `
            <a href="/teacher_home">首頁</a>
            <a href="/profile">個人資料</a>
            <a href="/notifications">公告</a>
            <a href="/upload_company">建立實習機會</a>
            <a href="/review_resume">學生履歷審核</a>
            <a href="/manage_vendor">實習廠商管理</a>
            <a href="/interview_schedule">行事曆</a>
            <a href="/admission_results">查看錄取結果</a>
            <a href="/review_experience">審核實習心得</a>
            <a href="/login">登出</a>
          `;
        } else if (role === 'student') {
          // 學生的選單
          menuItems = `
            <a href="/student_home">首頁</a>
            <a href="/profile">個人資料</a>
            <a href="/resume_folders">履歷管理</a>
            <a href="/fill_preferences">填寫志願序</a>
            <a href="/look_company">投遞履歷</a>
            <a href="/notifications">通知</a>
            <a href="/interview_schedule">行事曆</a>
            <a href="/intern_achievement">學生媒合結果</a>
            <a href="/intern_experience">實習心得</a>
            <a href="/login">登出</a>
          `;
        } else if (role === 'class_teacher') {
          // 班導的選單（與 class_teacher_home 一致）
          menuItems = `
            <a href="/class_teacher_home">首頁</a>
            <a href="/profile">個人資料</a>
            <a href="/class_review_resume">查看學生履歷</a>
            <a href="/review_preferences">審核志願序</a>
            <a href="/interview_schedule">行事曆</a>
            <a href="/notifications">通知</a>
            <a href="/admission/results">查詢學生錄取結果</a>
            <a href="/login">登出</a>
          `;
        } else {
          // 科助的選單（預設）
          menuItems = `
            <a href="/ta_home">首頁</a>
            <a href="/profile">個人資料</a>
            <a href="/notifications">通知</a>
            <a href="/ta/statistics/manage_companies">實習廠商管理</a>
            <a href="/ta/interview_schedule">行事曆</a>
            <a href="/admin/absence_default_range">缺勤預設學期範圍設定</a>
            <a href="/ta/upload_standard_courses">專業核心科目管理</a>
            <a href="/ta_assistant_dashboard">媒合結果管理中心</a>
            <a href="/login">登出</a>
          `;
        }
        
        menuContent.innerHTML = menuItems;
      } catch (err) {
        console.error('載入選單失敗:', err);
        // 如果載入失敗，使用預設的科助選單
        document.getElementById('menu-content').innerHTML = `
          <a href="/ta_home">首頁</a>
          <a href="/profile">個人資料</a>
          <a href="/notifications">通知</a>
          <a href="/ta/statistics/manage_companies">實習廠商管理</a>
          <a href="/ta/interview_schedule">行事曆</a>
          <a href="/final_results">媒合結果確認</a>
          <a href="/admin/absence_default_range">缺勤預設學期範圍設定</a>
          <a href="/ta/upload_standard_courses">專業核心科目管理</a>
          <a href="/login">登出</a>
        `;
      }
    }

    // 選單開關邏輯
    const menuBtn = document.getElementById("menu-btn");
    const sideMenu = document.getElementById("side-menu");
    const closeBtn = document.getElementById("close-btn");

    menuBtn.addEventListener("click", () => {
      sideMenu.classList.add("open");
      sideMenu.setAttribute("aria-hidden", "false");
    });

    closeBtn.addEventListener("click", () => {
      sideMenu.classList.remove("open");
      sideMenu.setAttribute("aria-hidden", "true");
    });

    // 如果點擊 menu 以外的地方就關閉選單
    document.addEventListener("click", (e) => {
      if (
        !sideMenu.contains(e.target) &&
        !menuBtn.contains(e.target)
      ) {
        sideMenu.classList.remove("open");
        sideMenu.setAttribute("aria-hidden", "true");
      }
    });

    // 行事曆相關變數和函數 - 與廠商相同
    let currentCalendarDate = new Date();
    // 存儲面試排程（格式：'YYYY-MM-DD' => {timeStart: 'HH:MM', timeEnd: 'HH:MM', location: '...', notes: '...', companyName: '...', studentName: '...'}）
    const interviewSchedules = new Map();
    // 存儲所有廠商的面試排程（用於顯示其他廠商已預約的時間）
    const allVendorSchedules = new Map();
    // 存儲截止時間
    let preferenceDeadlineDate = null;  // 填寫志願序截止日期
    let preferenceDeadlineTime = null;  // 填寫志願序截止時間
    let resumeDeadlineDate = null;  // 上傳履歷截止日期
    let resumeDeadlineTime = null;  // 上傳履歷截止時間
    let matchingResultDate = null;  // 媒合結果通知日期
    let matchingResultTime = null;  // 媒合結果通知時間

    // 從後端載入所有廠商的面試排程
    async function loadAllVendorSchedules() {
      try {
        const res = await fetch('/ta/statistics/api/interview_schedules');
        const data = await res.json();
        if (data.success && data.schedules) {
          allVendorSchedules.clear();
          interviewSchedules.clear();
          
          // 按日期分組
          data.schedules.forEach(schedule => {
            const date = schedule.date;
            if (!allVendorSchedules.has(date)) {
              allVendorSchedules.set(date, []);
            }
            allVendorSchedules.get(date).push(schedule);
            
            // 同時存儲到 interviewSchedules 以便顯示
            if (!interviewSchedules.has(date)) {
              interviewSchedules.set(date, {
                timeStart: schedule.time_start || '',
                timeEnd: schedule.time_end || '',
                location: schedule.location || '',
                companyName: schedule.company_name || '',
                studentName: schedule.student_name || '',
                vendorName: schedule.vendor_name || ''
              });
            }
          });
          console.log('✅ 已載入所有廠商的面試排程:', allVendorSchedules);
        }
      } catch (err) {
        console.error('載入所有廠商面試排程失敗:', err);
      }
    }

    // 載入截止時間
    async function loadDeadlines() {
      try {
        const res = await fetch('/ta/statistics/api/deadlines');
        const data = await res.json();
        if (data.success) {
          preferenceDeadlineDate = data.preference_deadline_date;
          preferenceDeadlineTime = data.preference_deadline_time;
          resumeDeadlineDate = data.resume_deadline_date;
          resumeDeadlineTime = data.resume_deadline_time;
          matchingResultDate = data.matching_result_date || null;
          matchingResultTime = data.matching_result_time || null;
          console.log('✅ 已載入截止時間:', { 
            preferenceDeadlineDate, 
            preferenceDeadlineTime,
            resumeDeadlineDate, 
            resumeDeadlineTime,
            matchingResultDate,
            matchingResultTime
          });
        }
      } catch (err) {
        console.error('載入截止時間失敗:', err);
      }
    }

    // 改變月份
    function changeMonth(direction) {
      currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction);
      renderCalendar();
    }

    // 渲染行事曆 - 與廠商相同樣式
    function renderCalendar() {
      const calendar = document.getElementById("calendar");
      const monthYear = document.getElementById("currentMonthYear");
      
      const year = currentCalendarDate.getFullYear();
      const month = currentCalendarDate.getMonth();
      
      // 設置月份年份標題
      const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", 
                          "七月", "八月", "九月", "十月", "十一月", "十二月"];
      monthYear.textContent = `${year}年 ${monthNames[month]}`;
      
      // 獲取當月第一天和最後一天
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay(); // 0 = 星期日, 1 = 星期一, ...
      
      // 清空月曆
      calendar.innerHTML = "";
      
      // 添加星期標題
      const weekDays = ["日", "一", "二", "三", "四", "五", "六"];
      weekDays.forEach(day => {
        const dayHeader = document.createElement("div");
        dayHeader.style.cssText = "padding: 12px; text-align: center; font-weight: 600; background-color: #f1f5f9; border-radius: 8px; min-width: 0; width: 100%; box-sizing: border-box;";
        dayHeader.textContent = day;
        calendar.appendChild(dayHeader);
      });
      
      // 添加空白格子（月初）
      for (let i = 0; i < startingDayOfWeek; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.style.cssText = "padding: 16px; min-height: 120px; border: 1px solid #e2e8f0; border-radius: 8px; background-color: #f9fafb; min-width: 0; width: 100%; box-sizing: border-box;";
        calendar.appendChild(emptyCell);
      }
      
      // 添加日期格子
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dateCell = document.createElement("div");
        const cellDate = new Date(year, month, day);
        cellDate.setHours(0, 0, 0, 0);
        
        const isToday = cellDate.getTime() === today.getTime();
        const isPast = cellDate < today;
        
        dateCell.style.cssText = `
          padding: 16px;
          min-height: 120px;
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          background-color: ${isToday ? '#e3f2fd' : isPast ? '#f9fafb' : '#ffffff'};
          cursor: ${isPast ? 'not-allowed' : 'pointer'};
          transition: background-color 0.2s;
          min-width: 0;
          width: 100%;
          box-sizing: border-box;
        `;
        
        // 日期數字
        const dayNumber = document.createElement("div");
        dayNumber.style.cssText = `
          font-weight: ${isToday ? '700' : '600'};
          font-size: 1rem;
          color: ${isToday ? '#0055a8' : isPast ? '#94a3b8' : '#1e293b'};
          margin-bottom: 4px;
        `;
        dayNumber.textContent = day;
        dateCell.appendChild(dayNumber);
        
        // 檢查是否有面試安排
        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasOwnInterview = interviewSchedules.has(dateKey);
        const hasOtherVendorInterviews = allVendorSchedules.has(dateKey);
        
        // 檢查是否為截止時間或媒合結果通知日
        const isPreferenceDeadline = preferenceDeadlineDate === dateKey;
        const isResumeDeadline = resumeDeadlineDate === dateKey;
        const isMatchingResultDate = matchingResultDate === dateKey;
        
        
        // 顯示截止時間標記（分成兩列顯示）
        if (isPreferenceDeadline || isResumeDeadline) {
          // 志願序截止
          if (isPreferenceDeadline) {
            const preferenceBadge = document.createElement("div");
            preferenceBadge.style.cssText = `
              font-size: 0.7rem;
              color: #fff;
              background-color: #dc3545;
              padding: 2px 6px;
              border-radius: 4px;
              margin-top: 4px;
              display: block;
              width: 100%;
              margin-bottom: 2px;
              font-weight: 600;
            `;
            preferenceBadge.textContent = preferenceDeadlineTime 
              ? `志願序截止 ${preferenceDeadlineTime}`
              : '志願序截止';
            dateCell.appendChild(preferenceBadge);
          }
          
          // 履歷截止
          if (isResumeDeadline) {
            const resumeBadge = document.createElement("div");
            resumeBadge.style.cssText = `
              font-size: 0.7rem;
              color: #fff;
              background-color: #dc3545;
              padding: 2px 6px;
              border-radius: 4px;
              margin-top: 4px;
              display: block;
              width: 100%;
              margin-bottom: 2px;
              font-weight: 600;
            `;
            resumeBadge.textContent = resumeDeadlineTime 
              ? `履歷截止 ${resumeDeadlineTime}`
              : '履歷截止';
            dateCell.appendChild(resumeBadge);
          }
        }
        
        // 顯示所有面試排程（從資料庫載入的資料）
        if (hasOtherVendorInterviews) {
          const schedules = allVendorSchedules.get(dateKey);
          
          if (schedules && schedules.length > 0) {
            // 按照「公司名稱 + 時間段」分組
            const groupedSchedules = new Map();
            
            schedules.forEach(schedule => {
              const timeStart = schedule.time_start || '';
              const timeEnd = schedule.time_end || '';
              
              // 格式化時間段作為分組鍵
              let timeKey = '';
              if (timeStart && timeEnd) {
                const startTime = timeStart.substring(0, 5);
                const endTime = timeEnd.substring(0, 5);
                timeKey = `${startTime}-${endTime}`;
              } else if (timeStart) {
                timeKey = timeStart.substring(0, 5);
              }
              
              const companyName = schedule.company_name || '未知公司';
              const groupKey = `${companyName}|${timeKey}`;
              
              if (!groupedSchedules.has(groupKey)) {
                groupedSchedules.set(groupKey, {
                  companyName: companyName,
                  timeStart: timeStart,
                  timeEnd: timeEnd,
                  timeKey: timeKey,
                  students: [],
                  schedules: []
                });
              }
              
              const group = groupedSchedules.get(groupKey);
              const studentName = schedule.student_name || '';
              if (studentName && !group.students.includes(studentName)) {
                group.students.push(studentName);
              }
              group.schedules.push(schedule);
            });
            
            // 為每個分組創建標籤
            groupedSchedules.forEach((group, groupKey) => {
              // 格式化時間顯示
              let timeDisplay = '';
              if (group.timeStart && group.timeEnd) {
                const startTime = group.timeStart.substring(0, 5);
                const endTime = group.timeEnd.substring(0, 5);
                timeDisplay = ` ${startTime}-${endTime}`;
              } else if (group.timeStart) {
                timeDisplay = ` ${group.timeStart.substring(0, 5)}`;
              }
              
              // 組合學生姓名
              const studentsText = group.students.length > 0 
                ? group.students.join('、') 
                : '';
              
              // 創建標籤
              const interviewBadge = document.createElement("div");
              interviewBadge.style.cssText = `
                font-size: 0.75rem;
                color: #fff;
                background-color: #0dcaf0;
                padding: 2px 6px;
                border-radius: 4px;
                margin-top: 4px;
                display: inline-block;
                white-space: nowrap;
                width: 100%;
                margin-bottom: 2px;
                cursor: pointer;
                transition: background-color 0.2s;
              `;
              
              // 顯示公司名稱、學生姓名和時間
              let displayText = '';
              if (studentsText) {
                displayText = `${group.companyName} - ${studentsText}${timeDisplay}`;
              } else {
                displayText = `${group.companyName}${timeDisplay}`;
              }
              
              interviewBadge.textContent = displayText.length > 20 ? displayText.substring(0, 17) + '...' : displayText;
              
              // 構建完整的提示文字
              const fullTitle = studentsText 
                ? `${group.companyName} - ${studentsText}${timeDisplay}`
                : `${group.companyName}${timeDisplay}`;
              interviewBadge.title = `點擊查看詳情：${fullTitle}`;
              
              // 添加點擊事件（顯示合併後的排程詳情，包含所有學生）
              interviewBadge.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止事件冒泡到日期格子
                // 顯示合併後的排程詳情（使用第一個排程作為基礎，但包含所有學生）
                if (group.schedules.length > 0) {
                  // 收集所有職缺信息
                  const jobTitles = new Set();
                  group.schedules.forEach(s => {
                    const jobTitle = s.job_title || s.jobTitle || s.job_name || null;
                    if (jobTitle && jobTitle.trim()) {
                      jobTitles.add(jobTitle.trim());
                    }
                  });
                  
                  // 創建一個合併的排程物件，包含所有學生姓名和職缺信息
                  const mergedSchedule = {
                    ...group.schedules[0],
                    student_name: group.students.join('、'), // 合併所有學生姓名
                    all_students: group.students, // 保存所有學生姓名陣列
                    all_schedules: group.schedules, // 保存所有排程
                    job_title: Array.from(jobTitles).join('、') || group.schedules[0].job_title || group.schedules[0].jobTitle || null // 合併所有職缺名稱
                  };
                  showInterviewDetail(mergedSchedule);
                }
              });
              
              // 添加懸停效果
              interviewBadge.addEventListener('mouseenter', () => {
                interviewBadge.style.backgroundColor = '#0aa2c0';
              });
              interviewBadge.addEventListener('mouseleave', () => {
                interviewBadge.style.backgroundColor = '#0dcaf0';
              });
              
              dateCell.appendChild(interviewBadge);
            });
          }
        }
        
        // 添加點選事件（非過去的日期）
        if (!isPast) {
          dateCell.addEventListener('click', () => {
            // 點擊日期時的處理（可用於查看或編輯面試排程）
            console.log('點擊日期: ' + dateKey);
          });
          dateCell.addEventListener('mouseenter', () => {
            dateCell.style.backgroundColor = '#f0f9ff';
          });
          dateCell.addEventListener('mouseleave', () => {
            dateCell.style.backgroundColor = isToday ? '#e3f2fd' : '#ffffff';
          });
        } else {
          dateCell.style.opacity = '0.6';
        }
        
        calendar.appendChild(dateCell);
      }
    }

    // 顯示面試排程詳情
    function showInterviewDetail(schedule) {
      const modal = new bootstrap.Modal(document.getElementById('interviewDetailModal'));
      const content = document.getElementById('interviewDetailContent');
      
      const companyName = schedule.company_name || '未知公司';
      const studentName = schedule.student_name || '未知學生';
      const vendorName = schedule.vendor_name || '未知廠商';
      const date = schedule.date || '';
      const timeStart = schedule.time_start || '';
      const timeEnd = schedule.time_end || '';
      const location = schedule.location || '未指定';
      const notes = schedule.notes || '';  // 面試須知（備註）
      const createdAt = schedule.created_at || '';
      
      // 收集所有職缺（如果有多個排程，可能有多個職缺）
      let jobTitles = [];
      if (schedule.all_schedules && schedule.all_schedules.length > 0) {
        // 如果有多個排程，收集所有不同的職缺
        const jobTitleSet = new Set();
        schedule.all_schedules.forEach(s => {
          // 嘗試多種可能的字段名稱
          const jobTitle = s.job_title || s.jobTitle || s.job_name || s.title || null;
          if (jobTitle && jobTitle.trim() && !jobTitleSet.has(jobTitle.trim())) {
            jobTitleSet.add(jobTitle.trim());
            jobTitles.push(jobTitle.trim());
          }
        });
      } else {
        // 單個排程，使用當前排程的職缺
        // 嘗試多種可能的字段名稱
        const jobTitle = schedule.job_title || schedule.jobTitle || schedule.job_name || schedule.title || null;
        if (jobTitle) {
          jobTitles.push(jobTitle);
        }
      }
      
      // 格式化職缺顯示
      const jobTitleDisplay = jobTitles.length > 0 
        ? jobTitles.join('、') 
        : '未指定職缺';
      
      // 格式化時間顯示
      let timeDisplay = '';
      if (timeStart && timeEnd) {
        timeDisplay = `${timeStart.substring(0, 5)} - ${timeEnd.substring(0, 5)}`;
      } else if (timeStart) {
        timeDisplay = timeStart.substring(0, 5);
      } else {
        timeDisplay = '未指定';
      }
      
      // 格式化日期顯示
      let dateDisplay = '';
      if (date) {
        const dateObj = new Date(date);
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const weekDay = weekDays[dateObj.getDay()];
        dateDisplay = `${year}年${month}月${day}日（${weekDay}）`;
      }
      
      // 轉義 HTML 以防止 XSS
      const escapeHtml = (text) => {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      };

      content.innerHTML = `
        <div class="interview-detail-row">
          <span class="interview-detail-label">公司名稱</span>
          <span class="interview-detail-value">${escapeHtml(companyName)}</span>
        </div>
        <div class="interview-detail-row">
          <span class="interview-detail-label">面試職缺</span>
          <span class="interview-detail-value">${escapeHtml(jobTitleDisplay)}</span>
        </div>
        <div class="interview-detail-row">
          <span class="interview-detail-label">學生姓名</span>
          <span class="interview-detail-value">${escapeHtml(studentName)}</span>
        </div>
        ${vendorName && vendorName !== '未知廠商' ? `
        <div class="interview-detail-row">
          <span class="interview-detail-label">廠商聯絡人</span>
          <span class="interview-detail-value">${escapeHtml(vendorName)}</span>
        </div>
        ` : ''}
        <div class="interview-detail-row">
          <span class="interview-detail-label">面試日期</span>
          <span class="interview-detail-value">${escapeHtml(dateDisplay)}</span>
        </div>
        <div class="interview-detail-row">
          <span class="interview-detail-label">面試時間</span>
          <span class="interview-detail-value">${escapeHtml(timeDisplay)}</span>
        </div>
        <div class="interview-detail-row">
          <span class="interview-detail-label">面試地點</span>
          <span class="interview-detail-value">${escapeHtml(location)}</span>
        </div>
        ${notes ? `
        <div class="interview-detail-row">
          <span class="interview-detail-label">面試須知</span>
          <span class="interview-detail-value">${escapeHtml(notes)}</span>
        </div>
        ` : ''}
        ${createdAt ? `
        <div class="interview-detail-row">
          <span class="interview-detail-label">建立時間</span>
          <span class="interview-detail-value" style="color: #6c757d; font-size: 0.9rem;">${escapeHtml(createdAt)}</span>
        </div>
        ` : ''}
      `;
      
      modal.show();
    }

    // 自動刷新面試排程的定時器
    let scheduleRefreshInterval = null;
    
    // 啟動自動刷新（每30秒刷新一次）
    function startScheduleAutoRefresh() {
      // 清除現有的定時器（如果有的話）
      if (scheduleRefreshInterval) {
        clearInterval(scheduleRefreshInterval);
      }
      
      // 設置新的定時器
      scheduleRefreshInterval = setInterval(async () => {
        console.log('🔄 自動刷新面試排程...');
        await loadAllVendorSchedules();
        renderCalendar();
      }, 30000); // 30秒刷新一次
      
      console.log('✅ 已啟動面試排程自動刷新（每30秒）');
    }
    
    // 停止自動刷新
    function stopScheduleAutoRefresh() {
      if (scheduleRefreshInterval) {
        clearInterval(scheduleRefreshInterval);
        scheduleRefreshInterval = null;
        console.log('已停止面試排程自動刷新');
      }
    }
    
    // 初始化行事曆
    document.addEventListener('DOMContentLoaded', async function() {
      // 根據用戶角色載入側邊選單
      await loadMenuByRole();
      // 載入截止時間（用於在日期格子中顯示標記）
      await loadDeadlines();
      // 載入所有廠商的面試排程
      await loadAllVendorSchedules();
      // 渲染行事曆
      renderCalendar();
      
      // 啟動自動刷新
      startScheduleAutoRefresh();
      
      // 綁定月份切換按鈕
      document.getElementById('prevMonthBtn').addEventListener('click', () => changeMonth(-1));
      document.getElementById('nextMonthBtn').addEventListener('click', () => changeMonth(1));
      
      // 當頁面失去焦點時停止自動刷新，獲得焦點時重新啟動
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          stopScheduleAutoRefresh();
        } else {
          // 頁面重新可見時，立即刷新一次，然後重新啟動自動刷新
          loadAllVendorSchedules().then(() => {
            renderCalendar();
            startScheduleAutoRefresh();
          });
        }
      });
    });
  </script>
</body>
