<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>智慧實習平台 | 審核實習週記</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding-top: 4.5rem;
    }
    header {
      background: #0454a3;
      color: #fff;
      padding: 0.9rem 2rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }
    .topbar {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .topbar h1 {
      font-size: 1.4rem;
      margin: 0;
      color: #fff;
      letter-spacing: 0.03em;
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px 40px;
    }
    .page-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .page-subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
    }
    .card-shell {
      border-radius: 14px;
      border: 1px solid #d4d4d8;
      background: #ffffff;
      padding: 16px 18px 20px;
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
    }
    .company-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #e5e7eb;
    }
    .company-tab {
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -2px;
    }
    .company-tab:hover {
      color: #1d4ed8;
      background: #eff6ff;
    }
    .company-tab.active {
      color: #1d4ed8;
      font-weight: 600;
      border-bottom-color: #3b82f6;
    }
    .weekly-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      table-layout: fixed;
    }
    .weekly-table thead th {
      background: #3b82f6;
      color: #fff;
      padding: 8px 10px;
      text-align: center;
      font-weight: 600;
    }
    .weekly-table tbody td {
      padding: 8px 10px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      color: #0f172a;
      background-color: #ffffff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .weekly-table tbody tr:nth-child(odd) td {
      background-color: #f9fafb;
    }
    .weekly-table tbody tr:hover td {
      background-color: #e0f2fe;
      cursor: pointer;
    }
    .badge-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-status.pending {
      background: #fee2e2;
      color: #b91c1c;
    }
    .badge-status.reviewed {
      background: #dcfce7;
      color: #166534;
    }
    .badge-status.returned {
      background: #fef9c3;
      color: #854d0e;
    }
    .top-bar-left {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
    }
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }
    #menu-btn span {
      height: 3px;
      background-color: #fff;
      border-radius: 2px;
    }
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }
    #side-menu.open {
      transform: translateX(0);
    }
    #close-btn {
      position: absolute;
      top: 2rem;
      right: 1.6rem;
      font-size: 2.4rem;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      line-height: 1;
    }
    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
    }
    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 0;
      font-size: 1.05rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }
    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.18);
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="top-bar-left">
        <button id="menu-btn" aria-label="開啟功能選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <h1>審核實習週記</h1>
    </div>
  </header>

  <main>

    <section class="card-shell" aria-label="實習週記審核列表">
      <div class="company-tabs" id="companyTabs">
        <button class="company-tab active" data-company="">全部</button>
      </div>

      <div class="filter-bar">
        <select id="filterClass" aria-label="篩選班級"
                style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有班級</option>
        </select>
        <select id="filterAccount" aria-label="篩選帳號"
                style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有學號</option>
        </select>
        <select id="filterStudent" aria-label="篩選學生"
                style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有學生</option>
        </select>
        <select id="filterStatus" aria-label="篩選狀態"
                style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有狀態</option>
          <option value="pending">待批閱</option>
          <option value="reviewed">已批閱</option>
          <option value="returned">退回修改</option>
        </select>
        <input id="searchKeyword" type="text"
               style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 220px; flex: 1;"
               placeholder="學號 / 姓名 / 標題關鍵字搜尋">
      </div>

      <div class="table-responsive">
        <table class="weekly-table">
          <thead>
            <tr>
              <th style="width: 11%;">學號</th>
              <th style="width: 8%;">姓名</th>
              <th style="width: 25%;">標題</th>
              <th style="width: 14%;">應繳日期</th>
              <th style="width: 20%;">學生填寫時間</th>
              <th style="width: 10%;">狀態</th>
              <th style="width: 8%;">操作</th>
            </tr>
          </thead>
          <tbody id="weeklyReviewTableBody">
            <tr>
              <td colspan="7" style="text-align:center; padding: 18px 10px; color:#6b7280;">
                目前尚未有任何需要審核的實習週記。
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 側邊選單 -->
  <nav id="side-menu" aria-hidden="true" role="navigation" aria-label="功能選單">
    <button id="close-btn" aria-label="關閉功能選單">×</button>
    <h2>功能選單</h2>
    <a href="/teacher_home">首頁</a>
    <a href="/profile">個人資料</a>
    <a href="/notifications">通知</a>
    <a href="/upload_company">建立實習機會</a>
    <a href="/review_resume">學生履歷審核</a>
    <a href="/manage_vendor">實習廠商管理</a>
    <a href="/interview_schedule">行事曆</a>
    <a href="/admission_results">查看錄取結果</a>
    <a href="/review_weekly">審核實習週記</a>
    <a href="/review_experience">審核實習心得</a>
    <a href="/logout">登出</a>
  </nav>

  <!-- 詳細內容 / 批閱 Modal -->
  <div class="modal fade" id="weeklyReviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">實習週記內容</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">學號</label>
              <input type="text" id="rvStudentNumber" class="form-control form-control-sm" readonly>
            </div>
            <div class="col-md-4">
              <label class="form-label">姓名</label>
              <input type="text" id="rvStudentName" class="form-control form-control-sm" readonly>
            </div>
            <div class="col-md-4">
              <label class="form-label">實習單位</label>
              <input type="text" id="rvCompany" class="form-control form-control-sm" readonly>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">標題</label>
            <input type="text" id="rvTitle" class="form-control form-control-sm" readonly>
          </div>
          <div class="mt-3">
            <label class="form-label">實習工作記要</label>
            <textarea id="rvWorkNotes" class="form-control form-control-sm" rows="4" readonly></textarea>
          </div>
          <div class="mt-3">
            <label class="form-label">學習心得</label>
            <textarea id="rvReflection" class="form-control form-control-sm" rows="4" readonly></textarea>
          </div>
          <div class="mt-3">
            <label class="form-label">學生上傳檔案</label>
            <div id="rvFileArea">
              <span class="text-muted">尚未上傳檔案</span>
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label class="form-label">學生填寫時間</label>
              <input type="text" id="rvFilledAt" class="form-control form-control-sm" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label">目前狀態</label>
              <input type="text" id="rvStatusText" class="form-control form-control-sm" readonly>
            </div>
          </div>
          <hr class="my-3">
          <div class="mt-1">
            <label class="form-label">老師評語</label>
            <textarea id="rvTeacherComment" class="form-control form-control-sm" rows="3" placeholder="請填寫給學生的回饋與建議"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">關閉</button>
          <button type="button" class="btn btn-warning btn-sm" id="btnReturnWeekly">退回修改</button>
          <button type="button" class="btn btn-primary btn-sm" id="btnApproveWeekly">批閱完成</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let allReviewItems = [];
    let currentReviewId = null;
    let isDirectorMode = false;
    let selectedCompanyTab = '';

    const weeklyReviewTableBody = document.getElementById('weeklyReviewTableBody');

    function populateClassFilter(items) {
      const classSelect = document.getElementById('filterClass');
      if (!classSelect) return;
      classSelect.innerHTML = '<option value="">所有班級</option>';
      const classSet = new Set();
      if (isDirectorMode) {
        classSet.add('忠');
        classSet.add('孝');
      }
      items.forEach(i => {
        if (i.class_name && i.class_name.trim()) {
          classSet.add(i.class_name.trim());
        }
      });
      Array.from(classSet).sort().forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        classSelect.appendChild(opt);
      });
    }

    function populateAccountFilter(items) {
      const accountSelect = document.getElementById('filterAccount');
      if (!accountSelect) return;
      accountSelect.innerHTML = '<option value="">所有學號</option>';
      const seen = new Set();
      items.forEach(i => {
        const num = (i.student_number || '').trim();
        if (num && !seen.has(num)) {
          seen.add(num);
          const opt = document.createElement('option');
          opt.value = num;
          opt.textContent = num;
          accountSelect.appendChild(opt);
        }
      });
    }

    function populateStudentFilter(items) {
      const studentSelect = document.getElementById('filterStudent');
      if (!studentSelect) return;
      studentSelect.innerHTML = '<option value="">所有學生</option>';
      const seen = new Set();
      items.forEach(i => {
        const key = i.student_id;
        if (key && !seen.has(key)) {
          seen.add(key);
          const opt = document.createElement('option');
          opt.value = key;
          opt.textContent = i.student_name || '';
          studentSelect.appendChild(opt);
        }
      });
    }

    function buildCompanyTabs(items) {
      const tabsContainer = document.getElementById('companyTabs');
      if (!tabsContainer) return;
      const companies = new Set();
      items.forEach(i => {
        const name = (i.company_name || '').trim();
        if (name) companies.add(name);
      });
      tabsContainer.innerHTML = '<button class="company-tab active" data-company="">全部</button>';
      Array.from(companies).sort().forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'company-tab';
        btn.setAttribute('data-company', c);
        btn.textContent = c;
        tabsContainer.appendChild(btn);
      });
      selectedCompanyTab = '';
    }

    function getStatusLabel(status) {
      if (status === 'reviewed') return '已批閱';
      if (status === 'returned') return '退回修改';
      return '待批閱';
    }
    function getStatusBadgeClass(status) {
      if (status === 'reviewed') return 'reviewed';
      if (status === 'returned') return 'returned';
      return 'pending';
    }

    function renderReviewTable(items) {
      if (!weeklyReviewTableBody) return;
      weeklyReviewTableBody.innerHTML = '';
      if (!items || items.length === 0) {
        weeklyReviewTableBody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align:center; padding: 18px 10px; color:#6b7280;">
              目前尚未有任何需要審核的實習週記。
            </td>
          </tr>`;
        return;
      }
      const selectedClass = document.getElementById('filterClass').value.trim();
      const selectedAccount = document.getElementById('filterAccount').value.trim();
      const selectedStudent = document.getElementById('filterStudent').value.trim();
      const selectedStatus = document.getElementById('filterStatus').value.trim();
      const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();

      const filtered = items.filter(item => {
        if (selectedCompanyTab && (item.company_name || '').trim() !== selectedCompanyTab) return false;
        if (selectedClass && (item.class_name || '').trim() !== selectedClass) return false;
        if (selectedAccount && (item.student_number || '').trim() !== selectedAccount) return false;
        if (selectedStudent && String(item.student_id) !== selectedStudent) return false;
        if (selectedStatus) {
          const mappedStatus = (item.status === 'submitted') ? 'pending' : item.status;
          if (mappedStatus !== selectedStatus) return false;
        }
        if (keyword) {
          const text = [item.student_number, item.student_name, item.title].join(' ').toLowerCase();
          if (!text.includes(keyword)) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        weeklyReviewTableBody.innerHTML = `
          <tr>
            <td colspan="7" style="text-align:center; padding: 18px 10px; color:#6b7280;">
              沒有符合篩選條件的週記。
            </td>
          </tr>`;
        return;
      }

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        const statusLabel = getStatusLabel(item.status);
        const badgeCls = getStatusBadgeClass(item.status);
        tr.innerHTML = `
          <td>${item.student_number || ''}</td>
          <td>${item.student_name || ''}</td>
          <td>${item.title || '(未填標題)'}</td>
          <td>${item.due_date || '—'}</td>
          <td>${item.filled_at || '—'}</td>
          <td><span class="badge-status ${badgeCls}">${statusLabel}</span></td>
          <td><button type="button" class="btn btn-sm btn-outline-primary" data-id="${item.id}">查看</button></td>
        `;
        weeklyReviewTableBody.appendChild(tr);
      });
    }

    function openReviewModalById(id) {
      const item = allReviewItems.find(i => i.id === id);
      if (!item) return;
      currentReviewId = id;

      document.getElementById('rvStudentNumber').value = item.student_number || '';
      document.getElementById('rvStudentName').value = item.student_name || '';
      document.getElementById('rvCompany').value = item.company_name || '';
      document.getElementById('rvTitle').value = item.title || '';
      document.getElementById('rvWorkNotes').value = item.work_notes || '';
      document.getElementById('rvReflection').value = item.reflection || '';
      document.getElementById('rvFilledAt').value = item.filled_at || '';
      document.getElementById('rvStatusText').value = getStatusLabel(item.status);

      const fileArea = document.getElementById('rvFileArea');
      if (item.file_path) {
        const fileName = item.file_path.split('/').pop();
        fileArea.innerHTML = `<a href="/uploads/${item.file_path}" target="_blank" class="link-primary">${fileName}</a>`;
      } else {
        fileArea.innerHTML = '<span class="text-muted">尚未上傳檔案</span>';
      }

      document.getElementById('rvTeacherComment').value = item.teacher_comment || '';

      const modalEl = document.getElementById('weeklyReviewModal');
      const modal = new bootstrap.Modal(modalEl);
      modal.show();
    }

    async function doReviewAction(action) {
      if (!currentReviewId) return;
      const comment = document.getElementById('rvTeacherComment').value.trim();
      const url = action === 'approve'
        ? `/intern_weekly/api/approve/${currentReviewId}`
        : `/intern_weekly/api/return/${currentReviewId}`;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ teacher_comment: comment })
        });
        const data = await res.json();
        if (!data.success) {
          alert(data.message || '操作失敗');
          return;
        }

        const modalEl = document.getElementById('weeklyReviewModal');
        const modalInst = bootstrap.Modal.getInstance(modalEl);
        if (modalInst) modalInst.hide();

        alert(data.message || '操作成功');
        await loadReviewList();
      } catch (e) {
        console.warn('操作失敗', e);
        alert('操作失敗，請稍後再試。');
      }
    }

    async function loadReviewList() {
      try {
        const res = await fetch('/intern_weekly/api/review_list', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          console.warn(data.message);
          return;
        }
        allReviewItems = data.items || [];
        buildCompanyTabs(allReviewItems);
        populateClassFilter(allReviewItems);
        populateAccountFilter(allReviewItems);
        populateStudentFilter(allReviewItems);
        renderReviewTable(allReviewItems);
      } catch (e) {
        console.warn('載入週記審核列表失敗', e);
      }
    }

    weeklyReviewTableBody.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const id = Number(btn.getAttribute('data-id'));
      openReviewModalById(id);
    });

    document.getElementById('companyTabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.company-tab');
      if (!tab) return;
      document.querySelectorAll('.company-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      selectedCompanyTab = tab.getAttribute('data-company') || '';
      renderReviewTable(allReviewItems);
    });

    document.getElementById('filterClass').addEventListener('change', () => renderReviewTable(allReviewItems));
    document.getElementById('filterAccount').addEventListener('change', () => renderReviewTable(allReviewItems));
    document.getElementById('filterStudent').addEventListener('change', () => renderReviewTable(allReviewItems));
    document.getElementById('filterStatus').addEventListener('change', () => renderReviewTable(allReviewItems));
    document.getElementById('searchKeyword').addEventListener('input', () => renderReviewTable(allReviewItems));

    document.getElementById('btnApproveWeekly').addEventListener('click', () => doReviewAction('approve'));
    document.getElementById('btnReturnWeekly').addEventListener('click', () => doReviewAction('return'));

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      isDirectorMode = urlParams.get('mode') === 'director';

      loadReviewList();

      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');
      if (menuBtn && sideMenu && closeBtn) {
        menuBtn.addEventListener('click', () => {
          sideMenu.classList.add('open');
          sideMenu.setAttribute('aria-hidden', 'false');
        });
        closeBtn.addEventListener('click', () => {
          sideMenu.classList.remove('open');
          sideMenu.setAttribute('aria-hidden', 'true');
        });
      }
    });
  </script>
</body>
</html>
