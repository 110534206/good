<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智慧實習平台 | 登入</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: "Segoe UI", "微軟正黑體", sans-serif;
            background-size: cover;
            background-color: #f3f6f9;
        }

        .center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 1000px;
            width: 90%;
        }

        .logo-side {
            flex: 0 0 45%;
            max-width: 45%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 0px;
            overflow: hidden;
        }

        .logo-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-box {
            flex: 0 0 55%;
            max-width: 55%;
            padding: 30px;

        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 46px;
            margin-top: 10px;
            color: #333;
            font-size: 30px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #000000;
            font-size: 18px;
            border-radius: 6px;
        }

        .password-container {
            position: relative;
            margin-bottom: 24px;
        }

        .toggle-password {
            position: absolute;
            top: 45px;
            right: 16px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        #error-message {
            display: none;
            font-weight: bold;
            color: rgb(184, 59, 59);
            margin-bottom: 15px;
            text-align: center;
        }

        .button.register,
        .button.guest-login {
            width: 250px;
            height: 50px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            user-select: none;
            display: inline-block;
        }

        .button.guest-login {
            color: white;
            background-color: #3c91e6;
            ;
            border: none;
        }

        .button.guest-login:hover {
            background-color: #2b74c2;
        }

        .button.login {
            height: 50px;
            font-size: 20px;
            width: 100%;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            user-select: none;
            display: inline-block;
            color: #3c91e6;
            background-color: white;
            border: 2px solid #3c91e6;
            margin-bottom: 16px;
        }

        .button.login:hover {
            background-color: #eef4fc;
        }

        .button.register {
            color: white;
            background-color: #3c91e6;
            ;
            border: none;
        }

        .button.register:hover {
            background-color: #2b74c2;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .forgot-password-link {
            margin-top: 8px;
            text-align: right;
        }
        .forgot-password-link a {
            color: #d7481c;
            font-size: 18px;
            text-decoration: underline;
        }
        .forgot-password-link a:hover {
            text-decoration: underline;
        }

        /* 忘記密碼彈窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-forgot {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-forgot h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 22px;
        }
        .modal-forgot .form-group {
            margin-bottom: 16px;
        }
        .modal-forgot .form-group label {
            font-size: 18px;
        }
        .modal-forgot .form-group input {
            font-size: 18px;
            padding: 10px;
        }
        .modal-forgot .step {
            display: none;
        }
        .modal-forgot .step.active {
            display: block;
        }
        .modal-forgot .btn-modal {
            width: 100%;
            height: 46px;
            margin-top: 8px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #3c91e6;
            color: #fff;
        }
        .modal-forgot .btn-modal:hover {
            background: #2b74c2;
        }
        .modal-forgot .btn-modal:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .modal-forgot .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-forgot .back-link:hover {
            color: #3c91e6;
        }
        .modal-forgot .msg {
            margin-bottom: 12px;
            font-size: 14px;
            min-height: 20px;
        }
        .modal-forgot .msg.error { color: #c00; }
        .modal-forgot .msg.success { color: #0a0; }
    </style>
</head>

<body>
    <div class="center-container">
        <div class="logo-side">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="登入圖片" />
        </div>

        <div class="form-box">
            <h2>Welcome back!</h2>
            <div id="error-message">帳號或密碼錯誤，請重新輸入。</div>
            <form id="loginForm" onsubmit="return handleLogin(event)" method="POST">
                <div class="form-group">
                    <label for="username">帳號</label>
                    <input type="text" id="username" name="username" autocomplete="username" required />
                </div>
                <div class="form-group password-container">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required />
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye-slash" id="eyeIcon"></i>
                    </span>
                    <div class="forgot-password-link">
                        <a href="javascript:void(0)" id="openForgotPassword">忘記密碼</a>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="button login">登入</button>

                    <div class="button-row">
                        <button type="button" class="button guest-login" onclick="handleguestLogin()">以訪客身分進入</button>
                        <button type="button" class="button register"
                            onclick="window.location.href='{{ url_for('auth_bp.register_role_selection_page') }}'">註冊</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 忘記密碼彈窗 -->
    <div class="modal-overlay" id="forgotPasswordModal">
        <div class="modal-forgot">
            <h3 id="forgotModalTitle">忘記密碼</h3>
            <div id="forgotMsg" class="msg"></div>

            <div class="step active" id="forgotStep1">
                <div class="form-group">
                    <label>請輸入註冊的 Email</label>
                    <input type="email" id="forgotEmail" placeholder="example@mail.com" autocomplete="email" />
                </div>
                <button type="button" class="btn-modal" id="btnSendCode">傳送驗證碼</button>
            </div>

            <div class="step" id="forgotStep2">
                <div class="form-group">
                    <label>請輸入驗證碼（已寄至您的 Email）</label>
                    <input type="text" id="forgotCode" placeholder="6 位數驗證碼" maxlength="6" autocomplete="one-time-code" />
                </div>
                <button type="button" class="btn-modal" id="btnVerify">驗證</button>
            </div>

            <div class="step" id="forgotStep3">
                <div class="form-group">
                    <label>請輸入新密碼（至少 6 個字元）</label>
                    <input type="password" id="forgotNewPassword" placeholder="新密碼" autocomplete="new-password" />
                </div>
                <div class="form-group">
                    <label>再次輸入新密碼</label>
                    <input type="password" id="forgotNewPassword2" placeholder="再次輸入新密碼" autocomplete="new-password" />
                </div>
                <button type="button" class="btn-modal" id="btnResetPassword">重設密碼</button>
            </div>

            <a class="back-link" id="closeForgotPassword">返回登入</a>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorMsg = document.getElementById("error-message");

        function togglePassword() {
            const pwd = document.getElementById("password"),
                icon = document.getElementById("eyeIcon");
            if (pwd.type === "password") {
                pwd.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                pwd.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById("username").value.trim(),
                p = document.getElementById("password").value.trim(),
                err = document.getElementById("error-message");

            err.style.display = "none";

            try {
                const resp = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: u, password: p })
                });

                const d = await resp.json();

                if (d.success) {
                    // 登入成功，導向後端提供的 redirect 網址
                    if (d.redirect) {
                        window.location.href = d.redirect;
                    } else {
                        // 處理沒有 redirect 的情況... 這裡可以保留您原來的邏輯，但為了精簡我移除 client-side fallback
                        err.textContent = "登入成功，但伺服器未提供導向路徑";
                        err.style.display = "block";
                    }
                } else {
                    err.textContent = d.message || "帳號或密碼錯誤";
                    err.style.display = "block";
                    passwordInput.value = ""; // 錯誤自動清空密碼
                    passwordInput.focus();
                }

            } catch (error) {
                err.textContent = "伺服器錯誤，請稍後再試";
                err.style.display = "block";
                console.error(error);
            }
        }

        /**
        * 快速進入，不需要帳號登入，導向後端 /visitor 路由
        */
        function handleguestLogin() {
            // 【修正點 2】直接呼叫後端的訪客入口路由，讓後端處理 Session 設定和重定向
            window.location.href = "{{ url_for('auth_bp.visitor_entry') }}";
        }

        // 即時隱藏錯誤訊息
        usernameInput.addEventListener('input', () => errorMsg.style.display = 'none');
        passwordInput.addEventListener('input', () => errorMsg.style.display = 'none');

        // ---------- 忘記密碼 ----------
        const modal = document.getElementById('forgotPasswordModal');
        const forgotMsg = document.getElementById('forgotMsg');
        const forgotEmail = document.getElementById('forgotEmail');
        const forgotCode = document.getElementById('forgotCode');
        const forgotNewPassword = document.getElementById('forgotNewPassword');
        const forgotNewPassword2 = document.getElementById('forgotNewPassword2');
        const steps = document.querySelectorAll('.modal-forgot .step');

        function showForgotStep(stepNum) {
            steps.forEach((s, i) => s.classList.toggle('active', i === stepNum - 1));
            forgotMsg.textContent = '';
            forgotMsg.className = 'msg';
        }

        function showForgotMessage(text, isError) {
            forgotMsg.textContent = text;
            forgotMsg.className = 'msg ' + (isError ? 'error' : 'success');
        }

        document.getElementById('openForgotPassword').addEventListener('click', function () {
            modal.classList.add('show');
            forgotEmail.value = '';
            forgotCode.value = '';
            forgotNewPassword.value = '';
            forgotNewPassword2.value = '';
            showForgotStep(1);
        });

        document.getElementById('closeForgotPassword').addEventListener('click', function () {
            modal.classList.remove('show');
        });

        document.getElementById('btnSendCode').addEventListener('click', async function () {
            const email = forgotEmail.value.trim();
            if (!email) {
                showForgotMessage('請輸入註冊的 Email', true);
                return;
            }
            const btn = this;
            btn.disabled = true;
            btn.textContent = '傳送中...';
            showForgotMessage('');
            try {
                const res = await fetch('/api/forgot_password/send_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    showForgotMessage(data.message || '驗證碼已寄出', false);
                    showForgotStep(2);
                } else {
                    showForgotMessage(data.message || '傳送失敗', true);
                }
            } catch (e) {
                showForgotMessage('網路錯誤，請稍後再試', true);
            }
            btn.disabled = false;
            btn.textContent = '傳送驗證碼';
        });

        document.getElementById('btnVerify').addEventListener('click', async function () {
            const email = forgotEmail.value.trim();
            const code = forgotCode.value.trim();
            if (!code) {
                showForgotMessage('請輸入驗證碼', true);
                return;
            }
            const btn = this;
            btn.disabled = true;
            showForgotMessage('');
            try {
                const res = await fetch('/api/forgot_password/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await res.json();
                if (data.success) {
                    showForgotMessage(data.message || '驗證成功', false);
                    showForgotStep(3);
                } else {
                    showForgotMessage(data.message || '驗證失敗', true);
                }
            } catch (e) {
                showForgotMessage('網路錯誤，請稍後再試', true);
            }
            btn.disabled = false;
        });

        document.getElementById('btnResetPassword').addEventListener('click', async function () {
            const email = forgotEmail.value.trim();
            const code = forgotCode.value.trim();
            const p1 = forgotNewPassword.value;
            const p2 = forgotNewPassword2.value;
            if (p1.length < 6) {
                showForgotMessage('新密碼需至少 6 個字元', true);
                return;
            }
            if (p1 !== p2) {
                showForgotMessage('兩次輸入的密碼不一致', true);
                return;
            }
            const btn = this;
            btn.disabled = true;
            showForgotMessage('');
            try {
                const res = await fetch('/api/forgot_password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, new_password: p1 })
                });
                const data = await res.json();
                if (data.success) {
                    showForgotMessage(data.message || '密碼已重設，請使用新密碼登入', false);
                    setTimeout(function () {
                        modal.classList.remove('show');
                    }, 1500);
                } else {
                    showForgotMessage(data.message || '重設失敗', true);
                }
            } catch (e) {
                showForgotMessage('網路錯誤，請稍後再試', true);
            }
            btn.disabled = false;
        });
    </script>
</body>

</html>
