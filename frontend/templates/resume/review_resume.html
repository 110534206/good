<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智慧實習平台 | 審核履歷</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    header {
      background: #0454a3;
      border-bottom: none;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(0, 68, 148, 0.35);
    }

    .topbar {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
    }

    .topbar h1 {
      font-size: 1.5rem;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      flex: 1;
    }

    .topbar h1 .header-title {
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* 選單按鈕樣式 */
    #menu-btn {
      width: 30px;
      height: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      padding: 0;
    }

    #menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    body { font-family: "Noto Sans TC", sans-serif; background: #ffffff; margin: 0; padding: 0; }
    main { max-width: 1800px; margin: 24px auto 60px; padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }
    .panel {
      background: #ffffff; border-radius: 16px; padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); border: 1px solid #e2e8f0; margin-bottom: 32px;
    }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .panel-header h2 { font-size: 1.2rem; margin: 0; }
    .table-wrapper { overflow-x: visible; width: 100%; }
    .table-wrapper table tbody tr:hover { background: rgba(15, 23, 42, 0.02); }
    .table thead th { text-align: left; background-color: #fafafb; }
    .table tbody td { text-align: left; vertical-align: middle; }
    .table tbody tr td:nth-child(1), .table tbody tr td:nth-child(2), 
    .table tbody tr td:nth-child(3), .table tbody tr td:nth-child(4) { vertical-align: top; }
    
    /* --- 狀態標籤樣式設定 --- */
    .status-badge { font-size: 0.9em; padding: 0.3em 0.6em; border-radius: 0.5rem; display: inline-block; font-weight: 600; }
    .status-badge.bg-success { color: #fff; background-color: #198754; }
    .status-badge.bg-danger { color: #fff; background-color: #dc3545; }
    .status-badge.bg-info { color: #fff; background-color: #0dcaf0; }
    .status-badge.bg-secondary { color: #fff; background-color: #6c757d; }
    
    .alert-deadline {
      margin-bottom: 16px;
      border-radius: 8px;
      padding: 12px 16px;
    }
    
    #commentInput { width: 100%; height: 180px; resize: vertical; padding: 0.5rem; font-size: 1rem; line-height: 1.4; }
    
    /* 側邊選單樣式（參考 director_home） */
    #side-menu {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 320px;
      max-width: 80vw;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 3px 0 12px rgb(0 0 0 / 0.7);
      padding: 2rem 1.5rem;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: white;
      user-select: none;
    }

    #side-menu.open {
      transform: translateX(0);
    }

    #close-btn {
      position: absolute;
      top: 2rem;
      right: 1.6rem;
      font-size: 2.0rem;
      font-weight: bold;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      line-height: 2.4rem;
      height: 2.5rem;
      width: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0;
      margin: 0;
    }

    #side-menu h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 700;
      font-size: 1.6rem;
      color: #fff;
      padding: 0;
      line-height: 2.4rem;
      height: 2.4rem;
      display: flex;
      align-items: center;
    }

    #side-menu a {
      display: block;
      width: 100%;
      padding: 0.6rem 10rem 0.6rem 0;
      font-size: 1.1rem;
      color: #e2e8f0;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.2s ease;
      white-space: nowrap;
    }

    #side-menu a:hover {
      background-color: rgba(255, 255, 255, 0.18);
      color: #fff;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <h1>
        <button id="menu-btn" title="選單" role="button" tabindex="0" aria-label="開啟側邊選單">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="header-title">審核履歷</div>
        <div style="width: 30px;"></div> <!-- 佔位元素，保持標題置中 -->
      </h1>
    </div>
  </header>
  <main>
    <section class="panel" aria-label="履歷列表">
      <!-- 截止時間提示 -->
      <div id="deadlineAlert" class="alert alert-deadline" style="display: none; margin-bottom: 16px;"></div>
      
      <div class="panel-header">
        <h2 id="resumeListTitle">履歷列表</h2>
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 16px;">
        <select id="classFilter" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有班級</option>
        </select>
        <select id="companyNameFilter" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有公司</option>
        </select>
        <select id="companyFilter" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有職缺</option>
        </select>
        <select id="statusFilter" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 150px;">
          <option value="">所有狀態</option>
          <option value="uploaded">待審核</option>
          <option value="approved">通過</option>
        </select>
        <input type="text" id="searchBox" style="padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-width: 200px; flex: 1;" placeholder="搜尋帳號/檔案" />
        <button id="sendToVendorBtn" class="btn btn-primary" style="padding: 10px 20px; border-radius: 8px; white-space: nowrap;" disabled>
          標記為通過
        </button>
      </div>

      <div class="table-wrapper">
        <table style="width: 100%; border-collapse: collapse;">
          <thead style="background: #f1f5f9;">
            <tr>
              <th style="padding: 14px 16px; font-weight: 600; width: 50px;">
                <input type="checkbox" id="selectAllCheckbox" style="cursor: pointer; width: 18px; height: 18px;" title="全選/取消全選">
              </th>
              <th style="padding: 14px 16px; font-weight: 600;">學生帳號</th>
              <th style="padding: 14px 16px; font-weight: 600;">姓名</th>
              <th style="padding: 14px 16px; font-weight: 600;">投遞時間</th>
              <th style="padding: 14px 16px; font-weight: 600;">檔案名稱</th>
              <th style="padding: 14px 16px; font-weight: 600;">選擇公司</th>
              <th style="padding: 14px 16px; font-weight: 600;">職缺</th>
              <th id="statusHeader" style="padding: 14px 16px; font-weight: 600; display: none;">狀態</th>
              <th style="padding: 14px 16px; font-weight: 600;" id="commentHeader">留言</th>
              <th style="padding: 14px 16px; font-weight: 600;">操作</th>
            </tr>
          </thead>
          <tbody id="resumeTableBody">
            <tr><td colspan="10" style="padding: 14px 16px; text-align: center; color: #64748b;">載入中...</td></tr>
          </tbody>
        </table>
      </div>
      <nav><ul class="pagination justify-content-center mt-3" id="pagination"></ul></nav>
    </section>
  </main>

  <div class="modal fade" id="commentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="commentModalLabel">編輯留言</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body"><textarea id="commentInput"></textarea></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button class="btn btn-primary" id="saveCommentBtn">送出</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 側邊選單（指導老師預設；主任由 JS 依角色替換為 director 選單） -->
  <nav id="side-menu" aria-hidden="true">
    <button id="close-btn" aria-label="關閉選單">×</button>
    <h2>功能選單</h2>
    <div id="side-menu-links">
      <a href="/teacher_home">首頁</a>
      <a href="/profile">個人資料</a>
      <a href="/notifications">通知</a>
      <a href="/upload_company">建立實習機會</a>
      <a href="/review_resume">學生履歷審核</a>
      <a href="/manage_vendor">實習廠商管理</a>
      <a href="/interview_schedule">行事曆</a>
      <a href="/admission_results">查看錄取結果</a>
      <a href="/review_weekly">審核實習週記</a>
      <a href="/review_experience">審核實習心得</a>
      <a href="/teacher_remove_intern">退實習案件管理</a>
      <a href="/logout">登出</a>
    </div>
  </nav>

  <script>
    let allResumes = [];
    let currentResumeId = null;
    let currentPreferenceId = null;
    let currentApplicationId = null;  // 指導老師審核用（投遞紀錄 id）
    let currentPage = 1;
    const rowsPerPage = 10;
    let userRole = null;
    let isHomeroom = false;
    let currentUserId = null;
    let isDeadlinePassed = false; // 截止時間是否已過
    let isTeacherReviewDeadlinePassed = false; // 指導老師審核截止時間是否已過

    // 定義狀態顏色，approved 對應 success (綠色)
    function statusColor(status) {
      return { 'uploaded': 'info', 'approved': 'success', 'rejected': 'danger' }[status] || 'secondary';
    }

    // 定義狀態文字，approved 對應 "通過"
    function mapStatus(status) {
      return { 'uploaded': '待審核', 'approved': '通過', 'rejected': '退件' }[status] || '待審核';
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // 禁用所有勾選框和按鈕（當指導老師審核截止時間已過時）
    function disableCheckboxesAndButtons() {
      // 禁用所有行勾選框
      const rowCheckboxes = document.querySelectorAll(".row-checkbox");
      rowCheckboxes.forEach(cb => {
        cb.disabled = true;
        cb.style.cursor = 'not-allowed';
        cb.style.opacity = '0.5';
      });
      
      // 禁用全選勾選框
      const selectAllCheckbox = document.getElementById("selectAllCheckbox");
      if (selectAllCheckbox) {
        selectAllCheckbox.disabled = true;
        selectAllCheckbox.style.cursor = 'not-allowed';
        selectAllCheckbox.style.opacity = '0.5';
      }
      
      // 禁用「標記為通過」按鈕
      const sendToVendorBtn = document.getElementById("sendToVendorBtn");
      if (sendToVendorBtn) {
        sendToVendorBtn.disabled = true;
        sendToVendorBtn.style.cursor = 'not-allowed';
        sendToVendorBtn.style.opacity = '0.5';
      }
    }

    // 更新傳送給廠商按鈕的顯示狀態（全局函數）
    function updateSendToVendorButtonVisibility() {
      const sendToVendorBtn = document.getElementById("sendToVendorBtn");
      if (!sendToVendorBtn) return;
      
      // 如果指導老師審核截止時間已過，禁用按鈕
      if (isTeacherReviewDeadlinePassed && userRole === 'teacher') {
        sendToVendorBtn.disabled = true;
        sendToVendorBtn.style.cursor = 'not-allowed';
        sendToVendorBtn.style.opacity = '0.5';
        return;
      }
      
      // 僅指導老師可以看到此按鈕
      if (userRole === 'teacher') {
        const checkedBoxes = document.querySelectorAll(".row-checkbox:checked");
        // 指導老師角色下，按鈕一直顯示
        sendToVendorBtn.style.display = 'block';
        // 有勾選至少一筆資料時才啟用按鈕，否則禁用
        sendToVendorBtn.disabled = checkedBoxes.length === 0;
        sendToVendorBtn.style.cursor = checkedBoxes.length === 0 ? 'not-allowed' : 'pointer';
        sendToVendorBtn.style.opacity = checkedBoxes.length === 0 ? '0.5' : '1';
      } else {
        // 非指導老師角色，隱藏按鈕
        sendToVendorBtn.style.display = 'none';
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const targetCompanyId = urlParams.get('company_id');
      const targetStatus = urlParams.get('status');
      const isDirectorMode = urlParams.get('mode') === 'director';

      fetch('/api/profile')
        .then(res => res.json())
        .then(profileData => {
          userRole = profileData.success && profileData.user ? profileData.user.role : 'teacher';
          currentUserId = profileData.success && profileData.user ? profileData.user.id : null;
          isHomeroom = profileData.success && profileData.user ? profileData.user.is_homeroom : false;
          const isDirector = isDirectorMode || userRole === 'director';

          // 主任：使用 director_home 的側邊選單項目
          if (isDirector) {
            const container = document.getElementById('side-menu-links');
            if (container) {
              container.innerHTML = `
                <a href="/director_home">首頁</a>
                <a href="/profile">個人資料</a>
                <a href="/approve_company">審核實習單位</a>
                <a href="/review_resume?mode=director">審核實習履歷</a>
                <a href="/interview_schedule">行事曆</a>
                <a href="/notifications">管理公告</a>
                <a href="/admin_statistics">查詢統計資料</a>
                <a href="/admission/manage_director">媒合結果</a>
                <a href="/login">登出</a>
              `;
            }
          }

          // 主任或班導：僅能下載、查看，隱藏狀態篩選器和狀態欄位
          if (isDirector || userRole === 'class_teacher') {
            const statusFilter = document.getElementById('statusFilter');
            if (statusFilter) statusFilter.style.display = 'none';
            const statusHeader = document.getElementById('statusHeader');
            if (statusHeader) statusHeader.style.display = 'none';
          }

          let apiUrl;
          if (userRole === 'vendor') {
            apiUrl = '/vendor/api/resumes';
            const commentHeader = document.getElementById('commentHeader');
            if (commentHeader) commentHeader.textContent = '廠商留言';
          } else {
            // 使用 /api/teacher_review_resumes API
            apiUrl = '/api/teacher_review_resumes';
          }

          Promise.all([
            fetch(apiUrl).then(res => res.ok ? res.json() : {success:false}),
            userRole === 'vendor'
              ? Promise.resolve({success:true, companies:[]})
              : fetch('/api/get_reviewed_companies').then(res => res.ok ? res.json() : {success:true, companies:[]}),
            // 職缺資料：導師/班導可用公開職缺，主任不需要呼叫 /api/public/positions（避免 403）
            userRole === 'vendor'
              ? fetch('/vendor/api/positions').then(res => res.ok ? res.json() : {success:true, items:[]})
              : (userRole === 'director' || isDirectorMode
                  ? Promise.resolve({success:true, items:[]})
                  : (targetCompanyId
                      ? fetch(`/api/public/company/${targetCompanyId}`).then(async res => {
                           if(!res.ok) return {success:true, items:[]};
                           const r = await res.json();
                           return {success:true, items: (r.jobs||[]).map(j=>({id:j.id, title:j.title}))};
                         })
                      : fetch('/api/public/positions').then(res => res.ok ? res.json() : {success:true, items:[]})))
          ]).then(([resumeResponse, companyData, positionData]) => {
            if (resumeResponse.success) {
              // 處理履歷數據和截止時間信息
              const resumes = userRole === 'vendor' ? (resumeResponse.resumes || []) : (resumeResponse.data || []);
              
              // 如果是指導老師且截止時間未過，強制設置為空數組（即使後端返回了數據）
              const isTeacherBeforeDeadline = userRole === 'teacher' && resumeResponse.is_deadline_passed === false;
              const hasBlockMessage = resumeResponse.message && resumeResponse.message.includes('無法查看');
              
              if (isTeacherBeforeDeadline || hasBlockMessage) {
                allResumes = [];
                console.log('🔒 [DEBUG] 指導老師在截止時間前，強制清空履歷列表', {
                  userRole,
                  is_deadline_passed: resumeResponse.is_deadline_passed,
                  message: resumeResponse.message,
                  dataLength: resumes.length
                });
              } else {
                allResumes = resumes;
              }
              
              // 顯示截止時間提示（僅非 vendor 角色）
              // 主任與班導看同一套（履歷提交截止相關）；僅指導老師會看到「指導老師審核截止時間」與審核按鈕相關提示
              if (userRole !== 'vendor') {
                isDeadlinePassed = resumeResponse.is_deadline_passed || false;
                const deadlineAlert = document.getElementById('deadlineAlert');
                if (deadlineAlert) {
                  const isExpired = resumeResponse.is_deadline_passed;
                  const isViewerTeacher = (userRole === 'teacher'); // 僅指導老師需要看到「請在截止時間前完成審核」

                  // 僅指導老師在截止前會看到「目前無法查看」提示
                  if (isViewerTeacher && !isExpired) {
                    deadlineAlert.className = 'alert alert-warning alert-deadline';
                    deadlineAlert.innerHTML = `
                      <strong>⏰ 履歷提交截止時間提醒</strong><br>
                      履歷提交截止時間：${resumeResponse.deadline}<br>
                      目前無法查看學生履歷。請等待截止時間到達後，履歷將自動通過並傳給您審核。
                    `;
                    deadlineAlert.style.display = 'block';
                  } else if (isExpired && resumeResponse.teacher_review_deadline && isViewerTeacher) {
                    // 僅指導老師：履歷提交已過，顯示指導老師審核截止時間（已過 / 提醒）
                    const now = new Date();
                    const teacherDeadline = new Date(resumeResponse.teacher_review_deadline.replace(/\//g, '-'));
                    isTeacherReviewDeadlinePassed = now > teacherDeadline;
                    
                    if (isTeacherReviewDeadlinePassed) {
                      deadlineAlert.className = 'alert alert-warning alert-deadline';
                      deadlineAlert.innerHTML = `
                        <strong>⚠️ 指導老師審核截止時間已過</strong><br>
                        指導老師審核截止時間：${resumeResponse.teacher_review_deadline}<br>
                        已超過審核截止時間，無法再勾選或審核履歷。<br>通過的履歷將統一傳給廠商。
                      `;
                      disableCheckboxesAndButtons();
                    } else {
                      deadlineAlert.className = 'alert alert-info alert-deadline';
                      deadlineAlert.innerHTML = `
                        <strong>📅 指導老師審核截止時間提醒</strong><br>
                        指導老師審核截止時間：${resumeResponse.teacher_review_deadline}<br>
                        請在截止時間前完成審核。
                      `;
                    }
                    deadlineAlert.style.display = 'block';
                  } else if (isExpired) {
                    // 主任與班導：履歷提交已過，顯示同一則（未退件履歷已自動通過並傳給指導老師審核）
                    deadlineAlert.className = 'alert alert-warning alert-deadline';
                    deadlineAlert.innerHTML = `
                      <strong>⚠️ 履歷提交截止時間已過</strong><br>
                      履歷提交截止時間：${resumeResponse.deadline || ''}<br>
                      已超過截止時間，未退件的履歷已自動通過並傳給指導老師審核。
                    `;
                    deadlineAlert.style.display = 'block';
                  } else if (resumeResponse.deadline && isViewerTeacher) {
                    // 僅指導老師：截止前顯示履歷提交截止提醒
                    deadlineAlert.className = 'alert alert-info alert-deadline';
                    deadlineAlert.innerHTML = `
                      <strong>📅 履歷提交截止時間提醒</strong><br>
                      履歷提交截止時間：${resumeResponse.deadline}<br>
                      請在截止時間前完成審核，否則將自動通過並傳給指導老師審核。
                    `;
                    deadlineAlert.style.display = 'block';
                  } else if (resumeResponse.deadline && !isViewerTeacher) {
                    // 主任與班導：截止前只顯示履歷提交截止時間（不寫「請完成審核」）
                    deadlineAlert.className = 'alert alert-info alert-deadline';
                    deadlineAlert.innerHTML = `
                      <strong>📅 履歷提交截止時間提醒</strong><br>
                      履歷提交截止時間：${resumeResponse.deadline}<br>
                      截止後未退件的履歷將自動通過並傳給指導老師審核。
                    `;
                    deadlineAlert.style.display = 'block';
                  }
                }
              }
              
              // 如果有後端返回的提示訊息（例如指導老師在截止時間前無法查看），也顯示
              if (resumeResponse.message && userRole === 'teacher') {
                const deadlineAlert = document.getElementById('deadlineAlert');
                if (deadlineAlert && !deadlineAlert.innerHTML.includes(resumeResponse.message)) {
                  deadlineAlert.className = 'alert alert-warning alert-deadline';
                  deadlineAlert.innerHTML = `
                    <strong>⏰ ${resumeResponse.message}</strong><br>
                    ${resumeResponse.deadline ? `履歷提交截止時間：${resumeResponse.deadline}` : ''}
                  `;
                  deadlineAlert.style.display = 'block';
                }
                // 強制清空履歷列表
                allResumes = [];
                console.log('🔒 [DEBUG] 收到後端提示訊息，強制清空履歷列表');
              }
              
              populateFilters(allResumes, companyData, positionData);

              if (targetStatus) {
                 const statusSelect = document.getElementById('statusFilter');
                 const mapped = targetStatus === 'uploaded' ? 'uploaded' : targetStatus;
                 if(statusSelect) statusSelect.value = mapped;
              }

              applyFilters();
              
              // 初始化傳送給廠商按鈕顯示狀態
              setTimeout(() => {
                updateSendToVendorButtonVisibility();
                // 如果指導老師審核截止時間已過，禁用所有勾選框
                if (isTeacherReviewDeadlinePassed && userRole === 'teacher') {
                  disableCheckboxesAndButtons();
                }
              }, 100);
            } else {
              allResumes = [];
              renderTable([]);
              setTimeout(() => {
                updateSendToVendorButtonVisibility();
              }, 100);
            }
          });
        });

      document.getElementById("classFilter").addEventListener("change", applyFilters);
      document.getElementById("companyNameFilter").addEventListener("change", applyFilters);
      document.getElementById("companyFilter").addEventListener("change", applyFilters);
      document.getElementById("statusFilter").addEventListener("change", applyFilters);
      document.getElementById("searchBox").addEventListener("input", applyFilters);
      document.getElementById("saveCommentBtn").addEventListener("click", saveComment);
      
      // 傳送給廠商按鈕事件
      const sendToVendorBtn = document.getElementById("sendToVendorBtn");
      if (sendToVendorBtn) {
        sendToVendorBtn.addEventListener("click", sendSelectedToVendor);
      }
      
      // 當 checkbox 改變時，顯示/隱藏傳送給廠商按鈕（僅指導老師可見）
      document.addEventListener("change", function(e) {
        // 如果指導老師審核截止時間已過，阻止勾選
        if (isTeacherReviewDeadlinePassed && userRole === 'teacher' && e.target.classList.contains("row-checkbox")) {
          e.target.checked = false;
          return;
        }
        if (e.target.classList.contains("row-checkbox") || e.target.id === "selectAllCheckbox") {
          updateSendToVendorButtonVisibility();
        }
      });

      // 全選/取消全選功能
      document.getElementById("selectAllCheckbox").addEventListener("change", function(e) {
        // 如果指導老師審核截止時間已過，阻止勾選
        if (isTeacherReviewDeadlinePassed && userRole === 'teacher') {
          e.target.checked = false;
          return;
        }
        const checkboxes = document.querySelectorAll(".row-checkbox");
        checkboxes.forEach(cb => {
          if (!cb.disabled) {
            cb.checked = e.target.checked;
          }
        });
        updateSendToVendorButtonVisibility();
      });

      // 當個別 checkbox 改變時，更新全選 checkbox 狀態
      document.addEventListener("change", function(e) {
        if (e.target.classList.contains("row-checkbox")) {
          const checkboxes = document.querySelectorAll(".row-checkbox");
          const allChecked = Array.from(checkboxes).every(cb => cb.checked);
          const someChecked = Array.from(checkboxes).some(cb => cb.checked);
          const selectAllCheckbox = document.getElementById("selectAllCheckbox");
          if (selectAllCheckbox) {
            selectAllCheckbox.checked = allChecked;
            selectAllCheckbox.indeterminate = someChecked && !allChecked;
          }
          updateSendToVendorButtonVisibility();
        }
      });

      // 側邊選單控制
      const menuBtn = document.getElementById('menu-btn');
      const sideMenu = document.getElementById('side-menu');
      const closeBtn = document.getElementById('close-btn');

      if (menuBtn) {
        menuBtn.addEventListener('click', () => {
          if (sideMenu) {
            sideMenu.classList.add('open');
            sideMenu.setAttribute('aria-hidden', 'false');
          }
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          if (sideMenu) {
            sideMenu.classList.remove('open');
            sideMenu.setAttribute('aria-hidden', 'true');
          }
        });
      }

      // 點擊選單外部關閉選單
      document.addEventListener('click', (e) => {
        if (sideMenu && menuBtn) {
          if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target) && sideMenu.classList.contains('open')) {
            sideMenu.classList.remove('open');
            sideMenu.setAttribute('aria-hidden', 'true');
          }
        }
      });
    });

    function populateFilters(data, companyData, positionData) {
      const urlParams = new URLSearchParams(window.location.search);
      const isDirectorMode = urlParams.get('mode') === 'director';
      
      const classSelect = document.getElementById("classFilter");
      if (isDirectorMode) {
          // 主任模式：只顯示「所有班級」、固定顯示「忠」「孝」、以及資料中實際出現的班級
          classSelect.innerHTML = `<option value="">所有班級</option>`;
          const classSet = new Set();
          classSet.add('忠');
          classSet.add('孝');
          data.forEach(r => { 
            if (r.className && r.className.trim()) classSet.add(r.className.trim());
          });
          Array.from(classSet).sort().forEach(c => {
            classSelect.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
          });
      } else {
          // 指導老師模式：只顯示「所有班級」與資料中實際出現的班級（有用到的才顯示）
          classSelect.innerHTML = `<option value="">所有班級</option>`;
          const classSet = new Set();
          data.forEach(r => {
            if (r.className && r.className.trim()) classSet.add(r.className.trim());
          });
          Array.from(classSet).sort().forEach(c => {
            classSelect.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
          });
      }

      // 填充公司名稱下拉選單
      const companyNameSelect = document.getElementById("companyNameFilter");
      companyNameSelect.innerHTML = `<option value="">所有公司</option>`;
      const companySet = new Set();
      
      // 使用已審核公司列表
      console.log('🔍 [DEBUG] populateFilters - currentUserId:', currentUserId, 'userRole:', userRole);
      console.log('🔍 [DEBUG] populateFilters - companyData:', companyData);
      
      if (companyData && companyData.companies && companyData.companies.length > 0) {
          console.log('🔍 [DEBUG] 找到', companyData.companies.length, '家公司');
          companyData.companies.forEach(company => {
              const companyName = company.company_name || company.name || '';
              let shouldInclude = false;
              
              if (isDirectorMode || userRole === 'class_teacher') {
                  // 主任/班導模式：顯示所有已核准且本學期開放的公司
                  shouldInclude = companyName && companyName.trim() && 
                                  company.status === 'approved' && 
                                  company.is_open_current_semester;
              } else {
                  // 一般模式（指導老師）：只顯示該指導老師管理的公司
                  // 不管 is_open_current_semester 是否為 true，都應該顯示（一開始就要有資料）
                  const advisorId = company.advisor_user_id;
                  const matchesUserId = advisorId && String(advisorId) === String(currentUserId);
                  console.log('🔍 [DEBUG] 公司:', companyName, 'advisor_user_id:', advisorId, 'currentUserId:', currentUserId, '匹配:', matchesUserId);
                  shouldInclude = companyName && companyName.trim() && 
                                  advisorId && 
                                  matchesUserId &&
                                  company.status === 'approved';
              }
              
              if (shouldInclude) {
                  companySet.add(companyName.trim());
                  console.log('✅ [DEBUG] 添加公司:', companyName);
              }
          });
      } else {
          console.warn('⚠️ [DEBUG] companyData 為空或沒有 companies');
      }
      
      // 也從職缺 API 中提取公司名稱（作為補充，確保有資料顯示）
      if (positionData && positionData.companies && Array.isArray(positionData.companies)) {
          positionData.companies.forEach(company => {
              const companyName = company.name || company.company_name || '';
              if (companyName && companyName.trim()) {
                  // 對於指導老師，只顯示該指導老師管理的公司
                  if (userRole === 'teacher' && currentUserId) {
                      if (company.advisor_user_id && String(company.advisor_user_id) === String(currentUserId)) {
                          companySet.add(companyName.trim());
                          console.log('✅ [DEBUG] 從職缺 API 添加公司:', companyName);
                      }
                  } else {
                      companySet.add(companyName.trim());
                  }
              }
          });
      }
      
      // 也從履歷資料中提取公司名稱（作為補充，確保有資料顯示）
      data.forEach(r => {
          const companyName = r.company_name || '';
          if (companyName && companyName.trim()) {
              companySet.add(companyName.trim());
          }
      });
      
      // 將所有公司名稱排序後加入選單
      Array.from(companySet).sort().forEach(companyName => {
          companyNameSelect.innerHTML += `<option value="${escapeHtml(companyName)}">${escapeHtml(companyName)}</option>`;
      });

      const companySelect = document.getElementById("companyFilter");
      companySelect.innerHTML = `<option value="">所有職缺</option>`;
      const jobSet = new Set();
      
      if (isDirectorMode || userRole === 'class_teacher') {
          // 主任/班導模式：從已審核公司列表中提取所有職缺
          if (companyData && companyData.companies && companyData.companies.length > 0) {
              companyData.companies.forEach(c => {
                  if (c.status === 'approved' && c.is_open_current_semester && Array.isArray(c.jobs)) {
                      c.jobs.forEach(jobTitle => {
                          if (jobTitle && String(jobTitle).trim()) {
                              jobSet.add(String(jobTitle).trim());
                          }
                      });
                  }
              });
          }
          
          // 也從履歷資料中提取職缺（作為補充）
          data.forEach(r => {
              const jobTitle = r.job_title || r.jobTitle || '';
              if (jobTitle && jobTitle.trim()) {
                  const titles = jobTitle.split(' | ');
                  titles.forEach(t => {
                      const parts = t.split(' - ');
                      if(parts.length > 1) {
                          jobSet.add(parts[1].trim());
                      } else if(t.trim()) {
                          jobSet.add(t.trim());
                      }
                  });
              }
          });
      } else {
          // 一般模式（指導老師）：從已審核公司列表中提取職缺（如果該公司是該指導老師管理的）
          // 不管 is_open_current_semester 是否為 true，都應該顯示（一開始就要有資料）
          if (companyData && companyData.companies && companyData.companies.length > 0) {
              companyData.companies.forEach(c => {
                  // 只顯示該指導老師管理的公司的職缺
                  if (c.status === 'approved' && 
                      c.advisor_user_id && 
                      String(c.advisor_user_id) === String(currentUserId) &&
                      Array.isArray(c.jobs)) {
                      c.jobs.forEach(jobTitle => {
                          if (jobTitle && String(jobTitle).trim()) {
                              jobSet.add(String(jobTitle).trim());
                          }
                      });
                  }
              });
          }
          
          // 從履歷資料中提取職缺（作為補充）
          data.forEach(r => {
              const jobTitle = r.job_title || r.jobTitle || '';
              if (jobTitle && jobTitle.trim()) {
                  const titles = jobTitle.split(' | ');
                  titles.forEach(t => {
                      const parts = t.split(' - ');
                      if(parts.length > 1) {
                          jobSet.add(parts[1].trim());
                      } else if(t.trim()) {
                          jobSet.add(t.trim());
                      }
                  });
              }
          });
          
          // 如果 API 有提供職缺資料，也加入（作為補充）
          if (positionData && positionData.items && positionData.items.length > 0) {
              positionData.items.forEach(job => {
                  const jobTitle = job.title || job.job_title || '';
                  if (jobTitle) {
                      jobSet.add(jobTitle.trim());
                  }
              });
          }
      }
      
      // 將所有職缺排序後加入選單
      Array.from(jobSet).sort().forEach(j => {
          companySelect.innerHTML += `<option value="${escapeHtml(j)}">${escapeHtml(j)}</option>`;
      });
    }

    function applyFilters(resetPage = true) {
      if (resetPage) {
        currentPage = 1;
      }
      const cls = document.getElementById("classFilter").value.trim();
      const companyName = document.getElementById("companyNameFilter").value.trim();
      const jobFilter = document.getElementById("companyFilter").value.trim();
      const status = document.getElementById("statusFilter").value.trim();
      const keyword = document.getElementById("searchBox").value.trim().toLowerCase();
      
      const urlParams = new URLSearchParams(window.location.search);
      const isCompanyView = !!urlParams.get('company_id');

      const filtered = allResumes.filter(r => {
        const matchesClass = !cls || r.className === cls;
        const matchesKeyword = (r.username && r.username.toLowerCase().includes(keyword)) ||
                               (r.original_filename && r.original_filename.toLowerCase().includes(keyword));
        
        let matchesCompanyName = true;
        if (companyName) {
            const companyNameStr = (r.company_name || '').trim();
            matchesCompanyName = companyNameStr === companyName;
        }
        
        let matchesJob = true;
        if (jobFilter) {
            const jobs = (r.job_title || r.jobTitle || '').toLowerCase();
            matchesJob = jobs.includes(jobFilter.toLowerCase()) || (r.job_id && String(r.job_id) === jobFilter);
        }

        let matchesStatus = true;
        if (status) {
           // 指導老師使用 review_status，班導使用 display_status
           let statusStr;
           if (userRole === 'teacher') {
             const teacherStatus = r.review_status;
             const isValidStatus = teacherStatus && 
                                   teacherStatus !== 'undefined' && 
                                   teacherStatus !== 'null' && 
                                   ['uploaded', 'approved', 'rejected'].includes(teacherStatus);
             if (isValidStatus) {
               statusStr = teacherStatus;
             } else if (r.status === 'approved' || (r.display_status && r.display_status.includes('approved'))) {
               // 班導已通過，但指導老師還沒審核，應該顯示為待審核
               statusStr = 'uploaded';
             } else {
               statusStr = r.display_status || 'uploaded';
             }
           } else {
             statusStr = r.display_status || 'uploaded';
           }
           matchesStatus = statusStr === status;  // 使用嚴格相等，確保精確匹配
        }

        return matchesClass && matchesCompanyName && matchesJob && matchesStatus && matchesKeyword;
      });

      renderTable(filtered);
    }

    function renderTable(resumes) {
      const tbody = document.getElementById("resumeTableBody");
      tbody.innerHTML = "";
      
      const urlParams = new URLSearchParams(window.location.search);
      const isDirectorMode = urlParams.get('mode') === 'director';
      const isViewOnly = !!urlParams.get('company_id'); 
      const isViewOnlyMode = isDirectorMode || userRole === 'class_teacher'; // 主任或班導：僅能下載、查看
      const filterStatus = document.getElementById("statusFilter").value.trim(); 
      const filterJob = document.getElementById("companyFilter").value.trim();
      
      // 主任或班導模式：隱藏狀態欄位
      const statusHeader = document.getElementById("statusHeader");
      if (statusHeader) {
        statusHeader.style.display = isViewOnlyMode ? 'none' : '';
      }
      
      if (resumes.length === 0) {
        const colspan = isViewOnlyMode ? 9 : 10;
        tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align: center; color: #64748b; padding: 16px;">目前沒有資料</td></tr>`;
        document.getElementById("pagination").innerHTML = "";
        return;
      } 

      let allRowsData = [];

      resumes.forEach(r => {
        // 直接使用最新的志願序資料（後端已處理）
        // 指導老師使用 review_status，班導使用 display_status
        const comp = r.company_name || '—';
        const job = r.job_title || r.jobTitle || '—';
        const pid = r.preference_id || null;
        // 處理 review_status：如果是 undefined、null、空字符串或字符串 "undefined"，則使用 display_status
        const teacherStatus = r.review_status;
        const isValidStatus = teacherStatus && 
                              teacherStatus !== 'undefined' && 
                              teacherStatus !== 'null' && 
                              ['uploaded', 'approved', 'rejected'].includes(teacherStatus);
        
        // 指導老師的狀態邏輯：
        // 1. 如果 review_status 有效，直接使用
        // 2. 如果 review_status 無效但 status='approved'（班導已通過），則顯示為 'uploaded'（待指導老師審核）
        // 3. 否則使用 display_status
        let st;
        if (userRole === 'teacher') {
          if (isValidStatus) {
            st = teacherStatus;
          } else if (r.status === 'approved' || (r.display_status && r.display_status.includes('approved'))) {
            // 班導已通過，但指導老師還沒審核，應該顯示為待審核
            st = 'uploaded';
          } else {
            st = r.display_status || 'uploaded';
          }
        } else {
          // 班導和其他角色：使用 display_status
          st = r.display_status || 'uploaded';
        }
        const cm = r.comment || '';

        // 狀態篩選
        if (filterStatus && st !== filterStatus) return;
        
        // 職缺篩選
        if (filterJob && !job.includes(filterJob) && filterJob !== (r.job_id ? String(r.job_id) : '')) return;

        allRowsData.push({
            ...r,
            display_company: comp,
            display_job: job,
            preference_id: pid,
            display_status: st,
            comment: cm,
            isMultiRow: true
        });
      });

      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = allRowsData.slice(start, end);

      pageData.forEach(row => {
        const pid = row.preference_id || null;
        
        // 渲染每一行，statusColor(row.display_status) 會決定背景色，mapStatus 決定文字
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid #e2e8f0';
        // 指導老師優先使用 review_status，如果沒有則使用 display_status
        // 處理字符串 "undefined" 或無效值的情況
        let statusForDisplay = 'uploaded';
        if (userRole === 'teacher') {
          // 指導老師：優先使用 review_status，但需要驗證是否為有效值
          const teacherStatus = row.review_status;
          const isValidTeacherStatus = teacherStatus && 
                                      teacherStatus !== 'undefined' && 
                                      teacherStatus !== 'null' && 
                                      ['uploaded', 'approved', 'rejected'].includes(teacherStatus);
          if (isValidTeacherStatus) {
            statusForDisplay = teacherStatus;
          } else {
            // 如果 review_status 無效，但 display_status 是 'approved'（班導已通過）
            // 則指導老師應該看到 'uploaded'（待審核），因為還沒審核
            if (row.status === 'approved' || (row.display_status && row.display_status.includes('approved'))) {
              statusForDisplay = 'uploaded';
            } else {
              statusForDisplay = row.display_status || 'uploaded';
            }
          }
        } else {
          // 班導和其他角色：使用 display_status
          statusForDisplay = row.display_status || 'uploaded';
        }
        const statusCell = isViewOnlyMode ? '' : `
           <td style="padding: 14px 16px;">
             <span class="status-badge bg-${statusColor(statusForDisplay)}">${mapStatus(statusForDisplay)}</span>
           </td>`;
        // 檢查是否應該禁用勾選框（指導老師審核截止時間已過）
        const isCheckboxDisabled = isTeacherReviewDeadlinePassed && userRole === 'teacher';
        const checkboxDisabledAttr = isCheckboxDisabled ? 'disabled' : '';
        const checkboxStyle = isCheckboxDisabled 
          ? 'cursor: not-allowed; width: 18px; height: 18px; opacity: 0.5;' 
          : 'cursor: pointer; width: 18px; height: 18px;';
        
        tr.innerHTML = `
           <td style="padding: 14px 16px; text-align: center;">
             <input type="checkbox" class="row-checkbox" 
                    data-resume-id="${row.id}" 
                    data-preference-id="${row.preference_id || ''}" 
                    data-application-id="${row.application_id || ''}" 
                    ${checkboxDisabledAttr}
                    style="${checkboxStyle}">
           </td>
           <td style="padding: 14px 16px;">${row.username}</td>
           <td style="padding: 14px 16px;">${escapeHtml(row.name)}</td>
           <td style="padding: 14px 16px;">${row.upload_time}</td>
           <td style="padding: 14px 16px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(row.original_filename)}</td>
           <td style="padding: 14px 16px;">${escapeHtml(row.display_company)}</td>
           <td style="padding: 14px 16px;">${escapeHtml(row.display_job)}</td>
           ${statusCell}
           <td style="padding: 14px 16px;">
             ${ renderCommentBtn(row, isViewOnly, pid) }
           </td>
           <td style="padding: 14px 16px;">
             ${ renderActionBtns(row, isViewOnly, pid, isViewOnlyMode) }
           </td>
        `;
        tbody.appendChild(tr);
      });

      renderPagination(allRowsData.length);
      
      // 更新傳送給廠商按鈕的顯示狀態
      updateSendToVendorButtonVisibility();
      
      // 如果指導老師審核截止時間已過，禁用全選勾選框
      if (isTeacherReviewDeadlinePassed && userRole === 'teacher') {
        const selectAllCheckbox = document.getElementById("selectAllCheckbox");
        if (selectAllCheckbox) {
          selectAllCheckbox.disabled = true;
          selectAllCheckbox.style.cursor = 'not-allowed';
          selectAllCheckbox.style.opacity = '0.5';
        }
      }
    }

    function renderCommentBtn(row, isViewOnly, pid) {
        const hasComment = row.comment && row.comment.trim() !== '';
        const btnClass = hasComment ? 'text-success' : '';
        const btnText = hasComment ? '已填寫' : '未填寫';
        const appId = row.application_id != null ? row.application_id : 'null';
        const commentEsc = (row.comment || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, ' ');
        if (isViewOnly) {
            if (hasComment) {
                return `<button class="btn btn-sm btn-outline-secondary text-success" onclick="openCommentModal(${row.id}, '${commentEsc}', ${pid}, ${appId}, true)">已填寫</button>`;
            } else {
                return `<span style="color:#aaa; font-size:0.9em;">未填寫</span>`;
            }
        }
        // 班導僅能查看留言，不可編輯
        const commentReadonly = userRole === 'class_teacher';
        return `<button class="btn btn-sm btn-outline-secondary ${btnClass}" onclick="openCommentModal(${row.id}, '${commentEsc}', ${pid}, ${appId}, ${commentReadonly})">${btnText}</button>`;
    }

    function renderActionBtns(row, isViewOnly, pid, isViewOnlyMode = false) {
        const dlBtn = `<a href="/api/download_resume/${row.id}" class="btn btn-sm btn-outline-primary" target="_blank" style="margin-right:4px;">下載</a>`;
        if (isViewOnly) return dlBtn; 

        // 指導老師只顯示下載按鈕
        if (userRole === 'teacher') {
            return `<div style="display:flex; align-items:center;">${dlBtn}</div>`;
        }

        // 主任或班導：僅能下載、查看，不顯示通過/退件
        if (isViewOnlyMode) {
            return `<div style="display:flex; align-items:center;">${dlBtn}</div>`;
        }

        const appId = row.application_id != null ? row.application_id : 'null';
        const approveClick = `approveResume(${row.id}, ${pid ? `'${pid}'` : 'null'}, ${appId})`;
        
        let btns = `<div style="display:flex; align-items:center;">${dlBtn}`;
        btns += `<button class="btn btn-sm btn-outline-success" onclick="${approveClick}">通過</button>`;
        btns += `</div>`;
        return btns;
    }

    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / rowsPerPage);
      const pagination = document.getElementById("pagination");
      pagination.innerHTML = "";
      if (totalPages <= 1) return;
      for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement("li");
        li.className = `page-item ${i === currentPage ? "active" : ""}`;
        li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
        li.onclick = (e) => { 
          e.preventDefault(); 
          currentPage = i; 
          applyFilters(false); 
        }; 
        pagination.appendChild(li);
      }
    }

    // 更新狀態函式（指導老師與班導皆傳 applicationId，後端以「每筆投遞」為單位審核，同一份履歷不同公司分開紀錄）
    function approveResume(resumeId, preferenceId, applicationId) {
      if (!confirm("確定要將此職缺申請標記為通過嗎？")) return;
      
      const body = { status: 'approved' };
      if (preferenceId) body.preference_id = preferenceId;
      if ((userRole === 'teacher' || userRole === 'class_teacher') && applicationId != null && applicationId !== 'null' && !isNaN(applicationId)) {
        body.application_id = parseInt(applicationId);
      }

      fetch(`/api/review_resume/${resumeId}`, { 
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
      }).then(res => res.json()).then(data => {
          if (data.success) {
              alert("✅ 狀態更新成功");
              // 清除狀態篩選器，確保更新後的履歷可見
              const statusFilter = document.getElementById('statusFilter');
              if (statusFilter) {
                statusFilter.value = '';
              }
              // 清除搜尋框，確保更新後的履歷可見
              const searchBox = document.getElementById('searchBox');
              if (searchBox) {
                searchBox.value = '';
              }
              // 重新載入資料
              if (userRole === 'vendor') {
                fetch('/vendor/api/resumes').then(r=>r.json()).then(d=>{
                  if(d.success) { allResumes=d.resumes || []; applyFilters(); }
                });
              } else {
                fetch('/api/teacher_review_resumes').then(r=>r.json()).then(d=>{
                  if(d.success) { 
                    allResumes=d.data || []; 
                    console.log('🔍 [DEBUG] 重新載入指導老師履歷資料:', allResumes.length, '筆');
                    applyFilters(); 
                  } else {
                    console.error('❌ [DEBUG] 重新載入失敗:', d);
                  }
                }).catch(err => {
                  console.error('❌ [DEBUG] 重新載入錯誤:', err);
                });
              }
          } else {
              alert("失敗：" + data.message);
          }
      }).catch(err => {
          console.error('❌ [DEBUG] 更新狀態錯誤:', err);
          alert("更新失敗，請稍後再試");
      });
    }


    function openCommentModal(id, comment, pid, applicationId, readonly) {
        document.getElementById("commentInput").value = comment;
        document.getElementById("commentInput").readOnly = readonly;
        document.getElementById("commentModalLabel").textContent = readonly ? "查看留言" : "編輯留言";
        const saveBtn = document.getElementById("saveCommentBtn");
        saveBtn.style.display = readonly ? 'none' : 'block';
        saveBtn.textContent = "儲存";
        
        if (!readonly) {
            currentResumeId = id;
            currentPreferenceId = pid;
            currentApplicationId = applicationId != null && applicationId !== 'null' ? applicationId : null;
            saveBtn.onclick = saveComment; 
        }
        new bootstrap.Modal(document.getElementById("commentModal")).show();
    }

    function saveComment() {
        const val = document.getElementById("commentInput").value.trim();
        const body = { field: 'comment', value: val };
        if ((userRole === 'teacher' || userRole === 'class_teacher') && currentApplicationId != null) {
            body.application_id = currentApplicationId;
        } else {
            body.resume_id = currentResumeId;
        }
        if (currentPreferenceId) body.preference_id = currentPreferenceId;

        fetch("/api/update_resume_field", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        }).then(res => res.json()).then(data => {
             if(data.success) {
                 alert("留言已更新");
                 bootstrap.Modal.getInstance(document.getElementById("commentModal")).hide();
                 // 重新載入資料
                 if (userRole === 'vendor') {
                   fetch('/vendor/api/resumes').then(r=>r.json()).then(d=>{
                     if(d.success) { allResumes=d.resumes || []; applyFilters(); }
                   });
                 } else {
                   fetch('/api/teacher_review_resumes').then(r=>r.json()).then(d=>{
                     if(d.success) { allResumes=d.data || []; applyFilters(); }
                   });
                 }
             } else {
                 alert("失敗");
             }
        });
    }

    // 批量標記選中的履歷為通過（等待截止時間後統一傳送給廠商）
    async function sendSelectedToVendor() {
      // 如果指導老師審核截止時間已過，阻止操作
      if (isTeacherReviewDeadlinePassed && userRole === 'teacher') {
        alert("⚠️ 指導老師審核截止時間已過，無法再審核履歷。履歷將自動傳給廠商。");
        return;
      }
      
      const checkedBoxes = document.querySelectorAll(".row-checkbox:checked");
      
      if (checkedBoxes.length === 0) {
        alert("請至少選擇一筆履歷");
        return;
      }
      
      if (!confirm(`確定要將選中的 ${checkedBoxes.length} 筆履歷標記為通過嗎？\n\n注意：履歷將在審核截止時間後統一傳送給廠商。`)) {
        return;
      }
      
      const sendToVendorBtn = document.getElementById("sendToVendorBtn");
      if (sendToVendorBtn) {
        sendToVendorBtn.disabled = true;
        sendToVendorBtn.textContent = "處理中...";
      }
      
      const promises = [];
      let successCount = 0;
      let failCount = 0;
      
      checkedBoxes.forEach(checkbox => {
        const resumeId = checkbox.getAttribute("data-resume-id");
        const preferenceId = checkbox.getAttribute("data-preference-id");
        const applicationId = checkbox.getAttribute("data-application-id");
        
        const body = { status: 'approved' };
        if (preferenceId && preferenceId !== '') {
          body.preference_id = preferenceId;
        }
        if ((userRole === 'teacher' || userRole === 'class_teacher') && applicationId && applicationId !== '' && applicationId !== 'null' && !isNaN(applicationId)) {
          body.application_id = parseInt(applicationId);
        }
        
        const promise = fetch(`/api/review_resume/${resumeId}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            successCount++;
          } else {
            failCount++;
            console.error(`履歷 ${resumeId} 審核失敗:`, data.message);
          }
        })
        .catch(err => {
          failCount++;
          console.error(`履歷 ${resumeId} 審核錯誤:`, err);
        });
        
        promises.push(promise);
      });
      
      try {
        await Promise.all(promises);
        
        // 等待一小段時間，確保後端事務已提交
        await new Promise(resolve => setTimeout(resolve, 500));
        
        if (sendToVendorBtn) {
          sendToVendorBtn.disabled = false;
          sendToVendorBtn.textContent = "傳送給廠商";
        }
        
        if (failCount === 0) {
          alert(`✅ 成功將 ${successCount} 筆履歷標記為通過\n\n履歷將在審核截止時間後統一傳送給廠商。`);
        } else {
          alert(`⚠️ 完成處理：${successCount} 筆成功，${failCount} 筆失敗`);
        }
        
        // 清除所有 checkbox 的選中狀態
        checkedBoxes.forEach(cb => cb.checked = false);
        const selectAllCheckbox = document.getElementById("selectAllCheckbox");
        if (selectAllCheckbox) {
          selectAllCheckbox.checked = false;
          selectAllCheckbox.indeterminate = false;
        }
        updateSendToVendorButtonVisibility();
        
        // 清除狀態篩選器和搜尋框，確保更新後的履歷可見
        const statusFilter = document.getElementById('statusFilter');
        if (statusFilter) {
          statusFilter.value = '';
        }
        const searchBox = document.getElementById('searchBox');
        if (searchBox) {
          searchBox.value = '';
        }
        
        // 重新載入資料（添加時間戳防止緩存）
        const timestamp = new Date().getTime();
        if (userRole === 'vendor') {
          fetch(`/vendor/api/resumes?t=${timestamp}`).then(r=>r.json()).then(d=>{
            if(d.success) { allResumes=d.resumes || []; applyFilters(); }
          });
        } else {
          fetch(`/api/teacher_review_resumes?t=${timestamp}`).then(r=>r.json()).then(d=>{
            if(d.success) { 
              allResumes=d.data || []; 
              console.log('🔍 [DEBUG] 重新載入指導老師履歷資料:', allResumes.length, '筆');
              // 調試：記錄所有履歷的審核狀態
              console.log('[DEBUG] 所有履歷的審核狀態:');
              allResumes.forEach(r => {
                console.log(`  履歷 ID: ${r.id}, application_id: ${r.application_id}, review_status: ${r.review_status}, display_status: ${r.display_status}`);
              });
              const approvedCount = allResumes.filter(r => r.review_status === 'approved').length;
              console.log(`[DEBUG] 已通過的履歷數量: ${approvedCount}`);
              applyFilters(); 
            } else {
              console.error('❌ [DEBUG] 重新載入失敗:', d);
            }
          }).catch(err => {
            console.error('❌ [DEBUG] 重新載入錯誤:', err);
          });
        }
      } catch (error) {
        console.error('批量處理錯誤:', error);
        if (sendToVendorBtn) {
          sendToVendorBtn.disabled = false;
          sendToVendorBtn.textContent = "傳送給廠商";
        }
        alert("處理過程中發生錯誤，請稍後再試");
      }
    }

  </script>
